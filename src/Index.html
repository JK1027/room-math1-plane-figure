<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Geometry Escape: 기하의 성</title>
    <!-- CSS Include -->
    <?!= include("Styles"); ?>
  </head>
  <body>
    <!-- 전역 배경 레이어: 별 3개 + 안개 -->
    <div class="stars-small"></div>
    <div class="stars-medium"></div>
    <div class="stars-large"></div>
    <div class="bg-fog"></div>

    <div id="game-container">
      
      <!-- 1. Intro Scene -->
      <div id="scene-intro" class="scene active">
        <div class="card">
          <!-- 룬 링 SVG -->
          <div class="rune-ring-wrapper">
            <svg class="rune-ring-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <!-- 외부 링 (느린 회전 + 맥동) -->
              <polygon class="outer-ring" points="60,4 114,32 114,88 60,116 6,88 6,32"
                       fill="none" stroke="rgba(212,175,55,0.45)" stroke-width="1.5"/>
              <!-- 내부 링 (역방향 회전) -->
              <polygon class="inner-ring" points="60,18 102,42 102,78 60,102 18,78 18,42"
                       fill="none" stroke="rgba(120,200,255,0.3)" stroke-width="1"/>
              <!-- 중앙 룬 심볼 -->
              <text x="60" y="66" text-anchor="middle" dominant-baseline="middle"
                    font-size="22" fill="rgba(212,175,55,0.6)" font-family="serif">✦</text>
            </svg>
          </div>
          <h1>Geometry Escape</h1>
          <h2 class="sub-title">기하의 성</h2>
          <p class="description">수학의 봉인을 풀고 마도사의 성을 탈출하세요.</p>
          <button id="intro-start-btn" class="btn">모험 시작하기</button>
        </div>
      </div>

      <!-- 2. Input Scene -->
      <div id="scene-input" class="scene">
        <div class="card">
          <h2>모험가 등록</h2>
          <form id="input-form">
            <div class="form-group">
              <label for="student-no">학번 (4~5자리)</label>
              <input type="text" id="student-no" placeholder="예: 1011 또는 10101" required maxlength="5">
            </div>
            <div class="form-group">
              <label for="student-name">이름</label>
              <input type="text" id="student-name" placeholder="홍길동" required>
            </div>
            <button type="submit" id="input-submit-btn" class="btn">성문 진입</button>
          </form>
        </div>
      </div>

      <!-- 3. Story Scene -->
      <div id="scene-story" class="scene">
        <div class="story-layer-container">
          <!-- Layer 1: 스테이지별 배경 그라데이션 -->
          <div id="story-bg-layer" class="story-bg-layer" data-stage="1"></div>
          <!-- Layer 2: 안개 -->
          <div class="story-fog-layer"></div>
          <!-- Layer 3: 룬 문양 SVG -->
          <div class="story-rune-layer">
            <svg class="rune-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <polygon points="100,8 188,55 188,145 100,192 12,145 12,55"
                       fill="none" stroke="rgba(120,200,255,0.15)" stroke-width="1.2"/>
              <polygon points="100,30 170,70 170,130 100,170 30,130 30,70"
                       fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="0.8"/>
            </svg>
          </div>
          <!-- Layer 4: 화자 정보 + 대사창 -->
          <div class="story-content-layer">
            <!-- 화자 네임박스 -->
            <div class="story-speaker-bar">
              <span class="speaker-icon">🔮</span>
              <span id="story-speaker-name">마도사</span>
            </div>
            <!-- Layer 5: 대사창 -->
            <div id="story-click-area" class="story-box">
              <div id="story-dialog-text" class="dialog-text">스토리가 로딩 중입니다...</div>
              <div class="tap-indicator">▼ 클릭하여 계속</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 4. Puzzle Scene -->
      <div id="scene-puzzle" class="scene">
        <div class="puzzle-wrapper">
          <div class="puzzle-header">
            <h3 id="puzzle-stage-title">스테이지 1</h3>
            <button id="puzzle-hint-btn" class="btn-secondary">힌트</button>
          </div>
          <div id="puzzle-board-container" class="puzzle-canvas-area">
            <div class="mock-container">
              <p>도형 조작 영역</p>
              <button id="mock-puzzle-clear-btn" class="btn">퍼즐 해결 완료 (Mock)</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 5. Ending Scene -->
      <div id="scene-ending" class="scene">
        <div class="card">
          <!-- 성문 SVG는 AnimationManager.playGateOpen()이 동적으로 삽입 -->
          <div class="ending-card-content">
            <h2>빛의 영역으로</h2>
            <p class="description">마도사의 성을 무사히 탈출했습니다!</p>
            <!-- 랭크 표시는 AnimationManager가 삽입 -->
            <div id="ending-record" class="record-box"></div>
            <button id="ending-submit-btn" class="btn">기록 및 랭킹 등록</button>
          </div>
        </div>
      </div>

      <!-- 6. Ranking Scene -->
      <div id="scene-ranking" class="scene">
        <div class="card">
          <h2>명예의 전당 (실시간 랭킹)</h2>
          <table class="ranking-table">
            <thead>
              <tr>
                <th>순위</th>
                <th>학번</th>
                <th>이름</th>
                <th>점수</th>
                <th>소요시간</th>
              </tr>
            </thead>
            <tbody id="ranking-list-body">
              <!-- 랭킹 목록이 JS에 의해 주입됩니다 -->
            </tbody>
          </table>
          <button id="ranking-restart-btn" class="btn" style="margin-top:20px;">다시 모험하기</button>
        </div>
      </div>

    </div>

    <!-- Effects Layer (CSS 먼저 적용) -->
    <?!= include("effects/BackgroundEffects"); ?>
    <?!= include("effects/SceneEffects"); ?>
    <?!= include("effects/GlowEffects"); ?>
    <?!= include("effects/ParticleEffects"); ?>
    <?!= include("effects/AnimationManager"); ?>

    <!-- Core Engine Includes -->
    <?!= include("engine/EventBus"); ?>
    <?!= include("engine/GameState"); ?>
    <?!= include("engine/SceneEngine"); ?>
    <?!= include("engine/StoryEngine"); ?>
    <?!= include("engine/PuzzleManager"); ?>
    <?!= include("engine/AchievementManager"); ?>
    
    <!-- Services Includes -->
    <?!= include("services/DbService"); ?>
    <?!= include("services/ResultRepository"); ?>
    <?!= include("services/RankingService"); ?>

    <!-- Stories Includes -->
    <?!= include("stories/Stage1Story"); ?>
    <?!= include("stories/Stage2Story"); ?>
    <?!= include("stories/Stage3Story"); ?>
    <?!= include("stories/Stage4Story"); ?>
    <?!= include("stories/Stage5Story"); ?>

    <!-- Puzzles Includes -->
    <?!= include("puzzles/PuzzleBase"); ?>
    <?!= include("puzzles/Stage1Puzzle"); ?>
    <?!= include("puzzles/Stage2Puzzle"); ?>
    <?!= include("puzzles/Stage3Puzzle"); ?>
    <?!= include("puzzles/Stage4Puzzle"); ?>
    <?!= include("puzzles/Stage5Puzzle"); ?>
    
    <!-- UI Scenes Includes -->
    <?!= include("ui/IntroScene"); ?>
    <?!= include("ui/InputScene"); ?>
    <?!= include("ui/StoryScene"); ?>
    <?!= include("ui/PuzzleScene"); ?>
    <?!= include("ui/EndingScene"); ?>
    <?!= include("ui/RankingScene"); ?>
    
    <!-- Client Core App Initialize -->
    <?!= include("App"); ?>
  </body>
</html>
