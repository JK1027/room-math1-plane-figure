<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Geometry Escape: 기하의 성</title>
    <!-- CSS Include -->
    <?!= include("Styles"); ?>
  </head>
  <body>
    <!-- 전역 배경 레이어: 별 3개 + 안개 -->
    <div class="stars-small"></div>
    <div class="stars-medium"></div>
    <div class="stars-large"></div>
    <div class="bg-fog"></div>

    <div id="game-container">
      
      <!-- 1. Intro Scene -->
      <div id="scene-intro" class="scene active">
        <div class="card">
          <!-- 룬 링 SVG -->
          <div class="rune-ring-wrapper">
            <svg class="rune-ring-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <!-- 외부 링 (느린 회전 + 맥동) -->
              <polygon class="outer-ring" points="60,4 114,32 114,88 60,116 6,88 6,32"
                       fill="none" stroke="rgba(212,175,55,0.45)" stroke-width="1.5"/>
              <!-- 내부 링 (역방향 회전) -->
              <polygon class="inner-ring" points="60,18 102,42 102,78 60,102 18,78 18,42"
                       fill="none" stroke="rgba(120,200,255,0.3)" stroke-width="1"/>
              <!-- 중앙 룬 심볼 -->
              <text x="60" y="66" text-anchor="middle" dominant-baseline="middle"
                    font-size="22" fill="rgba(212,175,55,0.6)" font-family="serif">✦</text>
            </svg>
          </div>
          <h1>Geometry Escape</h1>
          <h2 class="sub-title">기하의 성</h2>
          <p class="description">수학의 봉인을 풀고 마도사의 성을 탈출하세요.</p>
          <button id="intro-start-btn" class="btn">모험 시작하기</button>
        </div>
      </div>

      <!-- 2. Input Scene -->
      <div id="scene-input" class="scene">
        <div class="card">
          <h2>모험가 등록</h2>
          <form id="input-form">
            <div class="form-group">
              <label for="student-no">학번 (4~5자리)</label>
              <input type="text" id="student-no" placeholder="예: 1011 또는 10101" required maxlength="5">
            </div>
            <div class="form-group">
              <label for="student-name">이름</label>
              <input type="text" id="student-name" placeholder="홍길동" required>
            </div>
            <button type="submit" id="input-submit-btn" class="btn">성문 진입</button>
          </form>
        </div>
      </div>

      <!-- 2-1. Tutorial Scene -->
      <div id="scene-tutorial" class="scene">
        <div class="puzzle-wrapper">
          <div class="puzzle-header">
            <h3>기초 마법 훈련</h3>
            <button id="tutorial-skip-btn" class="btn-secondary">훈련 건너뛰기</button>
          </div>
          <div id="tutorial-board-container" class="puzzle-canvas-area" style="min-height: 280px;">
            <!-- 튜토리얼 내용이 동적으로 로드됩니다 -->
          </div>
        </div>
      </div>

      <!-- 3. Story Scene -->
      <div id="scene-story" class="scene">
        <div class="story-layer-container">
          <!-- Layer 1: 스테이지별 배경 그라데이션 -->
          <div id="story-bg-layer" class="story-bg-layer" data-stage="1"></div>
          <!-- Layer 2: 안개 -->
          <div class="story-fog-layer"></div>
          <!-- Layer 3: 룬 문양 SVG -->
          <div class="story-rune-layer">
            <svg class="rune-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <polygon points="100,8 188,55 188,145 100,192 12,145 12,55"
                       fill="none" stroke="rgba(120,200,255,0.15)" stroke-width="1.2"/>
              <polygon points="100,30 170,70 170,130 100,170 30,130 30,70"
                       fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="0.8"/>
            </svg>
          </div>
          <!-- Layer 4: 화자 정보 + 대사창 -->
          <div class="story-content-layer">
            <!-- 화자 네임박스 -->
            <div class="story-speaker-bar">
              <span class="speaker-icon">🔮</span>
              <span id="story-speaker-name">마도사</span>
            </div>
            <!-- Layer 5: 대사창 -->
            <div id="story-click-area" class="story-box">
              <div id="story-dialog-text" class="dialog-text">스토리가 로딩 중입니다...</div>
              <div class="tap-indicator">▼ 클릭하여 계속</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 4. Puzzle Scene -->
      <div id="scene-puzzle" class="scene">
        <div class="puzzle-wrapper">
          <div class="puzzle-header">
            <h3 id="puzzle-stage-title">스테이지 1</h3>
            <div style="display: flex; gap: 8px;">
              <button id="puzzle-hint-btn" class="btn-secondary">힌트</button>
              <button id="puzzle-solution-btn" class="btn-secondary" style="display: none; background: rgba(231, 76, 60, 0.25); border-color: #e74c3c; color: #ff7675;">풀이 보기</button>
            </div>
          </div>
          <!-- 마법 수정 인벤토리 바 -->
          <div id="puzzle-inventory-bar" style="margin: 8px auto; display: flex; justify-content: center; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(13, 27, 42, 0.6); border-radius: 8px; border: 1px solid rgba(212,175,55,0.2); width: fit-content; box-shadow: 0 0 10px rgba(0,0,0,0.5);">
            <span style="font-size: 0.78rem; color: var(--gold-light); font-weight: bold; letter-spacing: 0.5px;">기하의 수정:</span>
            <span id="crystal-1" style="font-size: 1.1rem; opacity: 0.2; filter: grayscale(100%); transition: all 0.3s;" title="푸른 수정 (Stage 1)">🔷</span>
            <span id="crystal-2" style="font-size: 1.1rem; opacity: 0.2; filter: grayscale(100%); transition: all 0.3s;" title="초록 수정 (Stage 2)">🟢</span>
            <span id="crystal-3" style="font-size: 1.1rem; opacity: 0.2; filter: grayscale(100%); transition: all 0.3s;" title="노란 수정 (Stage 3)">🟡</span>
            <span id="crystal-4" style="font-size: 1.1rem; opacity: 0.2; filter: grayscale(100%); transition: all 0.3s;" title="보라 수정 (Stage 4)">🟣</span>
            <span id="crystal-5" style="font-size: 1.1rem; opacity: 0.2; filter: grayscale(100%); transition: all 0.3s;" title="붉은 수정 (Stage 5)">🔴</span>
            <span id="crystal-6" style="font-size: 1.1rem; opacity: 0.2; filter: grayscale(100%); transition: all 0.3s;" title="은빛 수정 (Stage 6)">⚪</span>
            <span id="crystal-7" style="font-size: 1.1rem; opacity: 0.2; filter: grayscale(100%); transition: all 0.3s;" title="7개의 기하 수정 복원 (Stage 7)">🌈</span>
          </div>
          <div id="puzzle-board-container" class="puzzle-canvas-area">
            <div class="mock-container">
              <p>도형 조작 영역</p>
              <button id="mock-puzzle-clear-btn" class="btn">퍼즐 해결 완료 (Mock)</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 5. Ending Scene -->
      <div id="scene-ending" class="scene">
        <div class="card">
          <!-- 성문 SVG는 AnimationManager.playGateOpen()이 동적으로 삽입 -->
          <div class="ending-card-content">
            <h2>빛의 영역으로</h2>
            <p class="description">마도사의 성을 무사히 탈출했습니다!</p>
            <!-- 랭크 표시는 AnimationManager가 삽입 -->
            <div id="ending-record" class="record-box"></div>
            <button id="ending-submit-btn" class="btn">기록 및 랭킹 등록</button>
          </div>
        </div>
      </div>

      <!-- 6. Ranking Scene -->
      <div id="scene-ranking" class="scene">
        <div class="card">
          <h2>명예의 전당 (실시간 랭킹)</h2>
          <table class="ranking-table">
            <thead>
              <tr>
                <th>순위</th>
                <th>학번</th>
                <th>이름</th>
                <th>점수</th>
                <th>소요시간</th>
              </tr>
            </thead>
            <tbody id="ranking-list-body">
              <!-- 랭킹 목록이 JS에 의해 주입됩니다 -->
            </tbody>
          </table>
          <button id="ranking-restart-btn" class="btn" style="margin-top:20px;">다시 모험하기</button>
        </div>
      </div>

      <div id="crystal-modal" class="scene-overlay">
        <div class="card" style="text-align: center; max-width: 360px; border: 2px solid var(--gold-primary); box-shadow: 0 0 30px var(--gold-glow); padding: 30px 20px; transform: scale(0.85); transition: transform 0.3s ease;">
          <div id="crystal-modal-icon" style="font-size: 5rem; margin-bottom: 15px; animation: floatCrystal 3s ease-in-out infinite; filter: drop-shadow(0 0 15px currentColor);">💎</div>
          <h2 id="crystal-modal-title" style="color: var(--gold-primary); font-size: 1.4rem; margin-bottom: 8px;">청색 수정 획득!</h2>
          <p id="crystal-modal-desc" style="color: var(--text-light); font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px;">맞꼭지각의 대칭성이 증명되어 숲의 마법 결계가 해제되었습니다.</p>
          
          <!-- 개념 정리 카드 영역 -->
          <div id="crystal-concept-card" style="width: 100%; margin-bottom: 20px; padding: 12px; background: rgba(11, 19, 31, 0.8); border: 1.5px dashed var(--gold-primary); border-radius: 8px; display: none; text-align: left;">
            <div style="font-size: 0.75rem; color: var(--gold-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: bold; text-align: center;">🔮 기하학 주문 분석 완료 (개념 정리)</div>
            <div id="crystal-concept-text" style="font-size: 0.85rem; color: #fff; font-weight: bold; line-height: 1.4; text-align: center;"></div>
          </div>

          <button id="crystal-modal-btn" class="btn" style="width: 100%; margin: 0; padding: 12px 20px; font-size: 0.95rem;">계속하기</button>
        </div>
      </div>

    </div>

    <!-- Effects Layer (CSS 먼저 적용) -->
    <?!= include("effects/BackgroundEffects"); ?>
    <?!= include("effects/SceneEffects"); ?>
    <?!= include("effects/GlowEffects"); ?>
    <?!= include("effects/ParticleEffects"); ?>
    <?!= include("effects/AnimationManager"); ?>
    <?!= include("engine/FeedbackSystem"); ?>

    <!-- Core Engine Includes -->
    <?!= include("engine/EventBus"); ?>
    <?!= include("engine/GameState"); ?>
    <?!= include("engine/SceneEngine"); ?>
    <?!= include("engine/StoryEngine"); ?>
    <?!= include("engine/PuzzleManager"); ?>
    <?!= include("engine/AchievementManager"); ?>
    <?!= include("engine/TutorialEngine"); ?>
    <?!= include("engine/QuestionEngine"); ?>
    
    <!-- Services Includes -->
    <?!= include("services/DbService"); ?>
    <?!= include("services/ResultRepository"); ?>
    <?!= include("services/RankingService"); ?>

    <!-- Stories Includes -->
    <?!= include("stories/Stage1Story"); ?>
    <?!= include("stories/Stage2Story"); ?>
    <?!= include("stories/Stage3Story"); ?>
    <?!= include("stories/Stage4Story"); ?>
    <?!= include("stories/Stage5Story"); ?>
    <?!= include("stories/Stage6Story"); ?>
    <?!= include("stories/Stage7Story"); ?>

    <!-- Puzzles Includes -->
    <?!= include("puzzles/PuzzleBase"); ?>
    <?!= include("puzzles/Stage1Puzzle"); ?>
    <?!= include("puzzles/Stage2Puzzle"); ?>
    <?!= include("puzzles/Stage3Puzzle"); ?>
    <?!= include("puzzles/Stage4Puzzle"); ?>
    <?!= include("puzzles/Stage5Puzzle"); ?>
    <?!= include("puzzles/Stage6Puzzle"); ?>
    <?!= include("puzzles/Stage7Puzzle"); ?>
    
    <!-- UI Scenes Includes -->
    <?!= include("ui/IntroScene"); ?>
    <?!= include("ui/InputScene"); ?>
    <?!= include("ui/TutorialScene"); ?>
    <?!= include("ui/StoryScene"); ?>
    <?!= include("ui/PuzzleScene"); ?>
    <?!= include("ui/EndingScene"); ?>
    <?!= include("ui/RankingScene"); ?>
    
    <!-- Client Core App Initialize -->
    <?!= include("App"); ?>
  </body>
</html>
