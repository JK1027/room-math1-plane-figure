<script>
/**
 * 4스테이지 삼각형 내각의 합 조각 맞추기 퍼즐 클래스.
 */
class Stage4Puzzle extends PuzzleBase {
  constructor(containerId) {
    super(containerId);
    this.fixedAngle = 50;
    this.solved = { zoneB: null, zoneC: null };
    this.draggedValue = null;
    this.onClearCallback = null;
  }

  init() {
    this.container.innerHTML = `
      <div style="text-align: center; width: 100%; padding: 15px; user-select: none;">
        <p style="color: #d4af37; margin-bottom: 10px; font-size: 0.9rem;">삼각형 세 내각의 크기의 합이 180°가 되도록 빈 칸에 알맞은 조각을 드래그하세요.</p>
        
        <!-- 삼각형 보드판 -->
        <div style="position: relative; width: 280px; height: 180px; margin: 0 auto; background: #0b131f; border: 1px solid #d4af37; border-radius: 8px;">
          <!-- SVG 삼각형 외곽선 -->
          <svg width="280" height="180" style="position: absolute; top:0; left:0;">
            <polygon points="140,20 40,145 240,145" fill="none" stroke="#d4af37" stroke-width="3" />
          </svg>
          
          <!-- 각 A (고정 50도) -->
          <div style="position: absolute; top: 32px; left: 128px; font-size: 0.95rem; color: #fff; font-weight: bold;">50°</div>
          
          <!-- 각 B 드롭존 -->
          <div id="drop-zone-B" class="dropzone" style="position: absolute; top: 110px; left: 55px; width: 44px; height: 26px; border: 2px dashed #d4af37; border-radius: 4px; font-size: 0.8rem; text-align: center; line-height: 22px; color: #a5a5a5; background: rgba(0,0,0,0.5);">B</div>
          <div style="position: absolute; top: 140px; left: 63px; font-size: 0.65rem; color: #d4af37; font-weight:bold;">각 B</div>
          
          <!-- 각 C 드롭존 -->
          <div id="drop-zone-C" class="dropzone" style="position: absolute; top: 110px; left: 181px; width: 44px; height: 26px; border: 2px dashed #d4af37; border-radius: 4px; font-size: 0.8rem; text-align: center; line-height: 22px; color: #a5a5a5; background: rgba(0,0,0,0.5);">C</div>
          <div style="position: absolute; top: 140px; left: 190px; font-size: 0.65rem; color: #d4af37; font-weight:bold;">각 C</div>
          
          <div id="sum-formula" style="position: absolute; top: 156px; left: 0; width: 100%; text-align: center; font-size: 0.75rem; color: #a5a5a5;">
            식: 50° + B + C = 180°
          </div>
        </div>
        
        <!-- 드래그 카드 후보 -->
        <div style="margin-top: 15px; display: flex; justify-content: center; gap: 10px;">
          <div class="drag-card" draggable="true" data-value="40" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: grab; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">40°</div>
          <div class="drag-card" draggable="true" data-value="60" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: grab; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">60°</div>
          <div class="drag-card" draggable="true" data-value="70" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: grab; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">70°</div>
          <div class="drag-card" draggable="true" data-value="90" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: grab; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">90°</div>
        </div>
      </div>
    `;
    this.cards = this.container.querySelectorAll(".drag-card");
    this.zones = this.container.querySelectorAll(".dropzone");
    this.formula = document.getElementById("sum-formula");
  }

  bindEvents() {
    this.dragStartHandler = (e) => {
      this.draggedValue = e.target.getAttribute("data-value");
      e.dataTransfer.setData("text/plain", this.draggedValue);
      e.target.style.opacity = "0.5";
    };

    this.dragEndHandler = (e) => {
      e.target.style.opacity = "1";
    };

    this.dragOverHandler = (e) => {
      e.preventDefault();
    };

    this.dropHandler = (e) => {
      e.preventDefault();
      const zoneId = e.target.id;
      const val = parseInt(e.dataTransfer.getData("text/plain"));

      e.target.innerText = val + "°";
      e.target.style.background = "rgba(212,175,55,0.2)";
      e.target.style.borderColor = "#d4af37";
      e.target.style.color = "#fff";
      e.target.style.borderStyle = "solid";

      if (zoneId === "drop-zone-B") this.solved.zoneB = val;
      if (zoneId === "drop-zone-C") this.solved.zoneC = val;

      this.render();

      if (this.checkAnswer()) {
        setTimeout(() => {
          alert(`축하합니다! 50° + ${this.solved.zoneB}° + ${this.solved.zoneC}° = 180°가 완성되어 제단의 봉인이 풀렸습니다.`);
          if (this.onClearCallback) {
            this.onClearCallback();
          } else {
            const clearBtn = document.getElementById("mock-puzzle-clear-btn");
            if (clearBtn) clearBtn.click();
          }
        }, 300);
      }
    };

    this.cards.forEach(card => {
      card.addEventListener("dragstart", this.dragStartHandler);
      card.addEventListener("dragend", this.dragEndHandler);
    });

    this.zones.forEach(zone => {
      zone.addEventListener("dragover", this.dragOverHandler);
      zone.addEventListener("drop", this.dropHandler);
    });
  }

  render() {
    if (this.formula) {
      const bStr = this.solved.zoneB ? `${this.solved.zoneB}°` : "B";
      const cStr = this.solved.zoneC ? `${this.solved.zoneC}°` : "C";
      const total = this.fixedAngle + (this.solved.zoneB || 0) + (this.solved.zoneC || 0);
      this.formula.innerHTML = `식: 50° + ${bStr} + ${cStr} = <strong style="color: ${total === 180 ? '#2ecc71' : '#ff4757'}">${total}°</strong>`;
    }
  }

  checkAnswer() {
    if (!this.solved.zoneB || !this.solved.zoneC) return false;
    return (this.fixedAngle + this.solved.zoneB + this.solved.zoneC) === 180;
  }

  reset() {
    this.solved = { zoneB: null, zoneC: null };
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.cards) {
      this.cards.forEach(card => {
        card.removeEventListener("dragstart", this.dragStartHandler);
        card.removeEventListener("dragend", this.dragEndHandler);
      });
    }
    if (this.zones) {
      this.zones.forEach(zone => {
        zone.removeEventListener("dragover", this.dragOverHandler);
        zone.removeEventListener("drop", this.dropHandler);
      });
    }
    this.container.innerHTML = "";
  }
}

// 퍼즐 등록
PuzzleManager.register(4, Stage4Puzzle);
</script>
