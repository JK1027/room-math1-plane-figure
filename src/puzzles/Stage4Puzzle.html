<script>
/**
 * 4스테이지 삼각형 내각의 합 퍼즐 클래스.
 * 대형 드롭존(64x38px), 6선택지, 꼭짓점 밀착 정렬, 중앙 실시간 합계(glow) 가이드 적용.
 */
class Stage4Puzzle extends PuzzleBase {
  constructor(containerId) {
    super(containerId);
    this.fixedAngle = 50;
    // 정답 조합: B=60, C=70 (도형의 비대칭 예각 형태에 정밀 매칭)
    this.solved = { zoneB: null, zoneC: null };
    this.onClearCallback = null;
    this.selectedCard = null;
  }

  init() {
    this.container.innerHTML = `
      <div style="text-align: center; width: 100%; padding: 15px; user-select: none;">
        <p style="color: var(--gold-primary); margin-bottom: 12px; font-size: 0.9rem;">
          각도 카드를 선택한 뒤, 빈칸(각 B 또는 각 C)을 클릭하여 채워 넣으세요.
        </p>
        
        <!-- 삼각형 보드판 -->
        <div style="position: relative; width: 280px; height: 180px; margin: 0 auto; background: #0b131f; border: 2px solid var(--gold-primary); border-radius: 8px; box-shadow: 0 0 15px var(--gold-glow);">
          <!-- SVG 삼각형 외곽선 및 호 데코 -->
          <svg width="280" height="180" style="position: absolute; top:0; left:0; pointer-events: none;">
            <polygon points="140,20 40,145 240,145" fill="none" stroke="var(--gold-primary)" stroke-width="3" />
            <!-- 각 A(50) 가이드 호 -->
            <path d="M 125,40 A 20,20 0 0,0 155,40" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
            <!-- 각 B 가이드 호 -->
            <path d="M 58,145 A 20,20 0 0,0 52,128" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
            <!-- 각 C 가이드 호 -->
            <path d="M 222,145 A 20,20 0 0,1 228,128" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
          </svg>
          
          <!-- 각 A (고정 50도) -->
          <div style="position: absolute; top: 38px; left: 128px; font-size: 0.95rem; color: #fff; font-weight: bold;">50°</div>
          
          <!-- 각 B 드롭존 (꼭짓점 B 주변 배치) -->
          <div id="drop-zone-B" class="dropzone" style="position: absolute; top: 104px; left: 24px; width: 64px; height: 38px; border: 2px dashed var(--gold-primary); border-radius: 6px; font-size: 0.9rem; font-weight: bold; text-align: center; line-height: 34px; color: var(--gold-primary); background: rgba(0,0,0,0.65); cursor: pointer; transition: all 0.2s;">B</div>
          <div style="position: absolute; top: 144px; left: 42px; font-size: 0.65rem; color: var(--gold-primary); font-weight:bold;">각 B</div>
          
          <!-- 각 C 드롭존 (꼭짓점 C 주변 배치) -->
          <div id="drop-zone-C" class="dropzone" style="position: absolute; top: 104px; left: 192px; width: 64px; height: 38px; border: 2px dashed var(--gold-primary); border-radius: 6px; font-size: 0.9rem; font-weight: bold; text-align: center; line-height: 34px; color: var(--gold-primary); background: rgba(0,0,0,0.65); cursor: pointer; transition: all 0.2s;">C</div>
          <div style="position: absolute; top: 144px; left: 211px; font-size: 0.65rem; color: var(--gold-primary); font-weight:bold;">각 C</div>
          
          <!-- 중앙 실시간 합계 디스플레이 (Glow 효과 추가) -->
          <div id="sum-formula" style="position: absolute; top: 62px; left: 0; width: 100%; text-align: center; font-size: 0.85rem; font-weight: bold;">
            식: 50° + B + C = 0°
          </div>
        </div>
        
        <!-- 카드 후보 (6종으로 확대) -->
        <div style="margin-top: 15px; display: flex; justify-content: center; gap: 8px;">
          <div class="drag-card" data-value="40" style="width: 42px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">40°</div>
          <div class="drag-card" data-value="60" style="width: 42px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">60°</div>
          <div class="drag-card" data-value="70" style="width: 42px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">70°</div>
          <div class="drag-card" data-value="80" style="width: 42px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">80°</div>
          <div class="drag-card" data-value="90" style="width: 42px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">90°</div>
          <div class="drag-card" data-value="100" style="width: 42px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">100°</div>
        </div>
      </div>
    `;
    this.cards = this.container.querySelectorAll(".drag-card");
    this.zones = this.container.querySelectorAll(".dropzone");
    this.formula = document.getElementById("sum-formula");
    this.selectedCard = null;
    
    this.render();
  }

  bindEvents() {
    this.cardClickHandler = (e) => {
      this.cards.forEach(c => {
        c.style.borderColor = "var(--gold-primary)";
        c.style.background = "#1b263b";
        c.style.boxShadow = "0 4px 6px rgba(0,0,0,0.3)";
      });
      this.selectedCard = e.currentTarget;
      this.selectedCard.style.borderColor = "#ff4757";
      this.selectedCard.style.background = "rgba(255, 71, 87, 0.2)";
      this.selectedCard.style.boxShadow = "0 0 10px rgba(255, 71, 87, 0.6)";
    };

    this.zoneClickHandler = (e) => {
      if (!this.selectedCard) {
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showWarning("먼저 아래 각도 카드 중 하나를 선택한 뒤 빈칸을 클릭해 주세요.");
        }
        return;
      }

      const zoneId = e.currentTarget.id;
      const val = parseInt(this.selectedCard.getAttribute("data-value"));

      e.currentTarget.textContent = val + "°";
      e.currentTarget.style.background = "rgba(212,175,55,0.25)";
      e.currentTarget.style.borderColor = "var(--gold-primary)";
      e.currentTarget.style.color = "#fff";
      e.currentTarget.style.borderStyle = "solid";

      if (zoneId === "drop-zone-B") this.solved.zoneB = val;
      if (zoneId === "drop-zone-C") this.solved.zoneC = val;

      this.render();

      if (this.checkAnswer()) {
        this.zones.forEach(z => z.style.borderColor = "#2ecc71");
        
        setTimeout(() => {
          if (typeof FeedbackSystem !== "undefined") {
            FeedbackSystem.showSuccess(`정답입니다! 50° + ${this.solved.zoneB}° + ${this.solved.zoneC}° = 180°가 완성되어 제단의 봉인이 풀렸습니다.`);
          }
          if (this.onClearCallback) {
            this.onClearCallback();
          } else {
            const clearBtn = document.getElementById("mock-puzzle-clear-btn");
            if (clearBtn) clearBtn.click();
          }
        }, 300);
      } else {
        // 둘 다 값이 찼을 때 오답인 경우 판정 안내
        if (this.solved.zoneB && this.solved.zoneC) {
          if (typeof PuzzleState !== "undefined") {
            PuzzleState.wrongCount += 1;
            EventBus.publish("stateChange:puzzle", PuzzleState);
          }

          const sum = 50 + this.solved.zoneB + this.solved.zoneC;
          
          if (typeof FeedbackSystem !== "undefined") {
            if (sum === 180) {
              // 40 + 90과 같이 180은 맞지만 도형 형태(비대칭 예각삼각형)상 안 맞는 함정
              FeedbackSystem.showError(`세 각의 합(${sum}°)은 맞으나, 도형의 생김새(예각삼각형)를 보세요. 직각(90°)이나 둔각 카드는 각 B나 C에 적합하지 않습니다. 다시 조합해 보세요.`);
            } else {
              FeedbackSystem.showError(`틀렸습니다! 세 각의 합이 ${sum}°입니다. 삼각형 내각의 합은 항상 180°가 되어야 합니다.`);
            }
          }
        }
      }
    };

    this.cards.forEach(card => {
      card.addEventListener("click", this.cardClickHandler);
    });

    this.zones.forEach(zone => {
      zone.addEventListener("click", this.zoneClickHandler);
    });
  }

  render() {
    if (this.formula) {
      const bStr = this.solved.zoneB ? `${this.solved.zoneB}°` : "B";
      const cStr = this.solved.zoneC ? `${this.solved.zoneC}°` : "C";
      const total = 50 + (this.solved.zoneB || 0) + (this.solved.zoneC || 0);
      
      let color = "var(--text-muted)";
      let glow = "none";
      if (this.solved.zoneB && this.solved.zoneC) {
        if (total === 180) {
          // B=60, C=70 일 때만 최종 녹색 처리
          const isValidShape = (this.solved.zoneB === 60 && this.solved.zoneC === 70) || (this.solved.zoneB === 70 && this.solved.zoneC === 60);
          color = isValidShape ? "#2ecc71" : "#f1c40f"; // 합만 맞으면 주황, 형태도 맞으면 초록
          glow = isValidShape ? "0 0 10px rgba(46,204,113,0.5)" : "none";
        } else {
          color = "#ff4757";
          glow = "0 0 10px rgba(255,71,87,0.5)";
        }
      }
      
      this.formula.innerHTML = `
        <span style="color: #fff;">∑ = </span>
        <span style="color: ${color}; text-shadow: ${glow}; font-size: 1.15rem;">${total}°</span>
        <div style="font-size: 0.72rem; color: var(--text-muted); margin-top: 4px;">
          50° + ${bStr} + ${cStr} = 180°
        </div>
      `;
    }
  }

  checkAnswer() {
    if (!this.solved.zoneB || !this.solved.zoneC) return false;
    // 50 + B + C = 180 이면서, 예각삼각형 형태 제약 (B=60, C=70 또는 B=70, C=60)
    const isSumCorrect = (50 + this.solved.zoneB + this.solved.zoneC) === 180;
    const isShapeCorrect = (this.solved.zoneB === 60 && this.solved.zoneC === 70) || (this.solved.zoneB === 70 && this.solved.zoneC === 60);
    return isSumCorrect && isShapeCorrect;
  }

  reset() {
    this.solved = { zoneB: null, zoneC: null };
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.cards) {
      this.cards.forEach(card => {
        card.removeEventListener("click", this.cardClickHandler);
      });
    }
    if (this.zones) {
      this.zones.forEach(zone => {
        zone.removeEventListener("click", this.zoneClickHandler);
      });
    }
    this.container.innerHTML = "";
  }
}

// 퍼즐 등록
PuzzleManager.register(4, Stage4Puzzle);
</script>
