<script>
/**
 * 4스테이지 삼각형 내각의 합 조각 맞추기 퍼즐 클래스.
 */
class Stage4Puzzle extends PuzzleBase {
  constructor(containerId) {
    super(containerId);
    this.fixedAngle = 50;
    this.solved = { zoneB: null, zoneC: null };
    this.draggedValue = null;
    this.onClearCallback = null;
  }

  init() {
    this.container.innerHTML = `
      <div style="text-align: center; width: 100%; padding: 15px; user-select: none;">
        <p style="color: #d4af37; margin-bottom: 10px; font-size: 0.9rem;">각도 카드를 클릭한 뒤, 빈칸(각 B 또는 각 C)을 클릭하여 채워 넣으세요.</p>
        
        <!-- 삼각형 보드판 -->
        <div style="position: relative; width: 280px; height: 180px; margin: 0 auto; background: #0b131f; border: 1px solid #d4af37; border-radius: 8px;">
          <!-- SVG 삼각형 외곽선 -->
          <svg width="280" height="180" style="position: absolute; top:0; left:0;">
            <polygon points="140,20 40,145 240,145" fill="none" stroke="#d4af37" stroke-width="3" />
          </svg>
          
          <!-- 각 A (고정 50도) -->
          <div style="position: absolute; top: 32px; left: 128px; font-size: 0.95rem; color: #fff; font-weight: bold;">50°</div>
          
          <!-- 각 B 드롭존 -->
          <div id="drop-zone-B" class="dropzone" style="position: absolute; top: 110px; left: 55px; width: 44px; height: 26px; border: 2px dashed #d4af37; border-radius: 4px; font-size: 0.8rem; text-align: center; line-height: 22px; color: #a5a5a5; background: rgba(0,0,0,0.5); cursor: pointer;">B</div>
          <div style="position: absolute; top: 140px; left: 63px; font-size: 0.65rem; color: #d4af37; font-weight:bold;">각 B</div>
          
          <!-- 각 C 드롭존 -->
          <div id="drop-zone-C" class="dropzone" style="position: absolute; top: 110px; left: 181px; width: 44px; height: 26px; border: 2px dashed #d4af37; border-radius: 4px; font-size: 0.8rem; text-align: center; line-height: 22px; color: #a5a5a5; background: rgba(0,0,0,0.5); cursor: pointer;">C</div>
          <div style="position: absolute; top: 140px; left: 190px; font-size: 0.65rem; color: #d4af37; font-weight:bold;">각 C</div>
          
          <div id="sum-formula" style="position: absolute; top: 156px; left: 0; width: 100%; text-align: center; font-size: 0.75rem; color: #a5a5a5;">
            식: 50° + B + C = 180°
          </div>
        </div>
        
        <!-- 카드 후보 -->
        <div style="margin-top: 15px; display: flex; justify-content: center; gap: 10px;">
          <div class="drag-card" data-value="40" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">40°</div>
          <div class="drag-card" data-value="60" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">60°</div>
          <div class="drag-card" data-value="70" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">70°</div>
          <div class="drag-card" data-value="90" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">90°</div>
        </div>
      </div>
    `;
    this.cards = this.container.querySelectorAll(".drag-card");
    this.zones = this.container.querySelectorAll(".dropzone");
    this.formula = document.getElementById("sum-formula");
    this.selectedCard = null;
  }

  bindEvents() {
    this.cardClickHandler = (e) => {
      // 모든 카드의 선택 스타일 제거
      this.cards.forEach(c => {
        c.style.borderColor = "#d4af37";
        c.style.background = "#1b263b";
        c.style.boxShadow = "0 4px 6px rgba(0,0,0,0.3)";
      });
      // 선택 카드 지정 및 스타일 적용
      this.selectedCard = e.currentTarget;
      this.selectedCard.style.borderColor = "#ff4757";
      this.selectedCard.style.background = "rgba(255, 71, 87, 0.2)";
      this.selectedCard.style.boxShadow = "0 0 10px rgba(255, 71, 87, 0.6)";
    };

    this.zoneClickHandler = (e) => {
      if (!this.selectedCard) {
        alert("먼저 아래 각도 카드 중 하나를 선택한 뒤 빈칸을 클릭해 주세요.");
        return;
      }

      const zoneId = e.currentTarget.id;
      const val = parseInt(this.selectedCard.getAttribute("data-value"));

      e.currentTarget.innerText = val + "°";
      e.currentTarget.style.background = "rgba(212,175,55,0.2)";
      e.currentTarget.style.borderColor = "#d4af37";
      e.currentTarget.style.color = "#fff";
      e.currentTarget.style.borderStyle = "solid";

      if (zoneId === "drop-zone-B") this.solved.zoneB = val;
      if (zoneId === "drop-zone-C") this.solved.zoneC = val;

      this.render();

      if (this.checkAnswer()) {
        setTimeout(() => {
          alert(`축하합니다! 50° + ${this.solved.zoneB}° + ${this.solved.zoneC}° = 180°가 완성되어 제단의 봉인이 풀렸습니다.`);
          if (this.onClearCallback) {
            this.onClearCallback();
          } else {
            const clearBtn = document.getElementById("mock-puzzle-clear-btn");
            if (clearBtn) clearBtn.click();
          }
        }, 300);
      } else {
        // 둘 다 값이 차있는데 틀린 경우 오답 카운팅 및 안내
        if (this.solved.zoneB && this.solved.zoneC) {
          if (typeof PuzzleState !== "undefined") {
            PuzzleState.wrongCount += 1;
            EventBus.publish("stateChange:puzzle", PuzzleState);
          }
          alert("세 내각의 크기의 합이 180°가 되지 않습니다. 다시 구성해 보세요.");
        }
      }
    };

    this.cards.forEach(card => {
      card.addEventListener("click", this.cardClickHandler);
    });

    this.zones.forEach(zone => {
      zone.addEventListener("click", this.zoneClickHandler);
    });
  }

  render() {
    if (this.formula) {
      const bStr = this.solved.zoneB ? `${this.solved.zoneB}°` : "B";
      const cStr = this.solved.zoneC ? `${this.solved.zoneC}°` : "C";
      const total = this.fixedAngle + (this.solved.zoneB || 0) + (this.solved.zoneC || 0);
      this.formula.innerHTML = `식: 50° + ${bStr} + ${cStr} = <strong style="color: ${total === 180 ? '#2ecc71' : '#ff4757'}">${total}°</strong>`;
    }
  }

  checkAnswer() {
    if (!this.solved.zoneB || !this.solved.zoneC) return false;
    return (this.fixedAngle + this.solved.zoneB + this.solved.zoneC) === 180;
  }

  reset() {
    this.solved = { zoneB: null, zoneC: null };
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.cards) {
      this.cards.forEach(card => {
        card.removeEventListener("click", this.cardClickHandler);
      });
    }
    if (this.zones) {
      this.zones.forEach(zone => {
        zone.removeEventListener("click", this.zoneClickHandler);
      });
    }
    this.container.innerHTML = "";
  }
}

// 퍼즐 등록
PuzzleManager.register(4, Stage4Puzzle);
</script>
