<script>
/**
 * 3스테이지 평행선 성질 레이저 프리즘 굴절 퍼즐 클래스.
 */
class Stage3Puzzle extends PuzzleBase {
  constructor(containerId) {
    super(containerId);
    this.targetAngle = 75;
    this.currentAngle = 45;
    this.sliderHandler = null;
    this.onClearCallback = null;
  }

  init() {
    this.container.innerHTML = `
      <div style="text-align: center; width: 100%; padding: 15px;">
        <p style="color: #d4af37; margin-bottom: 10px; font-size: 0.9rem;">평행선 사이에 가상 보조선을 그어 각도를 유추하고 거울 각도를 맞추세요.</p>
        
        <div style="position: relative; display: inline-block;">
          <svg id="stage3-svg" width="260" height="200" style="background:#0b131f; border: 1.5px solid #d4af37; border-radius: 8px;">
            <!-- 좌측 평행 기둥 -->
            <line x1="40" y1="20" x2="40" y2="180" stroke="#a5a5a5" stroke-width="4" stroke-dasharray="3" />
            <!-- 우측 평행 기둥 -->
            <line x1="220" y1="20" x2="220" y2="180" stroke="#a5a5a5" stroke-width="4" stroke-dasharray="3" />
            
            <!-- 보조 가이드 평행선 -->
            <line x1="40" y1="100" x2="220" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="4" />
            
            <!-- 레이저 발사대 및 수신 보석 -->
            <circle cx="40" cy="40" r="8" fill="#a5a5a5" />
            <polygon points="220,150 228,158 220,166 212,158" fill="#00d2d3" />
            
            <!-- 꺾임점의 조작 거울 -->
            <line id="stage3-mirror" x1="120" y1="100" x2="140" y2="100" stroke="#d4af37" stroke-width="5" stroke-linecap="round" />
            <circle cx="130" cy="100" r="4" fill="#d4af37" />
            
            <!-- 레이저 빔 (성공 경로) -->
            <polyline id="stage3-laser" points="40,40 130,100 220,160" stroke="#ff4757" stroke-width="2" stroke-dasharray="2" style="display:none;" />
            <!-- 레이저 빔 (실패 시 반사 연출선) -->
            <line id="stage3-fail-beam" x1="130" y1="100" x2="220" y2="40" stroke="#ff4757" stroke-width="2" stroke-dasharray="2" />
            
            <!-- 평행선 사이 엇각 유도 텍스트 -->
            <text x="50" y="36" fill="#a5a5a5" font-size="10">45°</text>
            <text x="182" y="146" fill="#a5a5a5" font-size="10">30°</text>
          </svg>
        </div>
        
        <div style="margin-top: 10px;">
          <input type="range" id="stage3-slider" min="15" max="135" value="45" style="width: 80%; accent-color: #d4af37;">
          <div style="margin-top: 5px; font-size: 0.9rem; color: #a5a5a5;" id="stage3-angle-info">
            거울 반사각: 45° | 목표각(A+B): 75°
          </div>
        </div>
      </div>
    `;
    this.slider = document.getElementById("stage3-slider");
    this.mirror = document.getElementById("stage3-mirror");
    this.laser = document.getElementById("stage3-laser");
    this.failBeam = document.getElementById("stage3-fail-beam");
    this.angleInfo = document.getElementById("stage3-angle-info");
    
    // 초기 렌더링 반영
    this.render();
  }

  bindEvents() {
    this.sliderHandler = (e) => {
      this.currentAngle = parseInt(e.target.value);
      this.render();
      
      if (this.checkAnswer()) {
        this.slider.disabled = true;
        if (this.laser) this.laser.style.display = "block";
        if (this.failBeam) this.failBeam.style.display = "none";
        
        setTimeout(() => {
          alert("거울 각도가 일치하여 레이저가 수신 보석에 명중했습니다! 문이 열립니다.");
          if (this.onClearCallback) {
            this.onClearCallback();
          } else {
            const clearBtn = document.getElementById("mock-puzzle-clear-btn");
            if (clearBtn) clearBtn.click();
          }
        }, 500);
      } else {
        if (this.laser) this.laser.style.display = "none";
        if (this.failBeam) this.failBeam.style.display = "block";
      }
    };
    if (this.slider) {
      this.slider.addEventListener("input", this.sliderHandler);
    }
  }

  render() {
    if (this.mirror) {
      this.mirror.setAttribute("transform", `rotate(${this.currentAngle - 45} 130 100)`);
    }
    if (this.angleInfo) {
      this.angleInfo.innerHTML = `거울 반사각: <strong style="color:#d4af37;">${this.currentAngle}°</strong> | 목표각(A+B): <strong>75°</strong>`;
    }
    if (this.failBeam) {
      // 각도 변화에 따라 실패 반사 빔의 끝점 좌표 변환 연출
      const angleRad = (this.currentAngle - 45) * Math.PI / 180;
      const targetX = 130 + Math.cos(angleRad) * 90;
      const targetY = 100 + Math.sin(angleRad) * 90;
      this.failBeam.setAttribute("x2", targetX);
      this.failBeam.setAttribute("y2", targetY);
    }
  }

  checkAnswer() {
    return Math.abs(this.currentAngle - this.targetAngle) <= 1;
  }

  reset() {
    if (this.slider) {
      this.slider.disabled = false;
      this.slider.value = 45;
      this.currentAngle = 45;
      this.render();
    }
  }

  destroy() {
    if (this.slider && this.sliderHandler) {
      this.slider.removeEventListener("input", this.sliderHandler);
    }
    this.container.innerHTML = "";
  }
}

// 퍼즐 등록
PuzzleManager.register(3, Stage3Puzzle);
</script>
