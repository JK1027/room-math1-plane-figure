<script>
/**
 * 2스테이지 동위각·엇각 드래그 매칭 퍼즐 클래스.
 */
class Stage2Puzzle extends PuzzleBase {
  constructor(containerId) {
    super(containerId);
    this.solved = { zoneA: false, zoneB: false };
    this.draggedValue = null;
    this.onClearCallback = null;
  }

  init() {
    this.container.innerHTML = `
      <div style="text-align: center; width: 100%; padding: 15px; user-select: none;">
        <p style="color: #d4af37; margin-bottom: 10px; font-size: 0.9rem;">각도 카드를 드래그하여 알맞은 동위각(A)과 엇각(B) 자리에 놓으세요.</p>
        
        <!-- 게임판 -->
        <div style="position: relative; width: 280px; height: 180px; margin: 0 auto; background: #0b131f; border: 1px solid #d4af37; border-radius: 8px; overflow: hidden;">
          <!-- 평행 레일 1 -->
          <div style="position: absolute; top: 50px; left: 20px; width: 240px; height: 3px; background: #a5a5a5;"></div>
          <!-- 평행 레일 2 -->
          <div style="position: absolute; top: 120px; left: 20px; width: 240px; height: 3px; background: #a5a5a5;"></div>
          <!-- 횡단선 (60도 경사) -->
          <div style="position: absolute; top: 10px; left: 150px; width: 4px; height: 150px; background: #ff4757; transform: rotate(-30deg); transform-origin: top center;"></div>
          
          <!-- 기준각 (60도) 표시 -->
          <div style="position: absolute; top: 22px; left: 105px; font-size: 0.85rem; color: #ff4757; font-weight: bold;">60°</div>
          
          <!-- 드롭존 A (동위각 자리) -->
          <div id="drop-zone-A" class="dropzone" style="position: absolute; top: 95px; left: 100px; width: 40px; height: 24px; border: 2px dashed #d4af37; border-radius: 4px; font-size: 0.8rem; text-align: center; line-height: 20px; color: #a5a5a5; background: rgba(0,0,0,0.4);">A</div>
          <div style="position: absolute; top: 76px; left: 104px; font-size: 0.65rem; color: #d4af37; font-weight:bold;">동위각</div>
          
          <!-- 드롭존 B (엇각 자리) -->
          <div id="drop-zone-B" class="dropzone" style="position: absolute; top: 95px; left: 160px; width: 40px; height: 24px; border: 2px dashed #d4af37; border-radius: 4px; font-size: 0.8rem; text-align: center; line-height: 20px; color: #a5a5a5; background: rgba(0,0,0,0.4);">B</div>
          <div style="position: absolute; top: 76px; left: 166px; font-size: 0.65rem; color: #d4af37; font-weight:bold;">엇각</div>
        </div>
        
        <!-- 드래그 카드들 -->
        <div style="margin-top: 15px; display: flex; justify-content: center; gap: 15px;">
          <div class="drag-card" draggable="true" data-value="60" style="width: 55px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: grab; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">60°</div>
          <div class="drag-card" draggable="true" data-value="120" style="width: 55px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: grab; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">120°</div>
        </div>
      </div>
    `;
    this.cards = this.container.querySelectorAll(".drag-card");
    this.zones = this.container.querySelectorAll(".dropzone");
  }

  bindEvents() {
    this.dragStartHandler = (e) => {
      this.draggedValue = e.target.getAttribute("data-value");
      e.dataTransfer.setData("text/plain", this.draggedValue);
      e.target.style.opacity = "0.5";
    };

    this.dragEndHandler = (e) => {
      e.target.style.opacity = "1";
    };

    this.dragOverHandler = (e) => {
      e.preventDefault();
    };

    this.dropHandler = (e) => {
      e.preventDefault();
      const zoneId = e.target.id;
      const val = e.dataTransfer.getData("text/plain");

      if (val === "60") {
        e.target.innerText = "60°";
        e.target.style.background = "rgba(212,175,55,0.2)";
        e.target.style.borderColor = "#d4af37";
        e.target.style.color = "#fff";
        e.target.style.borderStyle = "solid";
        
        if (zoneId === "drop-zone-A") this.solved.zoneA = true;
        if (zoneId === "drop-zone-B") this.solved.zoneB = true;

        if (this.checkAnswer()) {
          setTimeout(() => {
            alert("정답입니다! 동위각과 엇각의 크기가 같음이 입증되어 회랑의 철창이 올라갔습니다.");
            if (this.onClearCallback) {
              this.onClearCallback();
            } else {
              const clearBtn = document.getElementById("mock-puzzle-clear-btn");
              if (clearBtn) clearBtn.click();
            }
          }, 300);
        }
      } else {
        alert("정답이 아닙니다. 동위각과 엇각은 평행선 조건에서 기준각과 크기가 같습니다.");
      }
    };

    this.cards.forEach(card => {
      card.addEventListener("dragstart", this.dragStartHandler);
      card.addEventListener("dragend", this.dragEndHandler);
    });

    this.zones.forEach(zone => {
      zone.addEventListener("dragover", this.dragOverHandler);
      zone.addEventListener("drop", this.dropHandler);
    });
  }

  checkAnswer() {
    return this.solved.zoneA && this.solved.zoneB;
  }

  reset() {
    this.solved = { zoneA: false, zoneB: false };
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.cards) {
      this.cards.forEach(card => {
        card.removeEventListener("dragstart", this.dragStartHandler);
        card.removeEventListener("dragend", this.dragEndHandler);
      });
    }
    if (this.zones) {
      this.zones.forEach(zone => {
        zone.removeEventListener("dragover", this.dragOverHandler);
        zone.removeEventListener("drop", this.dropHandler);
      });
    }
    this.container.innerHTML = "";
  }
}

// 퍼즐 등록
PuzzleManager.register(2, Stage2Puzzle);
</script>
