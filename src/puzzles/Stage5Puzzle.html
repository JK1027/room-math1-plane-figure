<script>
/**
 * 5스테이지 삼각형의 성질 퍼즐 클래스.
 * Substage 1: 삼각형 내각의 합(180도) 카드 드롭 퍼즐
 * Substage 2: 삼각형의 외각 성질을 이용한 각도 x 계산 퍼즐
 */
class Stage5Puzzle extends PuzzleBase {
  constructor(containerId) {
    super(containerId);
    this.substage = 1;
    this.fixedAngle = 50;
    this.solved = { zoneB: null, zoneC: null }; // Substage 1용
    this.inputX = ""; // Substage 2용
    this.targetX = 110; // 50 + 60 = 110
    this.onClearCallback = null;
    this.selectedCard = null;
    
    this.cardClickHandler = null;
    this.zoneClickHandler = null;
    this.sub2InputHandler = null;
    this.sub2SubmitHandler = null;
  }

  init() {
    if (this.substage === 1) {
      this.initSubstage1();
    } else {
      this.initSubstage2();
    }
  }

  initSubstage1() {
    this.container.innerHTML = `
      <div style="text-align: center; width: 100%; padding: 15px; user-select: none;">
        <p style="color: var(--gold-primary); margin-bottom: 12px; font-size: 0.9rem;">
          [Part 1] 각도 카드를 선택한 뒤, 빈칸(각 B 또는 각 C)을 클릭하여 채워 넣으세요.
        </p>
        
        <div style="position: relative; width: 280px; height: 190px; margin: 0 auto; background: #0b131f; border: 2px solid var(--gold-primary); border-radius: 8px; box-shadow: 0 0 15px var(--gold-glow);">
          <svg width="280" height="190" style="position: absolute; top:0; left:0; pointer-events: none;">
            <!-- 삼각형 A(위, 140,25), B(왼쪽 아래, 50,165), C(오른쪽 아래, 230,165) -->
            <polygon points="140,25 50,165 230,165" fill="none" stroke="var(--gold-primary)" stroke-width="2.5" />

            <!-- 각 A (50°) 호: 위 꼭짓점 내부 -->
            <path d="M 125,38 A 20,20 0 0,1 155,38" fill="none" stroke="#ff4757" stroke-width="2" />
            <text x="131" y="28" fill="#ff4757" font-size="11" font-weight="bold">50°</text>

            <!-- 각 B (B) 호: 왼쪽 아래 꼭짓점 내부 -->
            <path d="M 68,165 A 24,24 0 0,0 60,143" fill="none" stroke="var(--gold-light)" stroke-width="2" />

            <!-- 각 C (C) 호: 오른쪽 아래 꼭짓점 내부 -->
            <path d="M 212,165 A 24,24 0 0,1 220,143" fill="none" stroke="var(--gold-light)" stroke-width="2" />

            <!-- 합 표시 식 -->
            <text x="140" y="185" fill="var(--text-muted)" font-size="9" text-anchor="middle">A + B + C = 180°</text>
          </svg>
          
          <!-- A(50°) 위 꼭짓점 위 라벨 -->
          
          <!-- B 드롭존: 왼쪽 아래 -->
          <div id="drop-zone-B" class="dropzone" style="position: absolute; top: 110px; left: 10px; width: 50px; height: 30px; border: 2px dashed var(--gold-primary); border-radius: 6px; font-size: 0.85rem; font-weight: bold; text-align: center; line-height: 26px; color: var(--gold-primary); background: rgba(0,0,0,0.65); cursor: pointer; transition: all 0.2s;">B</div>
          <div style="position: absolute; top: 143px; left: 8px; font-size: 0.6rem; color: var(--gold-primary); font-weight:bold;">각 B</div>
          
          <!-- C 드롭존: 오른쪽 아래 -->
          <div id="drop-zone-C" class="dropzone" style="position: absolute; top: 110px; left: 218px; width: 50px; height: 30px; border: 2px dashed var(--gold-primary); border-radius: 6px; font-size: 0.85rem; font-weight: bold; text-align: center; line-height: 26px; color: var(--gold-primary); background: rgba(0,0,0,0.65); cursor: pointer; transition: all 0.2s;">C</div>
          <div style="position: absolute; top: 143px; left: 218px; font-size: 0.6rem; color: var(--gold-primary); font-weight:bold;">각 C</div>
          
          <div id="sum-formula" style="position: absolute; top: 52px; left: 0; width: 100%; text-align: center; font-size: 0.85rem; font-weight: bold;">
            식: 50° + B + C = 0°
          </div>
        </div>
        
        <div style="margin-top: 15px; display: flex; justify-content: center; gap: 8px;">
          <div class="drag-card" data-value="40" style="width: 42px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">40°</div>
          <div class="drag-card" data-value="60" style="width: 42px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">60°</div>
          <div class="drag-card" data-value="70" style="width: 42px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">70°</div>
          <div class="drag-card" data-value="80" style="width: 42px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">80°</div>
          <div class="drag-card" data-value="90" style="width: 42px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">90°</div>
          <div class="drag-card" data-value="100" style="width: 42px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">100°</div>
        </div>
      </div>
    `;
    this.cards = this.container.querySelectorAll(".drag-card");
    this.zones = this.container.querySelectorAll(".dropzone");
    this.formula = document.getElementById("sum-formula");
    this.selectedCard = null;
    this.render();
  }

  initSubstage2() {
    this.container.innerHTML = `
      <div style="text-align: center; width: 100%; padding: 15px; user-select: none;">
        <p style="color: var(--gold-primary); margin-bottom: 12px; font-size: 0.9rem;">
          [Part 2] 밑변의 연장선 끝에 생성된 <strong>외각 x</strong>의 크기를 계산하여 입력하세요.
        </p>
        
        <div style="position: relative; width: 280px; height: 180px; margin: 0 auto; background: #0b131f; border: 2px solid var(--gold-primary); border-radius: 8px; box-shadow: 0 0 15px var(--gold-glow);">
          <svg width="280" height="180" style="position: absolute; top:0; left:0; pointer-events: none;">
            <!-- 삼각형 ABC: A(위, 140,30), B(왼쪽 아래, 50,150), C(오른쪽 아래, 210,150) -->
            <polygon points="140,30 50,150 210,150" fill="none" stroke="var(--gold-primary)" stroke-width="3" />
            <!-- C에서 오른쪽으로 연장 (BC 연장선) -->
            <line x1="210" y1="150" x2="262" y2="150" stroke="rgba(255, 71, 87, 0.7)" stroke-width="3" stroke-dasharray="3 2" />

            <!-- 각 A (50°) 호: 위 꼭짓점 내부 -->
            <path d="M 127,42 A 18,18 0 0,1 153,42" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" />
            <text x="130" y="32" fill="#fff" font-size="11" font-weight="bold">50°</text>

            <!-- 각 B (60°) 호: 왼쪽 아래 꼭짓점 내부 -->
            <path d="M 68,150 A 22,22 0 0,0 60,130" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" />
            <text x="32" y="143" fill="#fff" font-size="11" font-weight="bold">60°</text>

            <!-- 외각 x 호: C(210,150)에서 연장선 위쪽으로 따라 큰 호 -->
            <path d="M 210,130 A 25,25 0 0,1 232,150" fill="none" stroke="#ff4757" stroke-width="2.5" />
            <text x="222" y="138" fill="#ff4757" font-size="14" font-weight="bold">x</text>

            <!-- 외각 설명 키 -->
            <text x="140" y="170" fill="var(--text-muted)" font-size="9" text-anchor="middle">외각 x = 이웃하지 않는 두 내각의 합</text>
          </svg>
        </div>

        <div style="margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 8px;">
          <span style="font-size: 0.95rem; color: #fff;">외각 x = </span>
          <input type="number" id="stage5-input-x" placeholder="x의 값" style="width: 80px; padding: 8px; text-align: center; font-size: 1rem; border: 1px solid var(--gold-primary); border-radius: 6px; background: rgba(0,0,0,0.5); color: #fff; outline:none;">
          <span style="font-size: 0.95rem; color: #fff;">°</span>
          <button id="stage5-submit-btn" class="btn" style="width: 70px; padding: 9px; font-size: 0.85rem; margin: 0;">확인</button>
        </div>
      </div>
    `;
    this.sub2Input = document.getElementById("stage5-input-x");
    this.sub2Submit = document.getElementById("stage5-submit-btn");
  }

  bindEvents() {
    if (this.substage === 1) {
      this.bindEventsSubstage1();
    } else {
      this.bindEventsSubstage2();
    }
  }

  bindEventsSubstage1() {
    this.cardClickHandler = (e) => {
      this.cards.forEach(c => {
        c.style.borderColor = "var(--gold-primary)";
        c.style.background = "#1b263b";
        c.style.boxShadow = "0 4px 6px rgba(0,0,0,0.3)";
      });
      this.selectedCard = e.currentTarget;
      this.selectedCard.style.borderColor = "#ff4757";
      this.selectedCard.style.background = "rgba(255, 71, 87, 0.2)";
      this.selectedCard.style.boxShadow = "0 0 10px rgba(255, 71, 87, 0.6)";
    };

    this.zoneClickHandler = (e) => {
      if (!this.selectedCard) {
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showWarning("먼저 아래 각도 카드 중 하나를 선택한 뒤 빈칸을 클릭해 주세요.");
        }
        return;
      }

      const zoneId = e.currentTarget.id;
      const val = parseInt(this.selectedCard.getAttribute("data-value"));

      e.currentTarget.textContent = val + "°";
      e.currentTarget.style.background = "rgba(212,175,55,0.25)";
      e.currentTarget.style.borderColor = "var(--gold-primary)";
      e.currentTarget.style.color = "#fff";
      e.currentTarget.style.borderStyle = "solid";

      if (zoneId === "drop-zone-B") this.solved.zoneB = val;
      if (zoneId === "drop-zone-C") this.solved.zoneC = val;

      this.render();

      if (this.checkAnswer()) {
        this.zones.forEach(z => z.style.borderColor = "#2ecc71");
        setTimeout(() => {
          if (this.onClearCallback) {
            this.onClearCallback();
          }
        }, 300);
      } else {
        if (this.solved.zoneB && this.solved.zoneC) {
          if (typeof PuzzleState !== "undefined") {
            PuzzleState.wrongCount += 1;
            EventBus.publish("stateChange:puzzle", PuzzleState);
          }
          const sum = 50 + this.solved.zoneB + this.solved.zoneC;
          if (typeof FeedbackSystem !== "undefined") {
            if (sum === 180) {
              FeedbackSystem.showError(`세 각의 합(${sum}°)은 맞으나, 도형의 생김새(예각삼각형)를 보세요. 직각(90°)이나 둔각 카드는 각 B나 C에 적합하지 않습니다. 다시 조합해 보세요.`);
            } else {
              FeedbackSystem.showError(`틀렸습니다! 세 각의 합이 ${sum}°입니다. 삼각형 내각의 합은 항상 180°가 되어야 합니다.`);
            }
          }
        }
      }
    };

    this.cards.forEach(card => {
      card.addEventListener("click", this.cardClickHandler);
    });

    this.zones.forEach(zone => {
      zone.addEventListener("click", this.zoneClickHandler);
    });
  }

  bindEventsSubstage2() {
    this.sub2InputHandler = (e) => {
      this.inputX = e.target.value;
    };

    this.sub2SubmitHandler = () => {
      const val = parseInt(this.inputX);
      if (val === this.targetX) {
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showSuccess("정답입니다! 삼각형의 한 외각은 이웃하지 않는 두 내각의 합과 같으므로 x = 50° + 60° = 110°가 맞습니다! (+5점)");
        }
        if (this.onClearCallback) {
          this.onClearCallback();
        }
      } else {
        if (typeof PuzzleState !== "undefined") {
          PuzzleState.wrongCount += 1;
          EventBus.publish("stateChange:puzzle", PuzzleState);
        }
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showError("틀렸습니다! 연장선 위의 외각 x는 삼각형 내부의 이웃하지 않는 두 각(50°, 60°)의 합과 같아야 합니다.");
        }
      }
    };

    if (this.sub2Input) this.sub2Input.addEventListener("input", this.sub2InputHandler);
    if (this.sub2Submit) this.sub2Submit.addEventListener("click", this.sub2SubmitHandler);
  }

  render() {
    if (this.substage === 1 && this.formula) {
      const bStr = this.solved.zoneB ? `${this.solved.zoneB}°` : "B";
      const cStr = this.solved.zoneC ? `${this.solved.zoneC}°` : "C";
      const total = 50 + (this.solved.zoneB || 0) + (this.solved.zoneC || 0);
      
      let color = "var(--text-muted)";
      let glow = "none";
      if (this.solved.zoneB && this.solved.zoneC) {
        if (total === 180) {
          const isValidShape = (this.solved.zoneB === 60 && this.solved.zoneC === 70) || (this.solved.zoneB === 70 && this.solved.zoneC === 60);
          color = isValidShape ? "#2ecc71" : "#f1c40f";
          glow = isValidShape ? "0 0 10px rgba(46,204,113,0.5)" : "none";
        } else {
          color = "#ff4757";
          glow = "0 0 10px rgba(255,71,87,0.5)";
        }
      }
      
      this.formula.innerHTML = `
        <span style="color: #fff;">∑ = </span>
        <span style="color: ${color}; text-shadow: ${glow}; font-size: 1.15rem;">${total}°</span>
        <div style="font-size: 0.72rem; color: var(--text-muted); margin-top: 4px;">
          50° + ${bStr} + ${cStr} = 180°
        </div>
      `;
    }
  }

  checkAnswer() {
    if (this.substage === 1) {
      if (!this.solved.zoneB || !this.solved.zoneC) return false;
      const isSumCorrect = (50 + this.solved.zoneB + this.solved.zoneC) === 180;
      const isShapeCorrect = (this.solved.zoneB === 60 && this.solved.zoneC === 70) || (this.solved.zoneB === 70 && this.solved.zoneC === 60);
      return isSumCorrect && isShapeCorrect;
    } else {
      return parseInt(this.inputX) === this.targetX;
    }
  }

  goNextSubstage() {
    if (this.substage === 1) {
      this.destroy();
      this.substage = 2;
      this.inputX = "";
      
      if (typeof SceneManager !== "undefined") {
        SceneManager.showScene("story", { stageId: "5_mid" });
      } else {
        this.init();
        this.bindEvents();
      }
      return true;
    }
    return false;
  }

  getHint(count) {
    if (this.substage === 1) {
      if (count === 1) return "삼각형의 가장 기초적인 성질인 세 내각의 총합을 기억해 보세요.";
      if (count === 2) return "삼각형 내부의 각들의 합은 언제나 180°입니다. 주어진 각이 50°이니 B + C = 130°가 되도록 채우되 예각 비율에 알맞게 각각 60°와 70°를 넣어보세요.";
      return this.getSolution();
    } else {
      if (count === 1) return "삼각형 밑변을 연장하여 생긴 외각 x는, 바로 이웃한 안쪽 각을 뺀 나머지 두 내각의 합과 같습니다.";
      if (count === 2) return "즉, x는 안쪽의 50°와 60°를 합친 크기와 완벽하게 같습니다. 이 성질을 수식으로 정리하면 x = 50 + 60 이 됩니다!";
      return this.getSolution();
    }
  }

  getSolution() {
    if (this.substage === 1) {
      return "삼각형 내각의 총합은 180°입니다. 각 A = 50°이므로 B + C = 130°여야 합니다. 예각삼각형 형태에 일치하도록 각 B = 60°(또는 70°), 각 C = 70°(또는 60°) 카드를 배치해야 합니다.";
    } else {
      return "삼각형의 외각 성질에 의해 외각 x는 이웃하지 않는 두 내각의 합인 50° + 60° = 110°가 됩니다.";
    }
  }

  getConceptText() {
    return "삼각형의 한 외각의 크기는 이웃하지 않는 두 내각의 크기의 합과 같습니다.";
  }

  reset() {
    this.solved = { zoneB: null, zoneC: null };
    this.inputX = "";
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.cards) {
      this.cards.forEach(card => {
        card.removeEventListener("click", this.cardClickHandler);
      });
    }
    if (this.zones) {
      this.zones.forEach(zone => {
        zone.removeEventListener("click", this.zoneClickHandler);
      });
    }
    if (this.sub2Input && this.sub2InputHandler) {
      this.sub2Input.removeEventListener("input", this.sub2InputHandler);
    }
    if (this.sub2Submit && this.sub2SubmitHandler) {
      this.sub2Submit.removeEventListener("click", this.sub2SubmitHandler);
    }
    this.container.innerHTML = "";
  }
}

// 퍼즐 등록
PuzzleManager.register(5, Stage5Puzzle);
</script>
