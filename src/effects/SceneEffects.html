<style>
/* ============================================================
   SceneEffects.html
   스테이지별 배경 레이어 CSS (CSS + SVG 완전 순수, 이미지 없음)
   ============================================================ */

/* ── 공통 배경 레이어 의사 요소 기반 ── */
.story-bg-layer::before,
.story-bg-layer::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ============================
   Stage 1: 거울의 숲
   초록 안개 + 위로 떠오르는 빛 입자
   ============================ */
.story-bg-layer[data-stage="1"] {
  background: radial-gradient(ellipse at bottom,
    var(--stage1-from) 0%, var(--stage1-to) 100%);
}
.story-bg-layer[data-stage="1"]::before {
  background:
    radial-gradient(circle 120px at 20% 80%, rgba(0,180,60,0.1) 0%, transparent 70%),
    radial-gradient(circle 80px  at 75% 60%, rgba(0,220,80,0.07) 0%, transparent 60%);
  animation: fogDrift 8s ease-in-out infinite alternate;
}
.story-bg-layer[data-stage="1"]::after {
  background:
    radial-gradient(circle 40px at 40% 90%, rgba(80,255,120,0.08) 0%, transparent 60%),
    radial-gradient(circle 25px at 65% 95%, rgba(60,255,100,0.06) 0%, transparent 50%);
  animation: floatUp 5s ease-in-out infinite;
  opacity: 0.6;
}

/* ============================
   Stage 2: 신전의 회랑
   기둥 실루엣 + 보랏빛 광원
   ============================ */
.story-bg-layer[data-stage="2"] {
  background: radial-gradient(ellipse at top,
    var(--stage2-from) 0%, var(--stage2-to) 100%);
}
.story-bg-layer[data-stage="2"]::before {
  /* 수직 기둥 실루엣 (CSS repeating gradient) */
  background:
    repeating-linear-gradient(
      to right,
      rgba(40,0,80,0.4) 0px, rgba(40,0,80,0.4) 6px,
      transparent 6px, transparent 48px
    ),
    linear-gradient(to top, rgba(80,0,140,0.2) 0%, transparent 60%);
}
.story-bg-layer[data-stage="2"]::after {
  background: radial-gradient(ellipse 50% 30% at 50% 0%,
    rgba(140,60,255,0.18) 0%, transparent 70%);
  animation: runeRingPulse 4s ease-in-out infinite;
}

/* ============================
   Stage 3: 빛의 신전
   레이저 빔 + 푸른 광원
   ============================ */
.story-bg-layer[data-stage="3"] {
  background: radial-gradient(ellipse at center,
    var(--stage3-from) 0%, var(--stage3-to) 100%);
}
.story-bg-layer[data-stage="3"]::before {
  background:
    repeating-linear-gradient(
      75deg,
      transparent 0px, transparent 38px,
      rgba(80,160,255,0.05) 38px, rgba(80,160,255,0.05) 40px,
      transparent 40px, transparent 78px
    );
  animation: fogDrift 10s linear infinite;
}
.story-bg-layer[data-stage="3"]::after {
  background:
    radial-gradient(ellipse 60% 40% at 50% 10%, rgba(80,180,255,0.2) 0%, transparent 70%),
    radial-gradient(ellipse 30% 20% at 30% 80%, rgba(60,120,255,0.12) 0%, transparent 60%);
  animation: runeRingPulse 3s ease-in-out infinite alternate;
}

/* ============================
   Stage 4: 마도사의 제단
   붉은 불꽃 맥동 + 어두운 그림자
   ============================ */
.story-bg-layer[data-stage="4"] {
  background: radial-gradient(ellipse at bottom,
    var(--stage4-from) 0%, var(--stage4-to) 100%);
}
.story-bg-layer[data-stage="4"]::before {
  background:
    radial-gradient(ellipse 80% 40% at 50% 100%,
      rgba(255,60,0,0.18) 0%, transparent 60%);
  animation: flamePulse 2s ease-in-out infinite alternate;
}
.story-bg-layer[data-stage="4"]::after {
  background:
    radial-gradient(circle 30px at 25% 85%, rgba(255,100,0,0.12) 0%, transparent 60%),
    radial-gradient(circle 20px at 70% 90%, rgba(255,80,0,0.1) 0%, transparent 50%);
  animation: floatUp 3s ease-in-out infinite;
}

/* ============================
   Stage 5: 마도사 알현실 (보스)
   자주빛 별빛 + 신비로운 광원
   ============================ */
.story-bg-layer[data-stage="5"] {
  background: radial-gradient(ellipse at top,
    var(--stage5-from) 0%, var(--stage5-to) 100%);
}
.story-bg-layer[data-stage="5"]::before {
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%,
      rgba(180,0,100,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 70%,
      rgba(120,0,160,0.12) 0%, transparent 50%);
  animation: runeRingPulse 5s ease-in-out infinite;
}
.story-bg-layer[data-stage="5"]::after {
  background:
    repeating-linear-gradient(
      45deg,
      transparent 0px, transparent 50px,
      rgba(180,60,255,0.03) 50px, rgba(180,60,255,0.03) 52px
    );
}

/* 불꽃 맥동 키프레임 (Stage4 전용) */
@keyframes flamePulse {
  from {
    opacity: 0.6;
    background: radial-gradient(ellipse 80% 40% at 50% 100%, rgba(255,60,0,0.18) 0%, transparent 60%);
  }
  to {
    opacity: 1;
    background: radial-gradient(ellipse 80% 50% at 50% 100%, rgba(255,100,0,0.28) 0%, transparent 65%);
  }
}
</style>
