<style>
/* ============================================================
   GlowEffects.html
   SVG Ripple + 마법진 정답 연출 CSS
   ============================================================ */

/* SVG Ripple 컨테이너 (JS가 동적 생성) */
.svg-ripple-container {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}

/* 황금 외광 버튼 강화 (btn-secondary) */
.btn-secondary:hover {
  background: rgba(212, 175, 55, 0.15);
  color: var(--gold-hover);
  box-shadow: 0 0 10px rgba(212, 175, 55, 0.4), 0 0 20px rgba(212, 175, 55, 0.15);
}

/* 퍼즐 정답 시 컨테이너 글로우 */
.puzzle-canvas-area.solved {
  animation: flashWhite 0.3s ease-out forwards;
  border: 1px solid rgba(212, 175, 55, 0.3);
  box-shadow: 0 0 30px rgba(212, 175, 55, 0.5), inset 0 0 20px rgba(212, 175, 55, 0.1);
}

/* 룬 문자 표시 (정답 연출 3단계) */
.rune-chars {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 22;
  font-size: 1.6rem;
  letter-spacing: 8px;
  color: var(--rune-glow);
  text-shadow: 0 0 12px var(--rune-glow);
  pointer-events: none;
  opacity: 0;
  white-space: nowrap;
}

.rune-chars.visible {
  animation: popIn 0.2s ease-out forwards;
}

.rune-chars.fading {
  animation: floatUp 0.3s ease-in forwards;
}
</style>

<script>
/* ============================================================
   GlowEffects.html
   SVG Ripple 생성 함수
   AnimationManager에서 호출됨
   ============================================================ */
function createSVGRipple(x, y, container) {
  if (!container) return;

  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.style.cssText = [
    "position:absolute",
    "left:" + x + "px",
    "top:" + y + "px",
    "width:0",
    "height:0",
    "overflow:visible",
    "pointer-events:none",
    "z-index:10"
  ].join(";");

  const circle = document.createElementNS(ns, "circle");
  circle.setAttribute("cx", "0");
  circle.setAttribute("cy", "0");
  circle.setAttribute("r", "5");
  circle.setAttribute("fill", "none");
  circle.setAttribute("stroke", "rgba(212,175,55,0.7)");
  circle.setAttribute("stroke-width", "2");

  svg.appendChild(circle);
  container.appendChild(svg);

  let start = null;
  const DURATION = 600; // ms

  function animateRipple(timestamp) {
    if (!start) start = timestamp;
    const progress = Math.min((timestamp - start) / DURATION, 1);
    const r = 5 + progress * 65;
    const opacity = 1 - progress;

    circle.setAttribute("r", r);
    circle.setAttribute("opacity", opacity);
    circle.setAttribute("stroke-width", 2 - progress * 1.5);

    if (progress < 1) {
      requestAnimationFrame(animateRipple);
    } else {
      svg.remove();
    }
  }

  requestAnimationFrame(animateRipple);
}
</script>
