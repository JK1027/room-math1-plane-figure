<script>
/**
 * 인트로 화면 씬 객체.
 */
const IntroScene = {
  enter: function(data) {
    console.log("[IntroScene] 진입");
    // 시작하기 버튼 바인딩
    const startBtn = document.getElementById("intro-start-btn");
    if (startBtn) {
      this.clickHandler = () => SceneManager.showScene("input");
      startBtn.addEventListener("click", this.clickHandler);
    }
  },
  exit: function() {
    console.log("[IntroScene] 이탈");
    const startBtn = document.getElementById("intro-start-btn");
    if (startBtn && this.clickHandler) {
      startBtn.removeEventListener("click", this.clickHandler);
    }
  }
};

// 씬 등록
SceneManager.register("intro", IntroScene);
</script>
