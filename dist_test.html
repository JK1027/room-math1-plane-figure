<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Geometry Escape: 기하의 성</title>
    <!-- CSS Include -->
    <style>
/* 폰트 로드 */
@import url("https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap");

:root {
  /* 기존 */
  --bg-color: #080f1a;
  --panel-bg: rgba(13, 27, 42, 0.75);
  --gold-primary: #d4af37;
  --gold-hover: #f3e5ab;
  --gold-glow: rgba(212, 175, 55, 0.35);
  --text-light: #e0e1dd;
  --text-muted: #8892b0;
  --border-gold: rgba(212, 175, 55, 0.3);
  --font-title: "Outfit", "Noto Sans KR", sans-serif;
  --font-body: "Noto Sans KR", sans-serif;

  /* 신규: 확장 색상 변수 */
  --gold-light: #fff0a0;
  --gold-dim: rgba(212, 175, 55, 0.15);
  --navy-deep: #040a14;
  --fog-color: rgba(100, 160, 255, 0.04);
  --rune-color: rgba(120, 200, 255, 0.12);
  --rune-glow: rgba(100, 180, 255, 0.4);

  /* 신규: 스테이지별 배경 변수 */
  --stage1-from: #001a0a;  /* 거울의 숲: 어두운 초록 */
  --stage1-to:   #0b131f;
  --stage2-from: #0a0014;  /* 신전: 어두운 보라 */
  --stage2-to:   #1b1040;
  --stage3-from: #001030;  /* 빛의 신전: 어두운 파랑 */
  --stage3-to:   #0a2060;
  --stage4-from: #200000;  /* 제단: 어두운 빨강 */
  --stage4-to:   #0b131f;
  --stage5-from: #1a000a;  /* 알현실: 어두운 자주 */
  --stage5-to:   #200010;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: radial-gradient(circle at center, #1b263b 0%, #080f1a 100%);
  color: var(--text-light);
  font-family: var(--font-body);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
  padding: 15px;
  touch-action: manipulation; /* 모바일/태블릿 브라우저의 더블 탭 줌 대기 지연(300ms)을 제거하여 터치 즉시 반응하도록 개선 */
}

#game-container {
  width: 100%;
  max-width: 600px;
  min-height: 520px;
  position: relative;
}

/* 씬 전환 효과 */
.scene {
  display: none;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  width: 100%;
}

.scene.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

/* 크리스탈 조각 펄스 애니메이션 */
@keyframes crystalPulse {
  0% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.15) rotate(5deg); opacity: 0.95; }
  100% { transform: scale(1); opacity: 0.6; }
}
.crystal-fragment {
  animation: crystalPulse 2s ease-in-out infinite !important;
}

/* 글래스모피즘 패널 */
.card {
  background: var(--panel-bg);
  border: 1px solid var(--border-gold);
  border-radius: 20px;
  padding: 40px 30px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 25px var(--gold-glow);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: -50%;
  width: 200%;
  height: 100%;
  background: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.05), transparent);
  transform: skewX(-25deg);
  animation: shine 8s infinite linear;
  pointer-events: none; /* 클릭 이벤트가 관통되도록 차단 해제 */
}

h1 {
  font-family: var(--font-title);
  font-size: 2.8rem;
  font-weight: 800;
  color: var(--gold-primary);
  text-shadow:
    0 0 10px rgba(212, 175, 55, 0.5),
    0 0 30px rgba(212, 175, 55, 0.25),
    0 0 60px rgba(212, 175, 55, 0.12);
  letter-spacing: 1px;
}

.sub-title {
  font-family: var(--font-title);
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--text-light);
  margin-bottom: 25px;
  letter-spacing: 2px;
}

.description {
  color: var(--text-muted);
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 30px;
}

/* 버튼 3상태 디자인 (Idle / Hover / Active) */
.btn {
  background: linear-gradient(135deg, var(--gold-primary), #b8860b);
  border: none;
  color: #0b131f;
  padding: 15px 30px;
  font-size: 1.05rem;
  font-weight: 800;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  width: 100%;
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
  /* Idle: 황금빛 맥동 */
  animation: btnIdle 3s ease-in-out infinite;
}

/* Hover: 위로 뜨며 외광 강화 */
.btn:hover {
  background: linear-gradient(135deg, var(--gold-hover), var(--gold-primary));
  box-shadow: 0 8px 28px rgba(212, 175, 55, 0.6), 0 0 16px var(--gold-light);
  transform: translateY(-3px);
  animation: none;
}

/* Active(클릭): 눌리는 느낌 + 내광 순간 점화 */
.btn:active {
  transform: translateY(1px);
  box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5), 0 0 20px var(--gold-light);
  transition: all 0.08s;
  animation: none;
}

.btn:disabled {
  background: #3a3b3c;
  color: #777;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
  border: 1px solid rgba(255, 255, 255, 0.05);
  animation: none;
}

@keyframes btnIdle {
  0%, 100% { box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
  50%       { box-shadow: 0 4px 22px rgba(212, 175, 55, 0.55), 0 0 8px rgba(212, 175, 55, 0.2); }
}

.btn-secondary {
  background: transparent;
  border: 1px solid var(--gold-primary);
  color: var(--gold-primary);
  padding: 8px 16px;
  font-size: 0.85rem;
  font-weight: 700;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-secondary:hover {
  background: rgba(212, 175, 55, 0.15);
  color: var(--gold-hover);
  box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
}

/* 입력 필드 */
.form-group {
  margin-bottom: 22px;
  text-align: left;
}

.form-group label {
  display: block;
  font-size: 0.85rem;
  color: var(--gold-primary);
  margin-bottom: 8px;
  font-weight: 700;
  letter-spacing: 1px;
}

.form-group input {
  width: 100%;
  padding: 13px 15px;
  background: rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(212, 175, 55, 0.2);
  border-radius: 8px;
  color: #fff;
  font-size: 1rem;
  outline: none;
  transition: all 0.3s ease;
}

.form-group input:focus {
  border-color: var(--gold-primary);
  box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
}

/* 대사 출력 영역 */
.story-box {
  background: rgba(8, 15, 26, 0.9);
  border: 2px solid var(--gold-primary);
  border-radius: 16px;
  padding: 30px;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7), 0 0 15px rgba(212, 175, 55, 0.15);
  transition: border-color 0.3s ease;
}

.story-box:hover {
  border-color: var(--gold-hover);
}

.dialog-text {
  font-size: 1.15rem;
  line-height: 1.8;
  color: #f1f2f6;
  white-space: pre-line;
}

.tap-indicator {
  align-self: flex-end;
  font-size: 0.8rem;
  color: var(--gold-primary);
  font-weight: bold;
  letter-spacing: 1px;
  animation: bounce 1.5s infinite;
  transition: opacity 0.3s ease;
}

/* 타이핑 중일 때 인디케이터 숨김 */
.story-box.typing .tap-indicator {
  opacity: 0;
}

/* Pulse Border: outline + box-shadow 동시 사용 */
.story-box.typing {
  outline: 1px solid transparent;
  animation: pulseBorder 0.8s ease-in-out infinite;
}

@keyframes pulseBorder {
  0%, 100% {
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7), 0 0 8px rgba(212, 175, 55, 0.15);
    outline-color: transparent;
    border-color: var(--gold-primary);
  }
  50% {
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7), 0 0 22px rgba(212, 175, 55, 0.5);
    outline-color: rgba(212, 175, 55, 0.25);
    border-color: var(--gold-hover);
  }
}

/* 퍼즐 컨테이너 */
.puzzle-wrapper {
  background: var(--panel-bg);
  border: 1px solid var(--border-gold);
  border-radius: 20px;
  padding: 25px;
  backdrop-filter: blur(12px);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 20px var(--gold-glow);
}

.puzzle-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.2);
  padding-bottom: 12px;
}

.puzzle-header h3 {
  font-family: var(--font-title);
  color: var(--gold-primary);
  font-weight: 700;
  font-size: 1.3rem;
}

.puzzle-canvas-area {
  background: rgba(5, 10, 18, 0.75);
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.03);
  min-height: 360px;
  display: flex;
  justify-content: center;
  align-items: center;
  touch-action: none; /* 모바일 터치 드래그 시 뷰포트 스크롤 간섭 완전 차단 */
}

/* 결과 패널 */
.record-box {
  background: rgba(0, 0, 0, 0.5);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 30px;
  font-size: 1rem;
  color: var(--gold-primary);
  font-weight: 700;
  border: 1px dashed var(--border-gold);
}

/* 테이블 구조 */
.ranking-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

.ranking-table th, .ranking-table td {
  padding: 14px 10px;
  text-align: center;
  border-bottom: 1px solid rgba(212, 175, 55, 0.15);
}

.ranking-table th {
  color: var(--gold-primary);
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 1px;
}

.ranking-table td {
  font-size: 0.95rem;
  color: var(--text-light);
}

.ranking-table tbody tr:hover {
  background: rgba(212, 175, 55, 0.04);
}

/* 애니메이션 */
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

@keyframes shine {
  0% { left: -100%; }
  100% { left: 100%; }
}

/* 룬 링 회전 */
@keyframes runeRotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* 룬 링 역방향 회전 (내부 링) */
@keyframes runeRotateReverse {
  from { transform: rotate(0deg); }
  to   { transform: rotate(-360deg); }
}

/* 페이드인 등장 */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 마법진 등장 */
@keyframes magicCircleIn {
  from { opacity: 0; transform: scale(0.3) rotate(-30deg); }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}

/* 빛 번쩍 */
@keyframes flashWhite {
  0%   { filter: brightness(1); }
  30%  { filter: brightness(2.5) saturate(0.5); }
  100% { filter: brightness(1); }
}

/* 텍스트 위로 소멸 */
@keyframes floatUp {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-30px); }
}

/* 성문 왼쪽 열림 */
@keyframes gateOpenLeft {
  from { transform: translateX(0); }
  to   { transform: translateX(-52%); }
}

/* 성문 오른쪽 열림 */
@keyframes gateOpenRight {
  from { transform: translateX(0); }
  to   { transform: translateX(52%); }
}

/* 성문 빛 넘침 */
@keyframes gateGlow {
  from { opacity: 0; transform: scaleX(0.1); }
  to   { opacity: 1; transform: scaleX(1); }
}

/* 컨페티 낙하 */
@keyframes confettiFall {
  from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  to   { transform: translateY(420px) rotate(720deg); opacity: 0; }
}

/* 안개 표류 */
@keyframes fogDrift {
  from { transform: translateX(-5%) translateY(0); }
  to   { transform: translateX(5%) translateY(-3%); }
}

/* 별 반짝임 */
@keyframes starTwinkle {
  0%, 100% { opacity: 0.75; }
  50%       { opacity: 0.35; }
}

/* 별 이동 (느린 흐름) */
@keyframes starDrift {
  from { transform: translateY(0); }
  to   { transform: translateY(-30px); }
}

/* 인트로 룬 링 진동 */
@keyframes runeRingPulse {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 0.9; }
}

/* 업적 토스트 슬라이드인 */
@keyframes toastSlideIn {
  from { transform: translateX(120%); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

@keyframes toastSlideOut {
  from { transform: translateX(0); opacity: 1; }
  to   { transform: translateX(120%); opacity: 0; }
}

/* 바운스 팝 (업적, 정답 텍스트) */
@keyframes popIn {
  0%   { transform: scale(0); opacity: 0; }
  70%  { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* 인트로 룬 링 래퍼 */
.rune-ring-wrapper {
  position: relative;
  width: 120px;
  height: 120px;
  margin: 0 auto 16px;
}

.rune-ring-svg {
  width: 100%;
  height: 100%;
  animation: runeRotate 20s linear infinite;
}

.rune-ring-svg .inner-ring {
  animation: runeRotateReverse 12s linear infinite;
  transform-origin: center;
}

.rune-ring-svg .outer-ring {
  animation: runeRingPulse 4s ease-in-out infinite;
}

/* 업적 토스트 */
.achievement-toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(13, 27, 42, 0.95);
  border: 1px solid var(--gold-primary);
  border-radius: 12px;
  padding: 14px 18px;
  z-index: 9999;
  box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 220px;
  animation: toastSlideIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
  backdrop-filter: blur(10px);
}

.achievement-toast.hiding {
  animation: toastSlideOut 0.4s ease-in forwards;
}

.achievement-toast .toast-icon {
  font-size: 1.6rem;
  flex-shrink: 0;
}

.achievement-toast .toast-body {
  display: flex;
  flex-direction: column;
}

.achievement-toast .toast-label {
  font-size: 0.72rem;
  color: var(--gold-primary);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.achievement-toast .toast-title {
  font-size: 0.95rem;
  color: var(--text-light);
  font-weight: 600;
  margin-top: 2px;
}

/* 스토리 씬 레이어 구조 */
.story-layer-container {
  position: relative;
  width: 100%;
  min-height: 320px;
}

.story-bg-layer {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  overflow: hidden;
  z-index: 0;
  transition: background 1s ease;
}

.story-fog-layer {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  z-index: 1;
  pointer-events: none;
  background: radial-gradient(ellipse 80% 60% at 50% 80%,
    var(--fog-color) 0%, transparent 70%);
  animation: fogDrift 12s ease-in-out infinite alternate;
}

.story-rune-layer {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  pointer-events: none;
  opacity: 0.6;
}

.story-rune-layer .rune-svg {
  width: 90%;
  max-width: 340px;
  animation: runeRotate 40s linear infinite;
}

.story-content-layer {
  position: relative;
  z-index: 2;
  padding: 8px;
}

.story-speaker-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  padding: 6px 14px;
  background: rgba(0, 0, 0, 0.5);
  border-radius: 8px;
  border-left: 3px solid var(--gold-primary);
  width: fit-content;
}

.story-speaker-bar .speaker-icon {
  font-size: 1.1rem;
}

#story-speaker-name {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--gold-primary);
  letter-spacing: 1px;
}

/* 마법진 오버레이 */
.magic-circle-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  pointer-events: none;
  border-radius: 12px;
}

.magic-circle-svg {
  width: 80%;
  max-width: 280px;
  animation: magicCircleIn 0.2s ease-out forwards;
}

.puzzle-wrapper {
  position: relative;
}

/* 정답 연출 텍스트 */
.solved-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 25;
  font-family: var(--font-title);
  font-size: 2rem;
  font-weight: 800;
  color: var(--gold-light);
  text-shadow: 0 0 20px var(--gold-primary), 0 0 40px rgba(212, 175, 55, 0.5);
  pointer-events: none;
  white-space: nowrap;
  animation: popIn 0.3s ease-out forwards;
}

.solved-text.floating-away {
  animation: floatUp 0.4s ease-in forwards;
}

/* 빛 번쩍 클래스 */
.flash-white {
  animation: flashWhite 0.3s ease-out forwards;
}

/* 성문 컨테이너 */
.gate-container {
  position: relative;
  width: 180px;
  height: 160px;
  margin: 0 auto 20px;
  overflow: hidden;
}

.gate-svg {
  width: 100%;
  height: 100%;
}

.gate-left, .gate-right {
  transition: none;
}

.gate-left.open {
  animation: gateOpenLeft 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
}

.gate-right.open {
  animation: gateOpenRight 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
}

.gate-glow {
  position: absolute;
  top: 10%;
  left: 10%;
  width: 80%;
  height: 80%;
  background: radial-gradient(ellipse, rgba(255, 220, 80, 0.7) 0%, transparent 70%);
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
}

.gate-glow.open {
  animation: gateGlow 0.6s ease-out 1.1s forwards;
}

/* 컨페티 조각 */
.confetti-piece {
  position: absolute;
  width: 8px;
  height: 8px;
  top: 0;
  pointer-events: none;
  animation: confettiFall var(--duration, 2s) var(--delay, 0s) ease-in forwards;
}

/* 모바일 쿼리 */
@media (max-width: 480px) {
  .card {
    padding: 30px 20px;
  }
  h1 {
    font-size: 2.2rem;
  }
  .sub-title {
    font-size: 1.3rem;
  }
  .story-box {
    padding: 20px;
    min-height: 170px;
  }
  .dialog-text {
    font-size: 1.05rem;
    line-height: 1.7;
  }
  .ranking-table th, .ranking-table td {
    padding: 10px 5px;
    font-size: 0.85rem;
  }
}

/* 마법 수정 및 모달 추가 CSS */
@keyframes floatCrystal {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-12px) rotate(5deg); }
}

.scene-overlay {
  display: flex;
  position: fixed;
  inset: 0;
  background: rgba(5, 10, 18, 0.85);
  backdrop-filter: blur(8px);
  z-index: 10000;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

.scene-overlay.show {
  opacity: 1;

    <div class="bg-fog"></div>

          <h2 class="sub-title">기하의 성</h2>

          <button id="intro-start-btn" class="btn">모험 시작하기</button>

      </div>

      <!-- 2. Input Scene -->

        <div class="card">
          <h2>모험가 등록</h2>

              <label for="student-no">학번 (4~5자리)</label>
              <input type="text" id="student-no" placeholder="예: 1011 또는 10101" required maxlength="5">
            </div>
            <div class="form-group">
              <label for="student-name">이름</label>
              <input type="text" id="student-name" placeholder="홍길동" required>
            </div>
            <button type="submit" id="input-submit-btn" class="btn">성문 진입</button>
          </form>
        </div>
      </div>

      <!-- 2-1. Tutorial Scene -->
      <div id="scene-tutorial" class="scene">
        <div class="puzzle-wrapper">
          <div class="puzzle-header">
            <h3>기초 마법 훈련</h3>
            <button id="tutorial-skip-btn" class="btn-secondary">훈련 건너뛰기</button>

          </div>
        </div>
      </div>

      <div id="scene-story" class="scene">

              <polygon points="100,30 170,70 170,130 100,170 30,130 30,70"
                       fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="0.8"/>

            <span id="crystal-6" style="font-size: 1.1rem; opacity: 0.2; filter: grayscale(100%); transition: all 0.3s;" title="남색 수정 (Stage 6)">🟠</span>

            <thead>
              <tr>

                <th>이름</th>
                <th>점수</th>

          </table>
          <button id="ranking-restart-btn" class="btn" style="margin-top:20px;">다시 모험하기</button>
        </div>
      </div>

        <div class="card" style="text-align: center; max-width: 360px; border: 2px solid var(--gold-primary); box-shadow: 0 0 30px var(--gold-glow); padding: 30px 20px; transform: scale(0.85); transition: transform 0.3s ease;">

        </div>
      </div>

    </div>

/* ============================================================
   SceneEffects.html
   스테이지별 배경 레이어 CSS (CSS + SVG 완전 순수, 이미지 없음)
   ============================================================ */

/* ── 공통 배경 레이어 의사 요소 기반 ── */
.story-bg-layer::before,
.story-bg-layer::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ============================
   Stage 1: 거울의 숲
   초록 안개 + 위로 떠오르는 빛 입자
   ============================ */
.story-bg-layer[data-stage="1"] {
  background: radial-gradient(ellipse at bottom,
    var(--stage1-from) 0%, var(--stage1-to) 100%);
}
.story-bg-layer[data-stage="1"]::before {
  background:
    radial-gradient(circle 120px at 20% 80%, rgba(0,180,60,0.1) 0%, transparent 70%),
    radial-gradient(circle 80px  at 75% 60%, rgba(0,220,80,0.07) 0%, transparent 60%);
  animation: fogDrift 8s ease-in-out infinite alternate;
}
.story-bg-layer[data-stage="1"]::after {
  background:
    radial-gradient(circle 40px at 40% 90%, rgba(80,255,120,0.08) 0%, transparent 60%),
    radial-gradient(circle 25px at 65% 95%, rgba(60,255,100,0.06) 0%, transparent 50%);
  animation: floatUp 5s ease-in-out infinite;
  opacity: 0.6;
}

/* ============================
   Stage 2: 신전의 회랑
   기둥 실루엣 + 보랏빛 광원
   ============================ */
.story-bg-layer[data-stage="2"] {
  background: radial-gradient(ellipse at top,
    var(--stage2-from) 0%, var(--stage2-to) 100%);
}
.story-bg-layer[data-stage="2"]::before {
  /* 수직 기둥 실루엣 (CSS repeating gradient) */
  background:
    repeating-linear-gradient(
      to right,
      rgba(40,0,80,0.4) 0px, rgba(40,0,80,0.4) 6px,
      transparent 6px, transparent 48px
    ),
    linear-gradient(to top, rgba(80,0,140,0.2) 0%, transparent 60%);
}
.story-bg-layer[data-stage="2"]::after {
  background: radial-gradient(ellipse 50% 30% at 50% 0%,
    rgba(140,60,255,0.18) 0%, transparent 70%);
  animation: runeRingPulse 4s ease-in-out infinite;
}

/* ============================
   Stage 3: 빛의 신전
   레이저 빔 + 푸른 광원
   ============================ */
.story-bg-layer[data-stage="3"] {
  background: radial-gradient(ellipse at center,
    var(--stage3-from) 0%, var(--stage3-to) 100%);
}
.story-bg-layer[data-stage="3"]::before {
  background:
    repeating-linear-gradient(
      75deg,
      transparent 0px, transparent 38px,
      rgba(80,160,255,0.05) 38px, rgba(80,160,255,0.05) 40px,
      transparent 40px, transparent 78px
    );
  animation: fogDrift 10s linear infinite;
}
.story-bg-layer[data-stage="3"]::after {
  background:
    radial-gradient(ellipse 60% 40% at 50% 10%, rgba(80,180,255,0.2) 0%, transparent 70%),
    radial-gradient(ellipse 30% 20% at 30% 80%, rgba(60,120,255,0.12) 0%, transparent 60%);
  animation: runeRingPulse 3s ease-in-out infinite alternate;
}

/* ============================
   Stage 4: 마도사의 제단
   붉은 불꽃 맥동 + 어두운 그림자
   ============================ */
.story-bg-layer[data-stage="4"] {
  background: radial-gradient(ellipse at bottom,
    var(--stage4-from) 0%, var(--stage4-to) 100%);
}
.story-bg-layer[data-stage="4"]::before {
  background:
    radial-gradient(ellipse 80% 40% at 50% 100%,
      rgba(255,60,0,0.18) 0%, transparent 60%);
  animation: flamePulse 2s ease-in-out infinite alternate;
}
.story-bg-layer[data-stage="4"]::after {
  background:
    radial-gradient(circle 30px at 25% 85%, rgba(255,100,0,0.12) 0%, transparent 60%),
    radial-gradient(circle 20px at 70% 90%, rgba(255,80,0,0.1) 0%, transparent 50%);
  animation: floatUp 3s ease-in-out infinite;
}

/* ============================
   Stage 5: 마도사 알현실 (보스)
   자주빛 별빛 + 신비로운 광원
   ============================ */
.story-bg-layer[data-stage="5"] {
  background: radial-gradient(ellipse at top,
    var(--stage5-from) 0%, var(--stage5-to) 100%);
}
.story-bg-layer[data-stage="5"]::before {
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%,
      rgba(180,0,100,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 70%,
      rgba(120,0,160,0.12) 0%, transparent 50%);
  animation: runeRingPulse 5s ease-in-out infinite;
}
.story-bg-layer[data-stage="5"]::after {
  background:
    repeating-linear-gradient(
      45deg,
      transparent 0px, transparent 50px,
      rgba(180,60,255,0.03) 50px, rgba(180,60,255,0.03) 52px
    );
}

/* 불꽃 맥동 키프레임 (Stage4 전용) */
@keyframes flamePulse {
  from {
    opacity: 0.6;
    background: radial-gradient(ellipse 80% 40% at 50% 100%, rgba(255,60,0,0.18) 0%, transparent 60%);
  }
  to {
    opacity: 1;
    background: radial-gradient(ellipse 80% 50% at 50% 100%, rgba(255,100,0,0.28) 0%, transparent 65%);
  }
}
</style>

<script>
/* ============================================================
   GlowEffects.html
   SVG Ripple 생성 함수
   AnimationManager에서 호출됨
   ============================================================ */
function createSVGRipple(x, y, container) {
  if (!container) return;

  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.style.cssText = [
    "position:absolute",
    "left:" + x + "px",
    "top:" + y + "px",
    "width:0",
    "height:0",
    "overflow:visible",
    "pointer-events:none",
    "z-index:10"
  ].join(";");

  const circle = document.createElementNS(ns, "circle");
  circle.setAttribute("cx", "0");
  circle.setAttribute("cy", "0");
  circle.setAttribute("r", "5");
  circle.setAttribute("fill", "none");
  circle.setAttribute("stroke", "rgba(212,175,55,0.7)");
  circle.setAttribute("stroke-width", "2");

  svg.appendChild(circle);
  container.appendChild(svg);

  let start = null;
  const DURATION = 600; // ms

  function animateRipple(timestamp) {
    if (!start) start = timestamp;
    const progress = Math.min((timestamp - start) / DURATION, 1);
    const r = 5 + progress * 65;
    const opacity = 1 - progress;

    circle.setAttribute("r", r);
    circle.setAttribute("opacity", opacity);
    circle.setAttribute("stroke-width", 2 - progress * 1.5);

    if (progress < 1) {
      requestAnimationFrame(animateRipple);
    } else {
      svg.remove();
    }
  }

  requestAnimationFrame(animateRipple);
}
</script>

   CSS 컨페티 생성 함수 (Canvas 없음)

   ============================================================ */
function createCSSConfetti(container) {
  if (!container) return;

  // 기존 컨페티 제거
  const existing = container.querySelector(".confetti-container");
  if (existing) existing.remove();

  const wrapper = document.createElement("div");
  wrapper.className = "confetti-container";

  const shapes  = ["confetti-triangle", "confetti-square", "confetti-hex"];
  const TOTAL   = 22;
  const WIDTH   = container.offsetWidth || 400;

  for (let i = 0; i < TOTAL; i++) {
    const el = document.createElement("div");
    const shape = shapes[i % shapes.length];
    el.className = "confetti-piece " + shape;

    const left      = Math.random() * 90 + 5;       // 5%~95%
    const duration  = (1.4 + Math.random() * 1.2).toFixed(2); // 1.4s~2.6s
    const delay     = (Math.random() * 0.8).toFixed(2);       // 0s~0.8s
    const size      = Math.floor(6 + Math.random() * 7);       // 6px~12px

    el.style.cssText = [
      "left:" + left + "%",
      "--duration:" + duration + "s",
      "--delay:" + delay + "s",
      "width:" + size + "px",
      "height:" + size + "px"
    ].join(";");

    wrapper.appendChild(el);
  }

  container.appendChild(wrapper);

  // 3초 후 컨페티 제거
  setTimeout(function() {
    if (wrapper.parentNode) wrapper.remove();
  }, 3500);
}

    if (!_barEl) return;

    // 타이머 리셋
    if (_hideTimer) clearTimeout(_hideTimer);

    // 클래스 설정
    _barEl.className = "feedback-bar " + type;
    
    // 아이콘 세팅
    let icon = "💡";
    if (type === "success") icon = "✓";
    if (type === "error") icon = "✗";
    if (type === "warning") icon = "⚠️";

    _barEl.innerHTML = `<span style="font-size: 1.1rem; font-weight: bold;">${icon}</span> <span>${message}</span>`;
    
    // 강제 리플로우 (오답 진동 애니메이션 재실행용)
    _barEl.style.animation = "none";

    if (type === "error") {
      _barEl.style.animation = "shakeFeedback 0.4s ease-in-out";
    }

    // 띄우기
    _barEl.classList.add("show");

    // 시간 후 닫기
    _hideTimer = setTimeout(function() {
      _barEl.classList.remove("show");

  }

  return {
    showSuccess: function(message, duration) {
      _showBar("success", message, duration || 5000);

    <script>
/**
 * 전역 이벤트 버스 객체.
 * 컴포넌트 간 직접 결합을 방지하고 상태 변경 이벤트를 비동기식으로 브로드캐스트합니다.
 */
const EventBus = (function() {
  const listeners = {};

  return {
    /**
     * 특정 이벤트에 대해 구독을 신청합니다.
     * @param {String} event - 이벤트명
     * @param {Function} callback - 호출할 콜백 함수
     * @returns {Function} 구독 해제를 수행하는 함수
     */
    subscribe: function(event, callback) {
      if (!listeners[event]) {
        listeners[event] = [];
      }
      listeners[event].push(callback);
      
      return () => this.unsubscribe(event, callback);
    },

    /**
     * 특정 이벤트의 구독을 해제합니다.
     * @param {String} event
     * @param {Function} callback
     */
    unsubscribe: function(event, callback) {
      if (!listeners[event]) return;
      listeners[event] = listeners[event].filter(cb => cb !== callback);
    },

    /**
     * 특정 이벤트를 발행하여 구독 중인 모든 콜백을 실행시킵니다.
     * @param {String} event
     * @param {*} data - 콜백에 주입할 데이터
     */
    publish: function(event, data) {
      if (!listeners[event]) return;
      const callbacks = [...listeners[event]];
      callbacks.forEach(cb => {
        try {
          cb(data);
        } catch (err) {
          console.error(`EventBus publish error for [${event}]:`, err);
        }
      });
    }
  };
})();
</script>

    <script>
/**
 * 씬 전환 및 생명주기 제어를 담당하는 엔진.
 * 개별 Scene 객체들은 SceneManager에 등록되어 생명주기 훅(enter, exit)을 수행합니다.
 */
const SceneManager = (function() {
  let currentScene = null;
  const scenes = {};

  return {
    /**
     * Scene 객체를 등록합니다.
     * @param {String} sceneId - 등록할 씬의 ID (DOM 컨테이너 ID 매핑용)
     * @param {Object} sceneInstance - enter(), exit() 메서드를 구현한 씬 객체
     */
    register: function(sceneId, sceneInstance) {
      scenes[sceneId] = sceneInstance;
    },

    /**
     * 지정된 씬으로 전환하고 생명주기 훅을 실행시킵니다.
     * @param {String} sceneId - 대상 씬 ID
     * @param {*} data - 새 씬 진입 시 전달할 옵션 데이터
     */
    showScene: function(sceneId, data) {
      const nextScene = scenes[sceneId];
      if (!nextScene) {
        console.error(`Scene [${sceneId}]이 등록되지 않았습니다.`);
        return;
      }

      // 1. 기존 씬 정리 (exit)
      if (currentScene) {
        try {
          if (typeof currentScene.exit === "function") {
            currentScene.exit();
          }
        } catch (err) {
          console.error("이전 씬 exit() 실행 실패:", err);
        }
      }

      // 화면 상의 모든 씬 컨테이너를 비활성화 (겹침 방지)
      document.querySelectorAll(".scene").forEach(el => {
        el.classList.remove("active");
      });

      // 2. 상태 갱신 및 이벤트 전파
      if (typeof UiState !== "undefined") {
        UiState.currentSceneId = sceneId;
        if (typeof EventBus !== "undefined") {
          EventBus.publish("stateChange:ui", UiState);
        }
      }

      // 3. 새 씬 표시 (enter)
      currentScene = nextScene;
      const nextDom = document.getElementById(`scene-${sceneId}`);
      if (nextDom) {
        nextDom.classList.add("active");
      } else {
        console.warn(`scene-${sceneId} 아이디를 가진 DOM 컨테이너가 존재하지 않습니다.`);
      }

      try {
        if (typeof currentScene.enter === "function") {
          currentScene.enter(data);
        }
      } catch (err) {
        console.error("새로운 씬 enter() 실행 실패:", err);
      }
    }
  };
})();
</script>

    <script>
/**
 * 대사(스토리) 진행 및 타이핑 이펙트를 담당하는 매니저.
 */
const StoryManager = (function() {
  let dialogueQueue = [];
  let onComplete = null;
  let isTyping = false;
  let typingTimer = null;
  let currentFullText = "";
  let currentEl = null;

  // 선택지 관련 상태
  let currentStoryData = null;
  let choiceHandled = false;

  function _showChoiceUI() {
    const clickArea = document.getElementById("story-click-area");
    if (!clickArea || !currentStoryData || !currentStoryData.choice) return;

    // 대사 상자 내 탭 인디케이터 숨김
    const tapIndicator = clickArea.querySelector(".tap-indicator");
    if (tapIndicator) tapIndicator.style.opacity = "0";

    // 기존의 선택지 박스가 있다면 제거
    const oldContainer = document.getElementById("story-choices-container");
    if (oldContainer) oldContainer.remove();

    // 선택지 컨테이너 생성
    const container = document.createElement("div");
    container.id = "story-choices-container";
    container.style.cssText = "margin-top: 15px; display: flex; flex-direction: column; gap: 8px; width: 100%; pointer-events: auto;";

    // 프롬프트가 있으면 상단에 표시
    if (currentStoryData.choice.prompt) {
      const promptEl = document.createElement("div");
      promptEl.style.cssText = "font-size: 0.85rem; color: var(--gold-primary); text-align: center; margin-bottom: 5px; font-weight: bold;";
      promptEl.textContent = currentStoryData.choice.prompt;
      container.appendChild(promptEl);
    }

    currentStoryData.choice.options.forEach(function(opt, index) {
      const btn = document.createElement("button");
      btn.className = "btn-secondary";
      btn.style.cssText = "width: 100%; text-align: left; padding: 10px 14px; font-size: 0.9rem; margin: 0;";
      btn.textContent = (index + 1) + ". " + opt.text;
      
      btn.addEventListener("click", function(e) {
        e.stopPropagation(); // 클릭 아웃 이벤트 전파 방지
        container.remove();
        
        if (tapIndicator) tapIndicator.style.opacity = "1";
        
        // 선택 응답 주입 및 진행
        choiceHandled = true;
        
        // 내 대사 + 마도사 대사 주입
        dialogueQueue.unshift(opt.reply);
        dialogueQueue.unshift(UserState.name + ": " + opt.text);
        
        // 엔딩 대사들 대기열에 병합
        if (currentStoryData.ending) {
          dialogueQueue = dialogueQueue.concat(currentStoryData.ending);
        }
        
        StoryManager.next();
      });
      container.appendChild(btn);
    });

    clickArea.appendChild(container);
  }

  return {
    /**
     * 특정 스테이지의 스토리를 시작합니다.
     * @param {Number} stageId
     * @param {Function} onCompleteCallback - 모든 대사 소진 시 실행할 콜백
     */
    startStory: function(stageId, onCompleteCallback) {
      if (typeof StoryDictionary === "undefined" || !StoryDictionary[stageId]) {
        console.error(`스테이지 ${stageId}의 스토리 데이터가 존재하지 않습니다.`);
        if (onCompleteCallback) onCompleteCallback();
        return;
      }
      
      const rawData = StoryDictionary[stageId];
      onComplete = onCompleteCallback;
      choiceHandled = false;

      // 1. 단일 배열 구조 호환 처리
      if (Array.isArray(rawData)) {
        currentStoryData = null;
        dialogueQueue = [...rawData];
      } else {
        // 2. 객체 구조 (lines + choice + ending)
        currentStoryData = rawData;
        dialogueQueue = [...rawData.lines];
      }
      
      this.next();
    },

    /**
     * 다음 대사로 넘어가거나, 타이핑 도중이면 전체 텍스트를 즉시 노출합니다.
     */
    next: function() {
      currentEl = document.getElementById("story-dialog-text");
      if (!currentEl) return;

      // 1. 타이핑 중 클릭 시 타이핑 중단하고 전체 텍스트 일괄 노출
      if (isTyping) {
        clearTimeout(typingTimer);
        isTyping = false;
        currentEl.textContent = currentFullText;
        if (typeof AnimationManager !== "undefined") {
          AnimationManager.playTypingEnd();
        }
        return;
      }

      // 2. 대사가 남아있지 않은 경우
      if (dialogueQueue.length === 0) {
        // 객체 구조인데 선택지를 아직 선택 안 했다면 띄움
        if (currentStoryData && currentStoryData.choice && !choiceHandled) {
          _showChoiceUI();
          return;
        }

        // 선택지 완료 후 엔딩 대사까지 모두 소진 시 최종 완료 콜백
        if (typeof onComplete === "function") {
          onComplete();
        }
        return;
      }

      // 3. 다음 대사를 꺼내 타이핑 효과 적용
      currentFullText = dialogueQueue.shift();
      
      let speakerName = "나레이션";
      let speakerIcon = "📖";
      let displayStoryText = currentFullText;

      const colonIndex = currentFullText.indexOf(":");
      if (colonIndex > 0 && colonIndex < 15) {
        speakerName = currentFullText.substring(0, colonIndex).trim();
        displayStoryText = currentFullText.substring(colonIndex + 1).trim();
        
        // 앞뒤 따옴표 제거
        if (displayStoryText.startsWith('"') && displayStoryText.endsWith('"')) {
          displayStoryText = displayStoryText.substring(1, displayStoryText.length - 1);
        }

        // 아이콘 매칭
        if (speakerName === "모르간") {
          speakerIcon = "🔮";
        } else if (speakerName === "엘리안") {
          speakerIcon = "🧚";
        } else if (typeof UserState !== "undefined" && speakerName === UserState.name) {
          speakerIcon = "⚔️";
        } else if (speakerName === "시스템") {
          speakerIcon = "⚙️";
        } else {
          speakerIcon = "💬";
        }
      }

      const speakerNameEl = document.getElementById("story-speaker-name");
      if (speakerNameEl) {
        speakerNameEl.textContent = speakerName;
      }
      const speakerIconEl = document.querySelector(".speaker-icon");
      if (speakerIconEl) {
        speakerIconEl.textContent = speakerIcon;
      }

      currentFullText = displayStoryText;
      this.typeText(currentFullText, currentEl);
    },

    /**
     * 문자열을 타이핑 효과와 함께 화면에 출력합니다.
     * @param {String} text
     * @param {HTMLElement} element
     */
    typeText: function(text, element) {
      isTyping = true;
      element.textContent = "";
      let index = 0;
      const speed = 35; // 한 글자당 대기 시간 (ms)

      // 타이핑 시작 시 앱니메이션 훅
      if (typeof AnimationManager !== "undefined") {
        AnimationManager.playTypingStart();
      }

      function type() {
        if (!isTyping) return; // 타이핑 도중 정지(전체 텍스트 출력) 처리되면 루프 즉시 종료
        if (index < text.length) {
          element.textContent += text.charAt(index);
          index++;
          typingTimer = setTimeout(type, speed);
        } else {
          isTyping = false;
          // 타이핑 완료 시 애니메이션 종료
          if (typeof AnimationManager !== "undefined") {
            AnimationManager.playTypingEnd();
          }
        }
      }
      
      type();
    }
  };
})();
</script>

/**
 * 퍼즐 생성 및 라이프사이클을 통제하는 매니저.

const PuzzleManager = (function() {
  let activePuzzle = null;
  const puzzleClasses = {};

  return {
    /**
     * 스테이지별 구체적 퍼즐 클래스를 매니저에 매핑합니다.
     * @param {Number} stageId
     * @param {Class} puzzleClass - PuzzleBase를 상속한 클래스
     */
    register: function(stageId, puzzleClass) {
      puzzleClasses[stageId] = puzzleClass;
    },

    /**
     * 특정 스테이지의 퍼즐 인스턴스를 지정 컨테이너에 주입하고 초기화합니다.
     * @param {Number} stageId
     * @param {String} containerId
     */
    loadPuzzle: function(stageId, containerId) {
      this.clearActivePuzzle();

      const TargetPuzzleClass = puzzleClasses[stageId];
      if (!TargetPuzzleClass) {
        console.error(`스테이지 ${stageId}의 퍼즐 클래스가 존재하지 않습니다.`);
        return null;
      }

      try {
        activePuzzle = new TargetPuzzleClass(containerId);
        if (typeof PuzzleState !== "undefined" && PuzzleState.currentSubstage) {
          activePuzzle.substage = PuzzleState.currentSubstage;
        }
        activePuzzle.init();
        activePuzzle.bindEvents();
        activePuzzle.render();
        console.log(`[PuzzleManager] 스테이지 ${stageId} 퍼즐 기동 완료. (Substage: ${activePuzzle.substage})`);
        return activePuzzle;
      } catch (e) {
        console.error(`퍼즐 로딩 예외 (Stage ${stageId}):`, e);
        return null;
      }
    },

    /**
     * 현재 구동 중인 퍼즐을 안전하게 메모리 해제 처리합니다.
     */
    clearActivePuzzle: function() {
      if (activePuzzle) {
        try {
          activePuzzle.destroy();
          console.log("[PuzzleManager] 기존 활성 퍼즐이 해제되었습니다.");
        } catch (e) {
          console.error("퍼즐 자원 해제 실패:", e);
        } finally {
          activePuzzle = null;
        }
      }
    },

    /**
     * 구동 중인 퍼즐 인스턴스를 가져옵니다.
     */
    getActivePuzzle: function() {
      return activePuzzle;
    }
  };
})();
</script>

  /* 업적 확인 및 표시 */
  function _evaluate() {
    const state = _collectState();
    ACHIEVEMENTS.forEach(function(ach) {
      if (_shown[ach.id]) return;
      try {
        if (ach.check(state)) {
          _shown[ach.id] = true;
          if (typeof AnimationManager !== "undefined") {
            AnimationManager.playAchievement(ach.icon, ach.title);
          }
        }
      } catch (e) {
        /* 안전하게 무시 */
      }
    });
  }

  return {
    init: function() {
      /* EventBus 구독 — 상태 변경마다 업적 평가 */
      if (typeof EventBus !== "undefined") {
        EventBus.subscribe("stateChange:game",   _evaluate);
        EventBus.subscribe("stateChange:puzzle", _evaluate);
      }
      console.log("[AchievementManager] 초기화 완료. 업적:", ACHIEVEMENTS.length + "개");
    },

    /* 외부 강제 평가 (테스트용) */
    evaluate: function() {
      _evaluate();
    }
  };
})();

/* 자동 초기화 */
(function() {
  function tryInit() {
    if (typeof EventBus !== "undefined" && typeof AnimationManager !== "undefined") {
      AchievementManager.init();
    } else {
      setTimeout(tryInit, 100);
    }
  }
  tryInit();
})();

/**

const PuzzleType = {

  DRAG_MATCH: "DRAG_MATCH",     // 2, 4스테이지: 카드를 빈 드롭존에 매칭
  CONSTRUCTION: "CONSTRUCTION", // 3스테이지: 마우스 드래그 보조선 그리기 등 조작형
  MULTI_CHOICE: "MULTI_CHOICE", // (미래) 객관식 다지선다
  ORDERING: "ORDERING"          // (미래) 순서 맞추기
};

/**
 * 모든 퍼즐 엔진의 부모 추상 클래스
 */
class QuestionEngineBase extends PuzzleBase {
  constructor(containerId, config) {
    super(containerId);
    this.config = config || {};
    this.type = this.config.type || PuzzleType.INPUT;
    this.questionText = this.config.questionText || "문제를 해결하세요.";
    this.hints = this.config.hints || [];
    this.onClearCallback = null;
  }

  // 힌트 호출 공통 인터페이스
  showHint(step) {
    const hintMsg = this.hints[step - 1] || "스스로 생각할 시간입니다.";
    if (typeof FeedbackSystem !== "undefined") {
      FeedbackSystem.showHint(this.config.npcName || "마도사", hintMsg);
    } else {
      alert(hintMsg);
    }
  }

  // 정답 처리 공통 오버라이딩
  triggerSuccess(successMessage) {
    if (typeof FeedbackSystem !== "undefined") {
      FeedbackSystem.showSuccess(successMessage || "성공적으로 복원되었습니다!");
    }
    
    // AnimationManager에 정답 마법진 연출 전달
    const wrapper = this.container.firstElementChild;
    if (typeof AnimationManager !== "undefined" && wrapper) {
      AnimationManager.playSolved(wrapper);
    }

    setTimeout(() => {
      if (this.onClearCallback) {
        this.onClearCallback();
      }
    }, 1400);
  }

  // 오답 처리 공통 인터페이스
  triggerFailure(errorMessage) {
    if (typeof FeedbackSystem !== "undefined") {
      FeedbackSystem.showError(errorMessage || "오답입니다. 다시 한번 분석해 보세요.");
    }
    
    if (typeof PuzzleState !== "undefined") {
      PuzzleState.wrongCount += 1;
      EventBus.publish("stateChange:puzzle", PuzzleState);
    }
  }
}

/**
 * 1. 입력형 퍼즐 표준 엔진 (Stage1, 5 연계 확장용)
 */
class GenericInputPuzzle extends QuestionEngineBase {
  constructor(containerId, config) {
    super(containerId, config);
    this.targetAnswer = config.targetAnswer;
    this.userInput = "";
  }

  init() {
    this.container.innerHTML = `
      <div class="engine-puzzle-wrap" style="text-align: center; width: 100%; padding: 15px;">
        <p style="color: var(--gold-primary); margin-bottom: 12px; font-size: 0.9rem;">${this.questionText}</p>
        
        <!-- 커스텀 SVG 드로잉 영역 -->
        <div id="engine-svg-container" style="margin-bottom: 15px;"></div>
        
        <!-- 입력 패널 -->
        <div style="display: flex; justify-content: center; align-items: center; gap: 8px;">
          <input type="number" id="engine-input" placeholder="답안 입력" style="width: 100px; padding: 8px; text-align: center; font-size: 1rem; border: 1px solid var(--gold-primary); border-radius: 6px; background: rgba(0,0,0,0.5); color: #fff; outline:none;">
          <button id="engine-submit" class="btn" style="width: 70px; padding: 9px; font-size: 0.85rem; margin:0;">확인</button>
        </div>
      </div>
    `;

    // 커스텀 SVG 주입
    if (typeof this.config.renderSvgFn === "function") {
      this.config.renderSvgFn(document.getElementById("engine-svg-container"));
    }

    this.input = document.getElementById("engine-input");
    this.submitBtn = document.getElementById("engine-submit");
  }

  bindEvents() {
    if (this.input) {
      this.input.addEventListener("input", (e) => {
        this.userInput = e.target.value;
      });
    }

    if (this.submitBtn) {
      this.submitBtn.addEventListener("click", () => {
        if (parseInt(this.userInput) === this.targetAnswer) {
          this.input.disabled = true;
          this.submitBtn.disabled = true;
          this.triggerSuccess(this.config.successMsg);
        } else {
          this.triggerFailure(this.config.failMsg);
        }
      });
    }
  }

  checkAnswer() {
    return parseInt(this.userInput) === this.targetAnswer;
  }
}
</script>

    <script>
/**
 * GAS 서버 API 호출을 대행하는 범용 비동기 클라이언트 유틸리티.
 * google.script.run 환경이 없는 로컬 오프라인 브라우저에서의 테스트를 지원하기 위해
 * 자동으로 환경을 감지하고 모의(Mock) 응답을 반환하는 가상 런타임을 포함합니다.
 */
const DbService = {
  /**
   * 백엔드 Code.js의 서버 사이드 함수를 호출합니다.
   * @param {String} functionName - 호출할 서버 함수명 (예: 'saveGameResult')
   * @param {Array} args - 전달할 인수 배열 (예: [payload])
   * @param {Function} onSuccess - 성공 수신 콜백
   * @param {Function} onFailure - 실패 수신 콜백
   */
  call: function(functionName, args, onSuccess, onFailure) {
    // 1. 실제 GAS 서빙 환경인 경우
    if (typeof google !== "undefined" && google.script && google.script.run) {
      let runner = google.script.run;
      if (onSuccess) {
        runner = runner.withSuccessHandler(onSuccess);
      }
      if (onFailure) {
        runner = runner.withFailureHandler(onFailure);
      }
      
      // 동적 함수 호출 바인딩
      if (typeof runner[functionName] === "function") {
        runner[functionName].apply(runner, args);
      } else {
        console.error(`[DbService] 서버 함수 [${functionName}]를 호출할 수 없습니다.`);
        if (onFailure) onFailure(new Error(`함수 ${functionName} 존재 안 함`));
      }
    } 
    // 2. 로컬 브라우저 개발/디버그 환경인 경우 (Mock)
    else {
      console.warn(`[DbService] 로컬 모의 환경에서 [${functionName}]을 처리합니다.`);
      setTimeout(() => {
        try {
          if (functionName === "saveGameResult") {
            if (onSuccess) onSuccess({ success: true, message: "[로컬 환경] 데이터 저장 성공" });
          } else if (functionName === "getLeaderboard") {
            if (onSuccess) onSuccess([
              { rank: 1, name: "아더", studentNo: "10203", score: 100, playTime: 120 },
              { rank: 2, name: "멀린", studentNo: "10105", score: 95, playTime: 145 },
              { rank: 3, name: "랜슬롯", studentNo: "10311", score: 90, playTime: 160 }
            ]);
          } else {
            if (onSuccess) onSuccess();
          }
        } catch (e) {
          if (onFailure) onFailure(e);
        }
      }, 600);
    }
  }
};
</script>

    <script>
/**
 * 게임 결과 영속성 데이터 저장소.
 * 클라이언트와 GAS 백엔드 DB 연동 레이어 간의 데이터 전송을 담당하며,
 * 동시성 락 충돌 및 네트워크 유실에 대비한 지수 백오프 재시도 및 로컬 임시 백업 보관 정책을 지원합니다.
 */
const ResultRepository = {
  /**
   * 게임 플레이 최종 기록을 서버에 전송하여 안전하게 저장합니다.
   * @param {Object} payload - 결과 기록 정보 DTO
   * @param {Function} onSuccess - 성공 콜백
   * @param {Function} onFailure - 최종 실패 콜백
   * @param {Number} retryCount - 내부 재시도 인덱스
   */
  saveResult: function(payload, onSuccess, onFailure, retryCount = 1) {
    if (!payload || !payload.studentNo || !payload.name) {
      if (onFailure) {
        onFailure(new Error("학번과 이름이 누락된 데이터는 저장할 수 없습니다."));
      }
      return;
    }

    payload.gameVersion = payload.gameVersion || "1.0.0";
    payload.submitTime = payload.submitTime || new Date().toISOString();

    const maxRetries = 3;
    const retryDelay = 2000; // 재시도 대기 간격 (2초)

    DbService.call(
      "saveGameResult",
      [payload],
      function(response) {
        if (response && response.success) {
          // 최종 성공 시 백업 보관했던 결과가 있다면 클리어
          localStorage.removeItem("saved_game_result_backup");
          if (onSuccess) onSuccess(response);
        } else {
          // 서버 측 락 획득 타임아웃 등으로 처리가 밀린 경우 재시도 작동
          if (retryCount <= maxRetries) {
            console.warn(`[ResultRepository] 락 타임아웃 감지. ${retryDelay}ms 후 재시도 (${retryCount}/${maxRetries})`);
            setTimeout(() => {
              ResultRepository.saveResult(payload, onSuccess, onFailure, retryCount + 1);
            }, retryDelay);
          } else {
            // 로컬 스토리지에 결과 복구용 임시 보존
            localStorage.setItem("saved_game_result_backup", JSON.stringify(payload));
            if (onFailure) {
              onFailure(new Error(response.message || "서버 혼잡으로 기록 저장에 실패하여 로컬 브라우저에 결과를 보관했습니다."));
            }
          }
        }
      },
      function(err) {
        // 네트워크 연결 에러 등 RPC 실패 시 재시도 작동
        if (retryCount <= maxRetries) {
          console.warn(`[ResultRepository] 네트워크 장애 감지. ${retryDelay}ms 후 재시도 (${retryCount}/${maxRetries})`);
          setTimeout(() => {
            ResultRepository.saveResult(payload, onSuccess, onFailure, retryCount + 1);
          }, retryDelay);
        } else {
          // 로컬 스토리지 백업 처리
          localStorage.setItem("saved_game_result_backup", JSON.stringify(payload));
          if (onFailure) {
            onFailure(new Error("서버와의 통신 오류로 전송하지 못했습니다. 결과 기록은 브라우저에 임시 백업되었습니다."));
          }
        }
      }
    );
  },

  /**
   * 서버로부터 원본 랭킹 목록을 조회합니다.
   * @param {Function} onSuccess
   * @param {Function} onFailure
   */
  getRawLeaderboard: function(onSuccess, onFailure) {
    DbService.call(
      "getLeaderboard",
      [],
      function(response) {
        if (onSuccess) onSuccess(response);
      },
      function(err) {
        if (onFailure) onFailure(err);
      }
    );
  }
};
</script>

const RankingService = {
  /**

   * 1. 점수(Score) 내림차순 (높은 순)
   * 2. 소요시간(PlayTime) 오름차순 (빠른 순)
   * 3. 제출시간(SubmitTime) 오름차순 (먼저 완료한 순)
   * @param {Function} onSuccess
   * @param {Function} onFailure
   */
  getLeaderboard: function(onSuccess, onFailure) {
    ResultRepository.getRawLeaderboard(
      function(rawList) {
        if (!rawList || !Array.isArray(rawList)) {
          if (onSuccess) onSuccess([]);
          return;
        }

        // 다중 정렬 규칙 가공 적용
        const sortedList = [...rawList].sort((a, b) => {
          // 1순위: 점수 비교
          if (b.score !== a.score) {
            return b.score - a.score;
          }
          // 2순위: 소요 시간 비교
          if (a.playTime !== b.playTime) {
            return a.playTime - b.playTime;
          }
          // 3순위: 제출 타임스탬프 비교
          const timeA = a.submitTime ? new Date(a.submitTime).getTime() : 0;
          const timeB = b.submitTime ? new Date(b.submitTime).getTime() : 0;
          return timeA - timeB;
        });

        // 상위 10개 레코드 추출 제한
        const topTen = sortedList.slice(0, 10).map((item, idx) => ({
          rank: idx + 1,
          studentNo: item.studentNo,
          name: item.name,
          score: item.score,
          playTime: item.playTime
        }));

        if (onSuccess) onSuccess(topTen);
      },
      function(err) {
        if (onFailure) onFailure(err);
      }
    );
  }
};
</script>

          </svg>
        </div>
        
        <!-- 슬라이더 조작 영역 -->
        <div style="margin-bottom: 12px;">
          <input type="range" id="stage1-slider" min="60" max="160" value="90" style="width: 80%; accent-color: var(--gold-primary); cursor: pointer;">
          <div style="margin-top: 5px; font-size: 0.85rem; color: var(--text-muted);" id="stage1-angle-info">
            조작 각도: 90°
          </div>
        </div>

        <!-- 각도 계산 입력 영역 -->
        <div style="margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 8px;">
          <span style="font-size: 0.95rem; color: #fff;">맞꼭지각 x = </span>
          <input type="number" id="stage1-input" placeholder="각도" style="width: 80px; padding: 8px; text-align: center; font-size: 1rem; border: 1px solid var(--gold-primary); border-radius: 6px; background: rgba(0,0,0,0.5); color: #fff; outline:none;">
          <span style="font-size: 0.95rem; color: #fff;">°</span>
          <button id="stage1-submit-btn" class="btn" style="width: 70px; padding: 9px; font-size: 0.85rem; margin: 0;">확인</button>
        </div>
      </div>
    `;
    this.slider = document.getElementById("stage1-slider");
    this.rotateLine = document.getElementById("stage1-rotate-line");
    this.angleInfo = document.getElementById("stage1-angle-info");
    this.input = document.getElementById("stage1-input");
    this.submitBtn = document.getElementById("stage1-submit-btn");
    
    this.arcTop = document.getElementById("stage1-arc-top");
    this.arcBottom = document.getElementById("stage1-arc-bottom");
    this.topLabel = document.getElementById("stage1-top-label");
    this.bottomLabel = document.getElementById("stage1-bottom-label");
    this.arcSupplement = document.getElementById("stage1-arc-supplement");
    this.supplementLabel = document.getElementById("stage1-supplement-label");

    this.render();
  }

  bindEvents() {
    this.sliderHandler = (e) => {
      this.currentAngle = parseInt(e.target.value);
      this.render();
    };

    this.inputHandler = (e) => {
      this.userInput = e.target.value;
    };

    this.submitHandler = () => {
      const isAngleCorrect = Math.abs(this.currentAngle - this.targetAngle) <= 2;
      const isInputCorrect = parseInt(this.userInput) === this.targetInput;

      if (isAngleCorrect && isInputCorrect) {
        this.slider.disabled = true;
        this.input.disabled = true;
        this.submitBtn.disabled = true;
        this.playCorrectAnimation();
      } else {
        if (typeof PuzzleState !== "undefined") {
          PuzzleState.wrongCount += 1;
          EventBus.publish("stateChange:puzzle", PuzzleState);
        }

        if (typeof FeedbackSystem !== "undefined") {
          if (isAngleCorrect && !isInputCorrect) {
            FeedbackSystem.showWarning("다이얼 각도는 완벽합니다! 이제 45°와 엇갈려 마주 보는 맞꼭지각 x의 올바른 크기를 입력해 주세요.");
          } else if (!isAngleCorrect && isInputCorrect) {
            FeedbackSystem.showInfo("맞꼭지각 계산(45°)은 맞습니다! 다이얼을 드래그해 목표 소켓(135° 방향)에 선을 맞춰주세요.");
          } else {
            FeedbackSystem.showError("다이얼 각도와 입력값 모두 올바르지 않습니다. 천천히 다시 맞춰 보세요.");
          }
        }
      }
    };

    if (this.slider) this.slider.addEventListener("input", this.sliderHandler);
    if (this.input) this.input.addEventListener("input", this.inputHandler);
    if (this.submitBtn) this.submitBtn.addEventListener("click", this.submitHandler);
  }

  render() {
    if (this.rotateLine) {
      this.rotateLine.setAttribute("transform", `rotate(${this.currentAngle - 90} 110 110)`);
    }

    if (this.angleInfo) {
      this.angleInfo.innerHTML = `조작 각도: <strong style="color: var(--gold-primary);">${this.currentAngle}°</strong>`;
    }

    const calculatedTop = 180 - this.currentAngle;
    if (this.topLabel) {
      this.topLabel.textContent = calculatedTop + "°";
    }

    const r = 35;
    const cx = 110;
    const cy = 110;
    const rad = (this.currentAngle - 180) * Math.PI / 180;
    
    // 1) 상단 호
    const endX1 = cx + r * Math.cos(rad);
    const endY1 = cy + r * Math.sin(rad);
    if (this.arcTop) {
      this.arcTop.setAttribute("d", `M ${cx + r},${cy} A ${r},${r} 0 0,0 ${endX1},${endY1}`);
    }

    // 2) 하단 호
    const endX2 = cx - r * Math.cos(rad);
    const endY2 = cy - r * Math.sin(rad);
    if (this.arcBottom) {
      this.arcBottom.setAttribute("d", `M ${cx - r},${cy} A ${r},${r} 0 0,0 ${endX2},${endY2}`);
    }
  }

  playCorrectAnimation() {
    if (this.arcTop) this.arcTop.setAttribute("stroke", "var(--gold-primary)");
    if (this.arcBottom) this.arcBottom.setAttribute("stroke", "var(--gold-primary)");
    if (this.rotateLine) this.rotateLine.setAttribute("stroke", "var(--gold-light)");

    if (this.bottomLabel) {
      this.bottomLabel.textContent = "45°";
      this.bottomLabel.setAttribute("fill", "var(--gold-light)");
    }

    // [옵션 C] 보각 자동 연출 추가
    const r = 35;
    const cx = 110;
    const cy = 110;
    // 보각 호 렌더링 (회전선 상단 (134.7, 85.3) -> 왼쪽 수평선 (75, 110)까지 135도 영역)
    if (this.arcSupplement) {
      this.arcSupplement.setAttribute("d", `M 134.7,85.3 A ${r},${r} 0 0,0 75,110`);
      this.arcSupplement.setAttribute("stroke", "#00d2d3");
      this.arcSupplement.style.opacity = "1";
    }
    if (this.supplementLabel) {
      this.supplementLabel.textContent = "보각: 135° (180° - 45°)";
      this.supplementLabel.setAttribute("fill", "#00d2d3");
    }

    if (typeof FeedbackSystem !== "undefined") {
      FeedbackSystem.showSuccess("맞꼭지각 x = 45° 정답! 맞꼭지각은 항상 크기가 같습니다. 보각의 크기는 135°입니다! (+5점)");
    }

    const svg = document.getElementById("stage1-svg");
    if (typeof AnimationManager !== "undefined" && svg) {
      setTimeout(() => {
        AnimationManager.playSolved(svg.parentNode);
      }, 300);
    }

    setTimeout(() => {
      if (this.onClearCallback) {
        this.onClearCallback();
      } else {
        const clearBtn = document.getElementById("mock-puzzle-clear-btn");
        if (clearBtn) clearBtn.click();
      }
    }, 2000);
  }

  checkAnswer() {
    const isAngleCorrect = Math.abs(this.currentAngle - this.targetAngle) <= 2;
    const isInputCorrect = parseInt(this.userInput) === this.targetInput;
    return isAngleCorrect && isInputCorrect;
  }

  getHint(count) {
    if (count === 1) {
      return "맞꼭지각은 서로 교차하는 두 직선에 의해 마주 보는 두 각을 뜻합니다. 크기가 항상 서로 같습니다.";
    } else if (count === 2) {
      return "일직선(평각)은 항상 180°입니다. 다이얼 각도가 135°이므로, 그 옆의 각도는 180° - 135° = 45°가 되며, 이 각이 바로 맞꼭지각 x와 마주 봅니다!";
    }
    return this.getSolution();
  }

  getSolution() {
    return "빛의 다이얼을 135°(우측 하단 점선)에 맞추면, 마주 보는 맞꼭지각 x의 값도 동일해야 하지만, 180° 일직선에서 135°를 제외한 예각 크기는 180° - 135° = 45°가 됩니다. 따라서 맞꼭지각 x = 45°입니다.";
  }

  getConceptText() {
    return "두 직선이 교차하여 생기는 맞꼭지각의 크기는 항상 서로 같습니다.";
  }

  reset() {
    this.currentAngle = 90;
    this.userInput = "";
    this.init();
    this.bindEvents();
    
    if (this.arcSupplement) {
      this.arcSupplement.setAttribute("stroke", "rgba(0, 210, 211, 0)");
      this.arcSupplement.setAttribute("d", "");
    }
    if (this.supplementLabel) {
      this.supplementLabel.setAttribute("fill", "rgba(0, 210, 211, 0)");
      this.supplementLabel.textContent = "";
    }
  }

  destroy() {
    if (this.slider && this.sliderHandler) this.slider.removeEventListener("input", this.sliderHandler);
    if (this.input && this.inputHandler) this.input.removeEventListener("input", this.inputHandler);
    if (this.submitBtn && this.submitHandler) this.submitBtn.removeEventListener("click", this.submitHandler);
    this.container.innerHTML = "";
  }
}

// 퍼즐 등록
PuzzleManager.register(1, Stage1Puzzle);
</script>

    <script>
/**
 * 2스테이지 동위각·엇각 하이브리드 퍼즐 클래스.
 * Substage 1: 기본 동위각/엇각 카드 드래그 매칭

class Stage2Puzzle extends PuzzleBase {
  constructor(containerId) {

    this.substage = 1;
    this.solved = { zoneA: false, zoneB: false }; // Substage 1용

  init() {

  initSubstage1() {

        </p>
        
        <div style="position: relative; width: 280px; height: 180px; margin: 0 auto; background: #0b131f; border: 2px solid var(--gold-primary); border-radius: 8px; box-shadow: 0 0 15px var(--gold-glow); overflow: hidden;">
          <svg width="280" height="180" style="position: absolute; inset: 0; pointer-events: none;">

            <line x1="20" y1="130" x2="260" y2="130" stroke="#a5a5a5" stroke-width="3" />
            <line x1="95" y1="15" x2="180" y2="162" stroke="#ff4757" stroke-width="3.5" />
            <path d="M 95,50 A 20,20 0 0,1 105,33" fill="none" stroke="#ff4757" stroke-width="2" />
            <path d="M 141,130 A 20,20 0 0,1 151,113" fill="none" stroke="rgba(212,175,55,0.4)" stroke-width="1.5" stroke-dasharray="2" />
            <path d="M 181,130 A 20,20 0 0,0 171,147" fill="none" stroke="rgba(212,175,55,0.4)" stroke-width="1.5" stroke-dasharray="2" />
          </svg>

          <div style="position: absolute; top: 22px; left: 70px; font-size: 0.85rem; color: #ff4757; font-weight: bold;">60°</div>
          
          <div id="drop-zone-A" class="dropzone" style="position: absolute; top: 82px; left: 105px; width: 56px; height: 34px; border: 2px dashed var(--gold-primary); border-radius: 6px; font-size: 0.85rem; font-weight: bold; text-align: center; line-height: 30px; color: var(--gold-primary); background: rgba(0,0,0,0.65); cursor: pointer; transition: all 0.2s;">A</div>
          <div style="position: absolute; top: 120px; left: 118px; font-size: 0.65rem; color: var(--gold-primary); font-weight:bold;">동위각</div>
          
          <div id="drop-zone-B" class="dropzone" style="position: absolute; top: 136px; left: 161px; width: 56px; height: 34px; border: 2px dashed var(--gold-primary); border-radius: 6px; font-size: 0.85rem; font-weight: bold; text-align: center; line-height: 30px; color: var(--gold-primary); background: rgba(0,0,0,0.65); cursor: pointer; transition: all 0.2s;">B</div>
          <div style="position: absolute; top: 120px; left: 177px; font-size: 0.65rem; color: var(--gold-primary); font-weight:bold;">엇각</div>

        <div style="margin-top: 15px; display: flex; justify-content: center; gap: 10px;">
          <div class="drag-card" data-value="55" style="width: 50px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">55°</div>
          <div class="drag-card" data-value="60" style="width: 50px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">60°</div>
          <div class="drag-card" data-value="65" style="width: 50px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">65°</div>
          <div class="drag-card" data-value="120" style="width: 50px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">120°</div>
        </div>
      </div>
    `;
    this.cards = this.container.querySelectorAll(".drag-card");
    this.zones = this.container.querySelectorAll(".dropzone");
    this.selectedCard = null;
  }

  initSubstage2() {
    this.container.innerHTML = `
      <div style="text-align: center; width: 100%; padding: 15px; user-select: none;">
        <p style="color: var(--gold-primary); margin-bottom: 12px; font-size: 0.9rem;">
          [Part 2] 엇각의 마법 관계를 증명하여 식을 풀고, 미지수 <strong>x</strong>의 크기를 구하세요.
        </p>
        
        <div style="position: relative; width: 280px; height: 180px; margin: 0 auto; background: #0b131f; border: 2px solid var(--gold-primary); border-radius: 8px; box-shadow: 0 0 15px var(--gold-glow); overflow: hidden;">
          <svg width="280" height="180" style="position: absolute; inset: 0; pointer-events: none;">
            <line x1="20" y1="50" x2="260" y2="50" stroke="#a5a5a5" stroke-width="3" />
            <line x1="20" y1="130" x2="260" y2="130" stroke="#a5a5a5" stroke-width="3" />
            <line x1="95" y1="15" x2="180" y2="162" stroke="#ff4757" stroke-width="3.5" />
            <path d="M 95,50 A 20,20 0 0,1 105,33" fill="none" stroke="#ff4757" stroke-width="2" />
            <path d="M 181,130 A 20,20 0 0,0 171,147" fill="none" stroke="var(--gold-primary)" stroke-width="2" />
          </svg>

          <!-- 엇각 수식 표시 -->
          <div style="position: absolute; top: 12px; left: 78px; font-size: 0.85rem; color: #ff4757; font-weight: bold;">(2x + 10)°</div>
          <div style="position: absolute; top: 136px; left: 165px; font-size: 0.85rem; color: var(--gold-primary); font-weight: bold;">70°</div>
        </div>

        <div style="margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 8px;">
          <span style="font-size: 0.95rem; color: #fff;">미지수 x = </span>
          <input type="number" id="stage2-input-x" placeholder="x의 값" style="width: 80px; padding: 8px; text-align: center; font-size: 1rem; border: 1px solid var(--gold-primary); border-radius: 6px; background: rgba(0,0,0,0.5); color: #fff; outline:none;">
          <button id="stage2-submit-btn" class="btn" style="width: 70px; padding: 9px; font-size: 0.85rem; margin: 0;">확인</button>
        </div>
      </div>
    `;
    this.sub2Input = document.getElementById("stage2-input-x");
    this.sub2Submit = document.getElementById("stage2-submit-btn");
  }

  bindEvents() {
    if (this.substage === 1) {
      this.bindEventsSubstage1();
    } else {
      this.bindEventsSubstage2();
    }
  }

  bindEventsSubstage1() {
    this.cardClickHandler = (e) => {
      this.cards.forEach(c => {
        c.style.borderColor = "var(--gold-primary)";
        c.style.background = "#1b263b";
        c.style.boxShadow = "0 4px 6px rgba(0,0,0,0.3)";
      });
      this.selectedCard = e.currentTarget;
      this.selectedCard.style.borderColor = "#ff4757";
      this.selectedCard.style.background = "rgba(255, 71, 87, 0.2)";
      this.selectedCard.style.boxShadow = "0 0 10px rgba(255, 71, 87, 0.6)";
    };

    this.zoneClickHandler = (e) => {
      if (!this.selectedCard) {
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showWarning("먼저 아래 각도 카드 중 하나를 선택한 뒤 빈칸을 클릭해 주세요.");
        }
        return;
      }
      
      const zoneId = e.currentTarget.id;
      const val = this.selectedCard.getAttribute("data-value");

      e.currentTarget.textContent = val + "°";
      e.currentTarget.style.background = "rgba(212,175,55,0.25)";
      e.currentTarget.style.borderColor = "var(--gold-primary)";
      e.currentTarget.style.color = "#fff";
      e.currentTarget.style.borderStyle = "solid";
      
      if (val === "60") {
        if (zoneId === "drop-zone-A") this.solved.zoneA = true;
        if (zoneId === "drop-zone-B") this.solved.zoneB = true;
      } else {
        if (zoneId === "drop-zone-A") this.solved.zoneA = false;
        if (zoneId === "drop-zone-B") this.solved.zoneB = false;
        
        if (typeof PuzzleState !== "undefined") {
          PuzzleState.wrongCount += 1;
          EventBus.publish("stateChange:puzzle", PuzzleState);
        }
        
        if (typeof FeedbackSystem !== "undefined") {
          if (val === "120") {
            FeedbackSystem.showError("틀렸습니다! 120°는 기준각(60°)의 보각입니다. 동위각과 엇각은 평행선 조건에서 기준각과 크기가 같습니다.");
          } else {
            FeedbackSystem.showError(`틀렸습니다! ${val}°는 기준각과 크기가 다릅니다. 동위각과 엇각은 기준각과 크기가 같아야 합니다.`);
          }
        }
      }

      if (this.checkAnswer()) {
        setTimeout(() => {
          if (this.onClearCallback) {
            this.onClearCallback(); // PuzzleScene에서 goNextSubstage()를 트리거하게 됨
          }
        }, 300);
      }
    };

    this.cards.forEach(card => {
      card.addEventListener("click", this.cardClickHandler);
    });

    this.zones.forEach(zone => {
      zone.addEventListener("click", this.zoneClickHandler);
    });
  }

  bindEventsSubstage2() {
    this.sub2InputHandler = (e) => {
      this.inputX = e.target.value;
    };

    this.sub2SubmitHandler = () => {
      const val = parseInt(this.inputX);
      if (val === this.targetX) {
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showSuccess("정답입니다! 2x + 10 = 70 방정식을 풀어 x = 30 임을 완벽히 유도했습니다! (+5점)");
        }
        // 최종 클리어 처리
        if (this.onClearCallback) {
          this.onClearCallback();
        }
      } else {
        if (typeof PuzzleState !== "undefined") {
          PuzzleState.wrongCount += 1;
          EventBus.publish("stateChange:puzzle", PuzzleState);
        }
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showError("틀렸습니다! 엇각의 크기가 같으므로 2x + 10 = 70 식을 만족해야 합니다. x의 값을 다시 계산해보세요.");
        }
      }
    };

    if (this.sub2Input) this.sub2Input.addEventListener("input", this.sub2InputHandler);
    if (this.sub2Submit) this.sub2Submit.addEventListener("click", this.sub2SubmitHandler);
  }

  checkAnswer() {
    if (this.substage === 1) {
      return this.solved.zoneA && this.solved.zoneB;
    } else {
      return parseInt(this.inputX) === this.targetX;
    }
  }

  goNextSubstage() {
    if (this.substage === 1) {
      this.destroy(); // Substage 1 리스너 해제
      this.substage = 2;
      
      // 씬 전환 후 로직 재호출
      if (typeof SceneManager !== "undefined") {
        // mid 스토리를 띄우고 다시 퍼즐로 돌아오게 함
        SceneManager.showScene("story", { stageId: "2_mid" });
      } else {
        this.init();
        this.bindEvents();
      }
      return true;
    }
    return false;
  }

  getHint(count) {
    if (this.substage === 1) {
      if (count === 1) return "동위각은 두 직선이 다른 한 직선과 만날 때 서로 같은 상대적 위치에 놓여 있는 각을 가리칩니다.";
      if (count === 2) return "두 직선이 평행할 때 동위각과 엇각은 항상 크기가 기준각(60°)과 동일합니다! 알맞게 매칭해 보세요.";
      return this.getSolution();
    } else {
      if (count === 1) return "두 직선이 평행하므로 마주 보는 엇각인 (2x + 10)°와 70°는 크기가 서로 같습니다.";

  }

  }

  reset() {
    this.solved = { zoneA: false, zoneB: false };
    this.inputX = "";
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.cards) {
      this.cards.forEach(card => {
        card.removeEventListener("click", this.cardClickHandler);
      });
    }
    if (this.zones) {
      this.zones.forEach(zone => {

      });

    if (this.sub2Input && this.sub2InputHandler) {

    }
    if (this.sub2Submit && this.sub2SubmitHandler) {
      this.sub2Submit.removeEventListener("click", this.sub2SubmitHandler);
    }
    this.container.innerHTML = "";
  }
}

  bindEvents() {
    this.dragStartHandler = (e) => {
      this.isDragging = true;
      this.startX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
    };

    this.dragMoveHandler = (e) => {
      if (!this.isDragging || this.hasGuideLine) return;
      const currentX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
      const diff = Math.abs(currentX - this.startX);

      if (diff > 40) {
        this.hasGuideLine = true;
        this.guideLine.style.opacity = "1";
        this.hintAngles.style.opacity = "1";
        
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showInfo("평행 보조선이 생성되었습니다! 엇각을 관찰해 보세요.");
        }
      }
    };

    this.dragEndHandler = () => {
      this.isDragging = false;
    };

    this.inputHandler = (e) => {
      this.userInput = e.target.value;
    };

    this.submitHandler = () => {
      if (!this.hasGuideLine) {
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showWarning("꺾임점에 수평선이 그려지지 않았습니다. 꺾임점을 좌우로 드래그하여 평행 보조선을 먼저 만드세요.");
        }
        return;
      }

      const val = parseInt(this.userInput);
      if (val === this.targetAngle) {
        this.input.disabled = true;
        this.submitBtn.disabled = true;
        this.playCorrectAnimation();
      } else {
        if (typeof PuzzleState !== "undefined") {
          PuzzleState.wrongCount += 1;
          EventBus.publish("stateChange:puzzle", PuzzleState);

        if (typeof FeedbackSystem !== "undefined") {

        }
      }
    };

      this.svg.addEventListener("mousemove",  this.dragMoveHandler);
      this.svg.addEventListener("touchmove",  this.dragMoveHandler, { passive: true });
      window.addEventListener("mouseup",    this.dragEndHandler);
      window.addEventListener("touchend",   this.dragEndHandler);
    }

    if (this.input) this.input.addEventListener("input", this.inputHandler);
    if (this.submitBtn) this.submitBtn.addEventListener("click", this.submitHandler);

    if (this.laser) {

    if (this.gem) {
      this.gem.setAttribute("fill", "#54a0ff");

    }

      setTimeout(() => {
        AnimationManager.playSolved(this.svg.parentNode);
      }, 400);
    }

    setTimeout(() => {
      if (this.onClearCallback) {
        this.onClearCallback();
      }
    }, 1500);

    return parseInt(this.userInput) === this.targetAngle;

  getSolution() {

    } else {
      return "P1 지점 보조선 아래 각도 30°가 P2 지점 보조선 위로 엇각 전파(30°)됩니다. P2 지점 보조선 아래는 M선과의 엇각으로 35°입니다. 따라서 x = 30° + 35° = 65°입니다.";
    }
  }

  getConceptText() {
    return "평행선 사이의 꺾인 선은 각 꺾인 점을 지나는 평행한 보조선을 그어 동위각과 엇각으로 해결합니다.";
  }

  reset() {
    this.hasGuideLine = false;
    this.userInput = "";
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.svg) {
      this.svg.removeEventListener("mousedown",  this.dragStartHandler);
      this.svg.removeEventListener("touchstart", this.dragStartHandler);
      this.svg.removeEventListener("mousemove",  this.dragMoveHandler);
      this.svg.removeEventListener("touchmove",  this.dragMoveHandler);
    }
    window.removeEventListener("mouseup",  this.dragEndHandler);
    window.removeEventListener("touchend", this.dragEndHandler);

    if (this.input && this.inputHandler) this.input.removeEventListener("input", this.inputHandler);
    if (this.submitBtn && this.submitHandler) this.submitBtn.removeEventListener("click", this.submitHandler);
    this.container.innerHTML = "";
  }
}
