<html>
  <head>
    <meta charset="UTF-8">

    <!-- CSS Include -->
    <style>
/* 폰트 로드 */
@import url("https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap");

:root {
  --bg-color: #080f1a;
  --panel-bg: rgba(13, 27, 42, 0.75);
  --gold-primary: #d4af37;
  --gold-hover: #f3e5ab;
  --gold-glow: rgba(212, 175, 55, 0.35);
  --text-light: #e0e1dd;
  --text-muted: #8892b0;
  --border-gold: rgba(212, 175, 55, 0.3);
  --font-title: "Outfit", "Noto Sans KR", sans-serif;
  --font-body: "Noto Sans KR", sans-serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: radial-gradient(circle at center, #1b263b 0%, #080f1a 100%);
  color: var(--text-light);
  font-family: var(--font-body);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
  padding: 15px;
  touch-action: manipulation; /* 모바일/태블릿 브라우저의 더블 탭 줌 대기 지연(300ms)을 제거하여 터치 즉시 반응하도록 개선 */
}

#game-container {
  width: 100%;
  max-width: 600px;
  min-height: 520px;
  position: relative;
}

/* 씬 전환 효과 */
.scene {
  display: none;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  width: 100%;
}

.scene.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

/* 글래스모피즘 패널 */
.card {
  background: var(--panel-bg);
  border: 1px solid var(--border-gold);
  border-radius: 20px;
  padding: 40px 30px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 25px var(--gold-glow);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: -50%;
  width: 200%;
  height: 100%;
  background: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.05), transparent);
  transform: skewX(-25deg);
  animation: shine 8s infinite linear;
  pointer-events: none; /* 클릭 이벤트가 관통되도록 차단 해제 */
}

h1 {
  font-family: var(--font-title);
  font-size: 2.8rem;
  font-weight: 800;
  color: var(--gold-primary);
  text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
  letter-spacing: 1px;
}

.sub-title {
  font-family: var(--font-title);
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--text-light);
  margin-bottom: 25px;
  letter-spacing: 2px;
}

.description {
  color: var(--text-muted);
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 30px;
}

/* 버튼 모션 디자인 */
.btn {
  background: linear-gradient(135deg, var(--gold-primary), #b8860b);
  border: none;
  color: #0b131f;
  padding: 15px 30px;
  font-size: 1.05rem;
  font-weight: 800;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  width: 100%;
  letter-spacing: 1px;
}

.btn:hover {
  background: linear-gradient(135deg, var(--gold-hover), var(--gold-primary));
  box-shadow: 0 6px 22px rgba(212, 175, 55, 0.5), 0 0 10px var(--gold-hover);
  transform: translateY(-2px);
}

.btn:active {
  transform: translateY(0);
}

.btn:disabled {
  background: #3a3b3c;
  color: #777;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.btn-secondary {
  background: transparent;
  border: 1px solid var(--gold-primary);
  color: var(--gold-primary);
  padding: 8px 16px;
  font-size: 0.85rem;
  font-weight: 700;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-secondary:hover {
  background: rgba(212, 175, 55, 0.15);
  color: var(--gold-hover);
  box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
}

/* 입력 필드 */
.form-group {

}

.form-group label {

  font-size: 0.85rem;

  margin-bottom: 8px;
  font-weight: 700;

}

.form-group input {

  background: rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(212, 175, 55, 0.2);
  border-radius: 8px;

  font-size: 1rem;

}

.form-group input:focus {

}

/* 대사 출력 영역 */
.story-box {

  justify-content: space-between;

}

.story-box:hover {

}

}

/* 퍼즐 컨테이너 */
.puzzle-wrapper {

  border: 1px solid var(--border-gold);

.puzzle-header {

  padding-bottom: 12px;
}

.puzzle-header h3 {

  color: var(--gold-primary);
  font-weight: 700;
  font-size: 1.3rem;
}

.puzzle-canvas-area {
  background: rgba(5, 10, 18, 0.75);
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.03);
  min-height: 360px;
  display: flex;
  justify-content: center;
  align-items: center;
  touch-action: none; /* 모바일 터치 드래그 시 뷰포트 스크롤 간섭 완전 차단 */
}

/* 결과 패널 */
.record-box {
  background: rgba(0, 0, 0, 0.5);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 30px;
  font-size: 1rem;
  color: var(--gold-primary);

}

/* 테이블 구조 */
.ranking-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

.ranking-table th, .ranking-table td {

  text-align: center;
  border-bottom: 1px solid rgba(212, 175, 55, 0.15);
}

.ranking-table th {
  color: var(--gold-primary);
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 1px;
}

.ranking-table td {
  font-size: 0.95rem;
  color: var(--text-light);
}

.ranking-table tbody tr:hover {

}

/* 애니메이션 */
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

@keyframes shine {
  0% { left: -100%; }
  100% { left: 100%; }
}

/* 모바일 쿼리 */
@media (max-width: 480px) {
  .card {
    padding: 30px 20px;
  }
  h1 {

  }

    font-size: 1.3rem;
  }
  .story-box {
    padding: 20px;

  }
  .dialog-text {
    font-size: 1.05rem;
    line-height: 1.7;
  }
  .ranking-table th, .ranking-table td {
    padding: 10px 5px;
    font-size: 0.85rem;
  }
}

    <script>
/**
 * 전역 이벤트 버스 객체.
 * 컴포넌트 간 직접 결합을 방지하고 상태 변경 이벤트를 비동기식으로 브로드캐스트합니다.
 */
const EventBus = (function() {
  const listeners = {};

  return {
    /**
     * 특정 이벤트에 대해 구독을 신청합니다.
     * @param {String} event - 이벤트명
     * @param {Function} callback - 호출할 콜백 함수
     * @returns {Function} 구독 해제를 수행하는 함수
     */
    subscribe: function(event, callback) {
      if (!listeners[event]) {
        listeners[event] = [];
      }
      listeners[event].push(callback);
      
      return () => this.unsubscribe(event, callback);
    },

    /**
     * 특정 이벤트의 구독을 해제합니다.
     * @param {String} event
     * @param {Function} callback
     */
    unsubscribe: function(event, callback) {
      if (!listeners[event]) return;
      listeners[event] = listeners[event].filter(cb => cb !== callback);
    },

    /**
     * 특정 이벤트를 발행하여 구독 중인 모든 콜백을 실행시킵니다.
     * @param {String} event
     * @param {*} data - 콜백에 주입할 데이터
     */
    publish: function(event, data) {
      if (!listeners[event]) return;
      const callbacks = [...listeners[event]];
      callbacks.forEach(cb => {
        try {
          cb(data);
        } catch (err) {
          console.error(`EventBus publish error for [${event}]:`, err);
        }
      });
    }
  };
})();
</script>

    <script>
/**
 * 세분화된 클라이언트 글로벌 상태 정의.
 */
const UserState = {
  studentNo: "",
  name: "",
  browser: "",
  device: ""
};

const GameState = {
  currentStage: 1,
  startTime: null,
  endTime: null,
  cleared: false,
  gameVersion: "1.0.0"
};

const PuzzleState = {
  correctCount: 0,
  wrongCount: 0,
  hintCount: 0,
  score: 0
};

const UiState = {
  currentSceneId: "intro"
};

/**
 * 상태 저장 및 새로고침 대응 복구 유틸리티.
 */
const StateStore = {
  saveToLocalStorage: function() {
    try {
      localStorage.setItem("user_state", JSON.stringify(UserState));
      localStorage.setItem("game_state", JSON.stringify(GameState));
      localStorage.setItem("puzzle_state", JSON.stringify(PuzzleState));
    } catch (e) {
      console.error("localStorage 저장 실패:", e);
    }
  },
  
  loadFromLocalStorage: function() {
    try {
      const user = localStorage.getItem("user_state");
      const game = localStorage.getItem("game_state");
      const puzzle = localStorage.getItem("puzzle_state");
      
      if (user && game && puzzle) {
        Object.assign(UserState, JSON.parse(user));
        Object.assign(GameState, JSON.parse(game));
        Object.assign(PuzzleState, JSON.parse(puzzle));
        
        console.log("로컬스토리지로부터 이전 게임 상태가 복구되었습니다.");
        return true;
      }
    } catch (e) {
      console.error("localStorage 데이터 로드 실패:", e);
    }
    return false;
  },
  
  clearStorage: function() {
    try {
      localStorage.removeItem("user_state");
      localStorage.removeItem("game_state");
      localStorage.removeItem("puzzle_state");
      console.log("로컬스토리지 게임 상태가 초기화되었습니다.");
    } catch (e) {
      console.error("localStorage 데이터 삭제 실패:", e);
    }
  }
};
</script>

    <script>
/**
 * 씬 전환 및 생명주기 제어를 담당하는 엔진.
 * 개별 Scene 객체들은 SceneManager에 등록되어 생명주기 훅(enter, exit)을 수행합니다.
 */
const SceneManager = (function() {
  let currentScene = null;
  const scenes = {};

  return {
    /**
     * Scene 객체를 등록합니다.
     * @param {String} sceneId - 등록할 씬의 ID (DOM 컨테이너 ID 매핑용)
     * @param {Object} sceneInstance - enter(), exit() 메서드를 구현한 씬 객체
     */
    register: function(sceneId, sceneInstance) {
      scenes[sceneId] = sceneInstance;
    },

    /**
     * 지정된 씬으로 전환하고 생명주기 훅을 실행시킵니다.
     * @param {String} sceneId - 대상 씬 ID
     * @param {*} data - 새 씬 진입 시 전달할 옵션 데이터
     */
    showScene: function(sceneId, data) {
      const nextScene = scenes[sceneId];
      if (!nextScene) {
        console.error(`Scene [${sceneId}]이 등록되지 않았습니다.`);
        return;
      }

      // 1. 기존 씬 정리 (exit)
      if (currentScene) {
        try {
          if (typeof currentScene.exit === "function") {
            currentScene.exit();
          }
        } catch (err) {
          console.error("이전 씬 exit() 실행 실패:", err);
        }
      }

      // 화면 상의 모든 씬 컨테이너를 비활성화 (겹침 방지)
      document.querySelectorAll(".scene").forEach(el => {
        el.classList.remove("active");
      });

      // 2. 상태 갱신 및 이벤트 전파
      if (typeof UiState !== "undefined") {
        UiState.currentSceneId = sceneId;
        if (typeof EventBus !== "undefined") {
          EventBus.publish("stateChange:ui", UiState);
        }
      }

      // 3. 새 씬 표시 (enter)
      currentScene = nextScene;
      const nextDom = document.getElementById(`scene-${sceneId}`);
      if (nextDom) {
        nextDom.classList.add("active");
      } else {
        console.warn(`scene-${sceneId} 아이디를 가진 DOM 컨테이너가 존재하지 않습니다.`);
      }

      try {
        if (typeof currentScene.enter === "function") {
          currentScene.enter(data);
        }
      } catch (err) {
        console.error("새로운 씬 enter() 실행 실패:", err);
      }
    }
  };
})();
</script>

    <script>
/**
 * 대사(스토리) 진행 및 타이핑 이펙트를 담당하는 매니저.
 */
const StoryManager = (function() {
  let dialogueQueue = [];
  let onComplete = null;
  let isTyping = false;
  let typingTimer = null;
  let currentFullText = "";
  let currentEl = null;

  return {
    /**
     * 특정 스테이지의 스토리를 시작합니다.
     * @param {Number} stageId
     * @param {Function} onCompleteCallback - 모든 대사 소진 시 실행할 콜백
     */
    startStory: function(stageId, onCompleteCallback) {
      if (typeof StoryDictionary === "undefined" || !StoryDictionary[stageId]) {
        console.error(`스테이지 ${stageId}의 스토리 데이터가 존재하지 않습니다.`);
        if (onCompleteCallback) onCompleteCallback();
        return;
      }
      
      dialogueQueue = [...StoryDictionary[stageId]];
      onComplete = onCompleteCallback;
      
      this.next();
    },

    /**
     * 다음 대사로 넘어가거나, 타이핑 도중이면 전체 텍스트를 즉시 노출합니다.
     */
    next: function() {
      currentEl = document.getElementById("story-dialog-text");
      if (!currentEl) return;

      // 1. 타이핑 중 클릭 시 타이핑 중단하고 전체 텍스트 일괄 노출
      if (isTyping) {
        clearTimeout(typingTimer);
        isTyping = false;
        currentEl.innerText = currentFullText;
        return;
      }

      // 2. 대사가 남아있지 않은 경우 완료 함수 트리거
      if (dialogueQueue.length === 0) {
        if (typeof onComplete === "function") {
          onComplete();
        }
        return;
      }

      // 3. 다음 대사를 꺼내 타이핑 효과 적용
      currentFullText = dialogueQueue.shift();
      this.typeText(currentFullText, currentEl);
    },

    /**
     * 문자열을 타이핑 효과와 함께 화면에 출력합니다.
     * @param {String} text
     * @param {HTMLElement} element
     */
    typeText: function(text, element) {
      isTyping = true;
      element.innerText = "";
      let index = 0;
      const speed = 35; // 한 글자당 대기 시간 (ms)

      function type() {

    register: function(stageId, puzzleClass) {

     * @param {String} containerId
     */
    loadPuzzle: function(stageId, containerId) {

/**
 * GAS 서버 API 호출을 대행하는 범용 비동기 클라이언트 유틸리티.
 * google.script.run 환경이 없는 로컬 오프라인 브라우저에서의 테스트를 지원하기 위해
 * 자동으로 환경을 감지하고 모의(Mock) 응답을 반환하는 가상 런타임을 포함합니다.
 */
const DbService = {
  /**
   * 백엔드 Code.js의 서버 사이드 함수를 호출합니다.
   * @param {String} functionName - 호출할 서버 함수명 (예: 'saveGameResult')
   * @param {Array} args - 전달할 인수 배열 (예: [payload])
   * @param {Function} onSuccess - 성공 수신 콜백
   * @param {Function} onFailure - 실패 수신 콜백
   */
  call: function(functionName, args, onSuccess, onFailure) {
    // 1. 실제 GAS 서빙 환경인 경우
    if (typeof google !== "undefined" && google.script && google.script.run) {
      let runner = google.script.run;
      if (onSuccess) {
        runner = runner.withSuccessHandler(onSuccess);
      }
      if (onFailure) {
        runner = runner.withFailureHandler(onFailure);
      }
      
      // 동적 함수 호출 바인딩
      if (typeof runner[functionName] === "function") {
        runner[functionName].apply(runner, args);
      } else {
        console.error(`[DbService] 서버 함수 [${functionName}]를 호출할 수 없습니다.`);
        if (onFailure) onFailure(new Error(`함수 ${functionName} 존재 안 함`));
      }
    } 
    // 2. 로컬 브라우저 개발/디버그 환경인 경우 (Mock)
    else {
      console.warn(`[DbService] 로컬 모의 환경에서 [${functionName}]을 처리합니다.`);
      setTimeout(() => {
        try {
          if (functionName === "saveGameResult") {
            if (onSuccess) onSuccess({ success: true, message: "[로컬 환경] 데이터 저장 성공" });
          } else if (functionName === "getLeaderboard") {
            if (onSuccess) onSuccess([
              { rank: 1, name: "아더", studentNo: "10203", score: 100, playTime: 120 },
              { rank: 2, name: "멀린", studentNo: "10105", score: 95, playTime: 145 },
              { rank: 3, name: "랜슬롯", studentNo: "10311", score: 90, playTime: 160 }
            ]);
          } else {
            if (onSuccess) onSuccess();
          }
        } catch (e) {
          if (onFailure) onFailure(e);
        }
      }, 600);
    }
  }
};
</script>

    <script>
/**
 * 게임 결과 영속성 데이터 저장소.
 * 클라이언트와 GAS 백엔드 DB 연동 레이어 간의 데이터 전송을 담당하며,
 * 동시성 락 충돌 및 네트워크 유실에 대비한 지수 백오프 재시도 및 로컬 임시 백업 보관 정책을 지원합니다.
 */
const ResultRepository = {
  /**
   * 게임 플레이 최종 기록을 서버에 전송하여 안전하게 저장합니다.
   * @param {Object} payload - 결과 기록 정보 DTO
   * @param {Function} onSuccess - 성공 콜백
   * @param {Function} onFailure - 최종 실패 콜백
   * @param {Number} retryCount - 내부 재시도 인덱스
   */
  saveResult: function(payload, onSuccess, onFailure, retryCount = 1) {
    if (!payload || !payload.studentNo || !payload.name) {
      if (onFailure) {
        onFailure(new Error("학번과 이름이 누락된 데이터는 저장할 수 없습니다."));
      }
      return;
    }

    payload.gameVersion = payload.gameVersion || "1.0.0";
    payload.submitTime = payload.submitTime || new Date().toISOString();

    const maxRetries = 3;
    const retryDelay = 2000; // 재시도 대기 간격 (2초)

    DbService.call(
      "saveGameResult",
      [payload],
      function(response) {
        if (response && response.success) {
          // 최종 성공 시 백업 보관했던 결과가 있다면 클리어
          localStorage.removeItem("saved_game_result_backup");
          if (onSuccess) onSuccess(response);
        } else {
          // 서버 측 락 획득 타임아웃 등으로 처리가 밀린 경우 재시도 작동
          if (retryCount <= maxRetries) {
            console.warn(`[ResultRepository] 락 타임아웃 감지. ${retryDelay}ms 후 재시도 (${retryCount}/${maxRetries})`);
            setTimeout(() => {
              ResultRepository.saveResult(payload, onSuccess, onFailure, retryCount + 1);
            }, retryDelay);
          } else {
            // 로컬 스토리지에 결과 복구용 임시 보존
            localStorage.setItem("saved_game_result_backup", JSON.stringify(payload));
            if (onFailure) {
              onFailure(new Error(response.message || "서버 혼잡으로 기록 저장에 실패하여 로컬 브라우저에 결과를 보관했습니다."));
            }
          }
        }
      },
      function(err) {
        // 네트워크 연결 에러 등 RPC 실패 시 재시도 작동
        if (retryCount <= maxRetries) {
          console.warn(`[ResultRepository] 네트워크 장애 감지. ${retryDelay}ms 후 재시도 (${retryCount}/${maxRetries})`);
          setTimeout(() => {
            ResultRepository.saveResult(payload, onSuccess, onFailure, retryCount + 1);
          }, retryDelay);
        } else {
          // 로컬 스토리지 백업 처리
          localStorage.setItem("saved_game_result_backup", JSON.stringify(payload));
          if (onFailure) {
            onFailure(new Error("서버와의 통신 오류로 전송하지 못했습니다. 결과 기록은 브라우저에 임시 백업되었습니다."));
          }
        }
      }
    );
  },

  /**
   * 서버로부터 원본 랭킹 목록을 조회합니다.
   * @param {Function} onSuccess
   * @param {Function} onFailure
   */
  getRawLeaderboard: function(onSuccess, onFailure) {
    DbService.call(
      "getLeaderboard",
      [],
      function(response) {
        if (onSuccess) onSuccess(response);
      },
      function(err) {
        if (onFailure) onFailure(err);
      }
    );
  }
};
</script>

    <script>
/**
 * 랭킹 및 리더보드 데이터 가공 비즈니스 서비스.
 * 서버로부터 수신된 원본 데이터를 정렬 조건에 맞추어 정제합니다.
 */
const RankingService = {
  /**
   * 정렬 가이드라인을 적용하여 상위 랭킹 리스트를 획득합니다.
   * 정렬 조건 우선순위:
   * 1. 점수(Score) 내림차순 (높은 순)
   * 2. 소요시간(PlayTime) 오름차순 (빠른 순)
   * 3. 제출시간(SubmitTime) 오름차순 (먼저 완료한 순)
   * @param {Function} onSuccess
   * @param {Function} onFailure
   */
  getLeaderboard: function(onSuccess, onFailure) {
    ResultRepository.getRawLeaderboard(
      function(rawList) {
        if (!rawList || !Array.isArray(rawList)) {
          if (onSuccess) onSuccess([]);
          return;
        }

        // 다중 정렬 규칙 가공 적용
        const sortedList = [...rawList].sort((a, b) => {
          // 1순위: 점수 비교
          if (b.score !== a.score) {
            return b.score - a.score;
          }
          // 2순위: 소요 시간 비교
          if (a.playTime !== b.playTime) {
            return a.playTime - b.playTime;
          }
          // 3순위: 제출 타임스탬프 비교
          const timeA = a.submitTime ? new Date(a.submitTime).getTime() : 0;
          const timeB = b.submitTime ? new Date(b.submitTime).getTime() : 0;
          return timeA - timeB;
        });

        // 상위 10개 레코드 추출 제한
        const topTen = sortedList.slice(0, 10).map((item, idx) => ({
          rank: idx + 1,
          studentNo: item.studentNo,
          name: item.name,
          score: item.score,
          playTime: item.playTime
        }));

        if (onSuccess) onSuccess(topTen);
      },
      function(err) {
        if (onFailure) onFailure(err);
      }
    );
  }
};
</script>

        setTimeout(() => {

  reset() {

      this.slider.value = 90;
      this.currentAngle = 90;

      e.currentTarget.style.color = "#fff";

        if (zoneId === "drop-zone-B") this.solved.zoneB = true;

        if (zoneId === "drop-zone-B") this.solved.zoneB = false;

    });

  checkAnswer() {
    return this.solved.zoneA && this.solved.zoneB;

  reset() {
    this.solved = { zoneA: false, zoneB: false };
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.cards) {
      this.cards.forEach(card => {
        card.removeEventListener("click", this.cardClickHandler);
      });
    }
    if (this.zones) {
      this.zones.forEach(zone => {
        zone.removeEventListener("click", this.zoneClickHandler);
      });
    }
    this.container.innerHTML = "";
  }

          alert(`축하합니다! 50° + ${this.solved.zoneB}° + ${this.solved.zoneC}° = 180°가 완성되어 제단의 봉인이 풀렸습니다.`);
          if (this.onClearCallback) {
            this.onClearCallback();
          } else {
            const clearBtn = document.getElementById("mock-puzzle-clear-btn");
            if (clearBtn) clearBtn.click();
          }
        }, 300);
      } else {
        // 둘 다 값이 차있는데 틀린 경우 오답 카운팅 및 안내
        if (this.solved.zoneB && this.solved.zoneC) {
          if (typeof PuzzleState !== "undefined") {
            PuzzleState.wrongCount += 1;
            EventBus.publish("stateChange:puzzle", PuzzleState);
          }
          alert("세 내각의 크기의 합이 180°가 되지 않습니다. 다시 구성해 보세요.");
        }
      }
    };

    this.cards.forEach(card => {
      card.addEventListener("click", this.cardClickHandler);
    });

    this.zones.forEach(zone => {
      zone.addEventListener("click", this.zoneClickHandler);
    });
  }

  render() {
    if (this.formula) {
      const bStr = this.solved.zoneB ? `${this.solved.zoneB}°` : "B";
      const cStr = this.solved.zoneC ? `${this.solved.zoneC}°` : "C";
      const total = this.fixedAngle + (this.solved.zoneB || 0) + (this.solved.zoneC || 0);
      this.formula.innerHTML = `식: 50° + ${bStr} + ${cStr} = <strong style="color: ${total === 180 ? '#2ecc71' : '#ff4757'}">${total}°</strong>`;
    }
  }

  checkAnswer() {
    if (!this.solved.zoneB || !this.solved.zoneC) return false;
    return (this.fixedAngle + this.solved.zoneB + this.solved.zoneC) === 180;
  }

  reset() {
    this.solved = { zoneB: null, zoneC: null };
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.cards) {
      this.cards.forEach(card => {
        card.removeEventListener("click", this.cardClickHandler);
      });
    }
    if (this.zones) {
      this.zones.forEach(zone => {
        zone.removeEventListener("click", this.zoneClickHandler);
      });
    }
    this.container.innerHTML = "";
  }
}

// 퍼즐 등록
PuzzleManager.register(4, Stage4Puzzle);
</script>

const PuzzleScene = {
  enter: function(data) {
    const stageId = data ? data.stageId : 1;
    console.log(`[PuzzleScene] 진입 - 스테이지 ${stageId}`);
    
    const stageTitleEl = document.getElementById("puzzle-stage-title");
    if (stageTitleEl) {
      stageTitleEl.innerText = `스테이지 ${stageId} - 방 탈출 퍼즐`;
    }
    
    // 1. PuzzleManager를 통해 퍼즐 인스턴스 기동 및 클리어 핸들러 연결
    const currentPuzzle = PuzzleManager.loadPuzzle(stageId, "puzzle-board-container");
    if (currentPuzzle) {
      currentPuzzle.onClearCallback = () => {
        // 정답 수 갱신
        PuzzleState.correctCount = stageId;
        EventBus.publish("stateChange:puzzle", PuzzleState);
        
        if (stageId < 5) {
          // 다음 스테이지 이동
          GameState.currentStage = stageId + 1;
          EventBus.publish("stateChange:game", GameState);
          
          if (typeof StateStore !== "undefined") {
            StateStore.saveToLocalStorage();
          }
          
          SceneManager.showScene("story", { stageId: GameState.currentStage });
        } else {
          // 보스 퍼즐 클리어 -> 엔딩으로
          GameState.endTime = new Date().toISOString();
          GameState.cleared = true;
          EventBus.publish("stateChange:game", GameState);
          
          if (typeof StateStore !== "undefined") {
            StateStore.saveToLocalStorage();
          }
          
          SceneManager.showScene("ending");
        }
      };
    }
    
    // 2. 힌트 버튼 리스너 바인딩
    const hintBtn = document.getElementById("puzzle-hint-btn");
    if (hintBtn) {
      this.hintHandler = () => {
        PuzzleState.hintCount += 1;
        EventBus.publish("stateChange:puzzle", PuzzleState);
        
        let hintMsg = "도형의 정의를 찬찬히 살펴보세요.";
        if (stageId === 1) hintMsg = "맞꼭지각은 두 직선이 만날 때 생기는 서로 마주보는 두 각이며, 크기가 항상 동일합니다.";
        if (stageId === 2) hintMsg = "두 선이 평행할 때, 횡단선과의 위치가 동일한 동위각과 서로 지그재그 관계인 엇각의 크기는 같습니다.";
        if (stageId === 3) hintMsg = "꺾임점을 가로지르는 제3의 평행 가상 보조선을 그리면 위아래 엇각 관계(45도와 30도)로 쪼개져 합이 75도가 됩니다.";
        if (stageId === 4) hintMsg = "삼각형 내부의 세 내각의 총합은 언제나 180도입니다. 고정 50도를 제외한 나머지 두 칸의 각도 카드의 합이 130도가 되도록 매칭하세요.";
        if (stageId === 5) hintMsg = "평행선 사이 엇각(45도)을 유추하여 삼각형 내부 내각(45도)을 얻고, 삼각형의 한 외각은 이웃하지 않는 두 내각의 합과 같으므로 x = 45 + 60 입니다.";
        
        alert(`[마도사의 힌트]\n${hintMsg} (누적 사용: ${PuzzleState.hintCount}회)`);
      };
      hintBtn.addEventListener("click", this.hintHandler);
    }
  },
  
  exit: function() {
    console.log("[PuzzleScene] 이탈");
    
    // 퍼즐 인스턴스 메모리 자원 회수
    PuzzleManager.clearActivePuzzle();
    
    const hintBtn = document.getElementById("puzzle-hint-btn");
    if (hintBtn && this.hintHandler) {
      hintBtn.removeEventListener("click", this.hintHandler);
    }
  }
};

// 씬 등록
SceneManager.register("puzzle", PuzzleScene);

      console.log("[State Update] UiState:", ui);
    });
  }

  // 2. 새로고침 상태 복구 시도
  let restored = false;
  if (typeof StateStore !== "undefined") {
    restored = StateStore.loadFromLocalStorage();
  }

  // 3. 최초 라우팅 제어
  if (restored && GameState.startTime && !GameState.cleared) {
    console.log(`이전 세션이 존재하여 스테이지 ${GameState.currentStage}로 복구합니다.`);
    SceneManager.showScene("puzzle", { stageId: GameState.currentStage });
  } else {
    SceneManager.showScene("intro");
  }

  // 4. 비정상 이탈 방지 경고 리스너
  window.addEventListener("beforeunload", function(e) {
    if (GameState.startTime && !GameState.cleared) {
      const msg = "진행 중인 탈출 기록이 사라집니다. 정말 페이지를 나가시겠습니까?";
      (e || window.event).returnValue = msg;
      return msg;
    }
  });
});
</script>

  </body>
</html>
