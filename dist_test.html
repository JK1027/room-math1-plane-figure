<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Geometry Escape: 기하의 성</title>
    <!-- CSS Include -->
    <style>
/* 폰트 로드 */
@import url("https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap");

:root {
  /* 기존 */
  --bg-color: #080f1a;
  --panel-bg: rgba(13, 27, 42, 0.75);
  --gold-primary: #d4af37;
  --gold-hover: #f3e5ab;
  --gold-glow: rgba(212, 175, 55, 0.35);
  --text-light: #e0e1dd;
  --text-muted: #8892b0;
  --border-gold: rgba(212, 175, 55, 0.3);
  --font-title: "Outfit", "Noto Sans KR", sans-serif;
  --font-body: "Noto Sans KR", sans-serif;

  /* 신규: 확장 색상 변수 */
  --gold-light: #fff0a0;
  --gold-dim: rgba(212, 175, 55, 0.15);
  --navy-deep: #040a14;
  --fog-color: rgba(100, 160, 255, 0.04);
  --rune-color: rgba(120, 200, 255, 0.12);
  --rune-glow: rgba(100, 180, 255, 0.4);

  /* 신규: 스테이지별 배경 변수 */
  --stage1-from: #001a0a;  /* 거울의 숲: 어두운 초록 */
  --stage1-to:   #0b131f;
  --stage2-from: #0a0014;  /* 신전: 어두운 보라 */
  --stage2-to:   #1b1040;
  --stage3-from: #001030;  /* 빛의 신전: 어두운 파랑 */
  --stage3-to:   #0a2060;
  --stage4-from: #200000;  /* 제단: 어두운 빨강 */
  --stage4-to:   #0b131f;
  --stage5-from: #1a000a;  /* 알현실: 어두운 자주 */
  --stage5-to:   #200010;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: radial-gradient(circle at center, #1b263b 0%, #080f1a 100%);
  color: var(--text-light);
  font-family: var(--font-body);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
  padding: 15px;
  touch-action: manipulation; /* 모바일/태블릿 브라우저의 더블 탭 줌 대기 지연(300ms)을 제거하여 터치 즉시 반응하도록 개선 */
}

#game-container {
  width: 100%;
  max-width: 600px;
  min-height: 520px;
  position: relative;
}

/* 씬 전환 효과 */
.scene {
  display: none;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  width: 100%;
}

.scene.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

/* 글래스모피즘 패널 */
.card {
  background: var(--panel-bg);
  border: 1px solid var(--border-gold);
  border-radius: 20px;
  padding: 40px 30px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 25px var(--gold-glow);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: -50%;
  width: 200%;
  height: 100%;
  background: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.05), transparent);
  transform: skewX(-25deg);
  animation: shine 8s infinite linear;
  pointer-events: none; /* 클릭 이벤트가 관통되도록 차단 해제 */
}

h1 {
  font-family: var(--font-title);
  font-size: 2.8rem;
  font-weight: 800;
  color: var(--gold-primary);
  text-shadow:
    0 0 10px rgba(212, 175, 55, 0.5),
    0 0 30px rgba(212, 175, 55, 0.25),
    0 0 60px rgba(212, 175, 55, 0.12);
  letter-spacing: 1px;
}

.sub-title {
  font-family: var(--font-title);
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--text-light);
  margin-bottom: 25px;
  letter-spacing: 2px;
}

.description {
  color: var(--text-muted);
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 30px;
}

/* 버튼 3상태 디자인 (Idle / Hover / Active) */
.btn {
  background: linear-gradient(135deg, var(--gold-primary), #b8860b);
  border: none;
  color: #0b131f;
  padding: 15px 30px;
  font-size: 1.05rem;
  font-weight: 800;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  width: 100%;
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
  /* Idle: 황금빛 맥동 */
  animation: btnIdle 3s ease-in-out infinite;
}

/* Hover: 위로 뜨며 외광 강화 */
.btn:hover {
  background: linear-gradient(135deg, var(--gold-hover), var(--gold-primary));
  box-shadow: 0 8px 28px rgba(212, 175, 55, 0.6), 0 0 16px var(--gold-light);
  transform: translateY(-3px);
  animation: none;
}

/* Active(클릭): 눌리는 느낌 + 내광 순간 점화 */
.btn:active {
  transform: translateY(1px);
  box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5), 0 0 20px var(--gold-light);
  transition: all 0.08s;
  animation: none;
}

.btn:disabled {
  background: #3a3b3c;
  color: #777;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
  border: 1px solid rgba(255, 255, 255, 0.05);
  animation: none;
}

@keyframes btnIdle {
  0%, 100% { box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
  50%       { box-shadow: 0 4px 22px rgba(212, 175, 55, 0.55), 0 0 8px rgba(212, 175, 55, 0.2); }
}

.btn-secondary {
  background: transparent;
  border: 1px solid var(--gold-primary);
  color: var(--gold-primary);
  padding: 8px 16px;
  font-size: 0.85rem;
  font-weight: 700;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-secondary:hover {
  background: rgba(212, 175, 55, 0.15);
  color: var(--gold-hover);
  box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
}

/* 입력 필드 */
.form-group {
  margin-bottom: 22px;
  text-align: left;
}

.form-group label {
  display: block;
  font-size: 0.85rem;
  color: var(--gold-primary);
  margin-bottom: 8px;
  font-weight: 700;
  letter-spacing: 1px;
}

.form-group input {
  width: 100%;
  padding: 13px 15px;
  background: rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(212, 175, 55, 0.2);
  border-radius: 8px;
  color: #fff;
  font-size: 1rem;
  outline: none;
  transition: all 0.3s ease;
}

.form-group input:focus {
  border-color: var(--gold-primary);
  box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
}

/* 대사 출력 영역 */
.story-box {
  background: rgba(8, 15, 26, 0.9);
  border: 2px solid var(--gold-primary);
  border-radius: 16px;
  padding: 30px;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7), 0 0 15px rgba(212, 175, 55, 0.15);
  transition: border-color 0.3s ease;
}

.story-box:hover {
  border-color: var(--gold-hover);
}

.dialog-text {
  font-size: 1.15rem;
  line-height: 1.8;
  color: #f1f2f6;
  white-space: pre-line;
}

.tap-indicator {
  align-self: flex-end;
  font-size: 0.8rem;
  color: var(--gold-primary);
  font-weight: bold;
  letter-spacing: 1px;
  animation: bounce 1.5s infinite;
  transition: opacity 0.3s ease;
}

/* 타이핑 중일 때 인디케이터 숨김 */
.story-box.typing .tap-indicator {
  opacity: 0;
}

/* Pulse Border: outline + box-shadow 동시 사용 */
.story-box.typing {
  outline: 1px solid transparent;
  animation: pulseBorder 0.8s ease-in-out infinite;
}

@keyframes pulseBorder {
  0%, 100% {
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7), 0 0 8px rgba(212, 175, 55, 0.15);
    outline-color: transparent;
    border-color: var(--gold-primary);
  }
  50% {
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7), 0 0 22px rgba(212, 175, 55, 0.5);
    outline-color: rgba(212, 175, 55, 0.25);
    border-color: var(--gold-hover);
  }
}

/* 퍼즐 컨테이너 */
.puzzle-wrapper {
  background: var(--panel-bg);
  border: 1px solid var(--border-gold);
  border-radius: 20px;
  padding: 25px;
  backdrop-filter: blur(12px);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 20px var(--gold-glow);
}

.puzzle-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.2);
  padding-bottom: 12px;
}

.puzzle-header h3 {
  font-family: var(--font-title);
  color: var(--gold-primary);
  font-weight: 700;
  font-size: 1.3rem;
}

.puzzle-canvas-area {
  background: rgba(5, 10, 18, 0.75);
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.03);
  min-height: 360px;
  display: flex;
  justify-content: center;
  align-items: center;
  touch-action: none; /* 모바일 터치 드래그 시 뷰포트 스크롤 간섭 완전 차단 */
}

/* 결과 패널 */
.record-box {
  background: rgba(0, 0, 0, 0.5);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 30px;
  font-size: 1rem;
  color: var(--gold-primary);
  font-weight: 700;
  border: 1px dashed var(--border-gold);
}

/* 테이블 구조 */
.ranking-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

.ranking-table th, .ranking-table td {
  padding: 14px 10px;
  text-align: center;
  border-bottom: 1px solid rgba(212, 175, 55, 0.15);
}

.ranking-table th {
  color: var(--gold-primary);
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 1px;
}

.ranking-table td {
  font-size: 0.95rem;
  color: var(--text-light);
}

.ranking-table tbody tr:hover {
  background: rgba(212, 175, 55, 0.04);
}

/* 애니메이션 */
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

@keyframes shine {
  0% { left: -100%; }
  100% { left: 100%; }
}

/* 룬 링 회전 */
@keyframes runeRotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* 룬 링 역방향 회전 (내부 링) */
@keyframes runeRotateReverse {
  from { transform: rotate(0deg); }
  to   { transform: rotate(-360deg); }
}

/* 페이드인 등장 */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 마법진 등장 */
@keyframes magicCircleIn {
  from { opacity: 0; transform: scale(0.3) rotate(-30deg); }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}

/* 빛 번쩍 */
@keyframes flashWhite {
  0%   { filter: brightness(1); }
  30%  { filter: brightness(2.5) saturate(0.5); }
  100% { filter: brightness(1); }
}

/* 텍스트 위로 소멸 */
@keyframes floatUp {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-30px); }
}

/* 성문 왼쪽 열림 */
@keyframes gateOpenLeft {
  from { transform: translateX(0); }
  to   { transform: translateX(-52%); }
}

/* 성문 오른쪽 열림 */
@keyframes gateOpenRight {
  from { transform: translateX(0); }
  to   { transform: translateX(52%); }
}

/* 성문 빛 넘침 */
@keyframes gateGlow {
  from { opacity: 0; transform: scaleX(0.1); }
  to   { opacity: 1; transform: scaleX(1); }
}

/* 컨페티 낙하 */
@keyframes confettiFall {
  from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  to   { transform: translateY(420px) rotate(720deg); opacity: 0; }
}

/* 안개 표류 */
@keyframes fogDrift {
  from { transform: translateX(-5%) translateY(0); }
  to   { transform: translateX(5%) translateY(-3%); }
}

/* 별 반짝임 */
@keyframes starTwinkle {
  0%, 100% { opacity: 0.75; }
  50%       { opacity: 0.35; }
}

/* 별 이동 (느린 흐름) */
@keyframes starDrift {
  from { transform: translateY(0); }
  to   { transform: translateY(-30px); }
}

/* 인트로 룬 링 진동 */
@keyframes runeRingPulse {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 0.9; }
}

/* 업적 토스트 슬라이드인 */
@keyframes toastSlideIn {
  from { transform: translateX(120%); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

@keyframes toastSlideOut {
  from { transform: translateX(0); opacity: 1; }
  to   { transform: translateX(120%); opacity: 0; }
}

/* 바운스 팝 (업적, 정답 텍스트) */
@keyframes popIn {
  0%   { transform: scale(0); opacity: 0; }
  70%  { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* 인트로 룬 링 래퍼 */
.rune-ring-wrapper {
  position: relative;
  width: 120px;
  height: 120px;
  margin: 0 auto 16px;
}

.rune-ring-svg {
  width: 100%;
  height: 100%;
  animation: runeRotate 20s linear infinite;
}

.rune-ring-svg .inner-ring {
  animation: runeRotateReverse 12s linear infinite;
  transform-origin: center;
}

.rune-ring-svg .outer-ring {
  animation: runeRingPulse 4s ease-in-out infinite;
}

/* 업적 토스트 */
.achievement-toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(13, 27, 42, 0.95);
  border: 1px solid var(--gold-primary);
  border-radius: 12px;
  padding: 14px 18px;
  z-index: 9999;
  box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 220px;
  animation: toastSlideIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
  backdrop-filter: blur(10px);
}

.achievement-toast.hiding {
  animation: toastSlideOut 0.4s ease-in forwards;
}

.achievement-toast .toast-icon {
  font-size: 1.6rem;
  flex-shrink: 0;
}

.achievement-toast .toast-body {
  display: flex;
  flex-direction: column;
}

.achievement-toast .toast-label {
  font-size: 0.72rem;
  color: var(--gold-primary);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.achievement-toast .toast-title {
  font-size: 0.95rem;
  color: var(--text-light);
  font-weight: 600;
  margin-top: 2px;
}

/* 스토리 씬 레이어 구조 */
.story-layer-container {
  position: relative;
  width: 100%;
  min-height: 320px;
}

.story-bg-layer {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  overflow: hidden;
  z-index: 0;
  transition: background 1s ease;
}

.story-fog-layer {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  z-index: 1;
  pointer-events: none;
  background: radial-gradient(ellipse 80% 60% at 50% 80%,
    var(--fog-color) 0%, transparent 70%);
  animation: fogDrift 12s ease-in-out infinite alternate;
}

.story-rune-layer {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  pointer-events: none;
  opacity: 0.6;
}

.story-rune-layer .rune-svg {
  width: 90%;
  max-width: 340px;
  animation: runeRotate 40s linear infinite;
}

.story-content-layer {
  position: relative;
  z-index: 2;
  padding: 8px;
}

.story-speaker-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  padding: 6px 14px;
  background: rgba(0, 0, 0, 0.5);
  border-radius: 8px;
  border-left: 3px solid var(--gold-primary);
  width: fit-content;
}

.story-speaker-bar .speaker-icon {
  font-size: 1.1rem;
}

#story-speaker-name {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--gold-primary);
  letter-spacing: 1px;
}

/* 마법진 오버레이 */
.magic-circle-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  pointer-events: none;
  border-radius: 12px;
}

.magic-circle-svg {
  width: 80%;
  max-width: 280px;
  animation: magicCircleIn 0.2s ease-out forwards;
}

.puzzle-wrapper {
  position: relative;
}

/* 정답 연출 텍스트 */
.solved-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 25;
  font-family: var(--font-title);
  font-size: 2rem;
  font-weight: 800;
  color: var(--gold-light);
  text-shadow: 0 0 20px var(--gold-primary), 0 0 40px rgba(212, 175, 55, 0.5);
  pointer-events: none;
  white-space: nowrap;
  animation: popIn 0.3s ease-out forwards;
}

.solved-text.floating-away {
  animation: floatUp 0.4s ease-in forwards;
}

/* 빛 번쩍 클래스 */
.flash-white {
  animation: flashWhite 0.3s ease-out forwards;
}

/* 성문 컨테이너 */
.gate-container {
  position: relative;
  width: 180px;
  height: 160px;
  margin: 0 auto 20px;
  overflow: hidden;
}

.gate-svg {
  width: 100%;
  height: 100%;
}

.gate-left, .gate-right {
  transition: none;
}

.gate-left.open {
  animation: gateOpenLeft 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
}

.gate-right.open {
  animation: gateOpenRight 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
}

.gate-glow {
  position: absolute;
  top: 10%;
  left: 10%;
  width: 80%;
  height: 80%;
  background: radial-gradient(ellipse, rgba(255, 220, 80, 0.7) 0%, transparent 70%);
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
}

.gate-glow.open {
  animation: gateGlow 0.6s ease-out 1.1s forwards;
}

/* 컨페티 조각 */
.confetti-piece {
  position: absolute;
  width: 8px;
  height: 8px;
  top: 0;
  pointer-events: none;
  animation: confettiFall var(--duration, 2s) var(--delay, 0s) ease-in forwards;
}

/* 모바일 쿼리 */
@media (max-width: 480px) {
  .card {
    padding: 30px 20px;
  }
  h1 {
    font-size: 2.2rem;
  }
  .sub-title {
    font-size: 1.3rem;
  }
  .story-box {
    padding: 20px;
    min-height: 170px;
  }
  .dialog-text {
    font-size: 1.05rem;
    line-height: 1.7;
  }
  .ranking-table th, .ranking-table td {
    padding: 10px 5px;
    font-size: 0.85rem;
  }
}
</style>

  </head>
  <body>
    <!-- 전역 배경 레이어: 별 3개 + 안개 -->
    <div class="stars-small"></div>
    <div class="stars-medium"></div>
    <div class="stars-large"></div>
    <div class="bg-fog"></div>

    <div id="game-container">
      
      <!-- 1. Intro Scene -->
      <div id="scene-intro" class="scene active">
        <div class="card">
          <!-- 룬 링 SVG -->
          <div class="rune-ring-wrapper">
            <svg class="rune-ring-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <!-- 외부 링 (느린 회전 + 맥동) -->
              <polygon class="outer-ring" points="60,4 114,32 114,88 60,116 6,88 6,32"

<script>
/* ============================================================
   GlowEffects.html
   SVG Ripple 생성 함수
   AnimationManager에서 호출됨
   ============================================================ */
function createSVGRipple(x, y, container) {
  if (!container) return;

  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.style.cssText = [
    "position:absolute",
    "left:" + x + "px",
    "top:" + y + "px",
    "width:0",
    "height:0",
    "overflow:visible",
    "pointer-events:none",
    "z-index:10"
  ].join(";");

  const circle = document.createElementNS(ns, "circle");
  circle.setAttribute("cx", "0");
  circle.setAttribute("cy", "0");
  circle.setAttribute("r", "5");
  circle.setAttribute("fill", "none");
  circle.setAttribute("stroke", "rgba(212,175,55,0.7)");
  circle.setAttribute("stroke-width", "2");

  svg.appendChild(circle);
  container.appendChild(svg);

  let start = null;
  const DURATION = 600; // ms

  function animateRipple(timestamp) {
    if (!start) start = timestamp;
    const progress = Math.min((timestamp - start) / DURATION, 1);
    const r = 5 + progress * 65;
    const opacity = 1 - progress;

    circle.setAttribute("r", r);
    circle.setAttribute("opacity", opacity);
    circle.setAttribute("stroke-width", 2 - progress * 1.5);

    if (progress < 1) {
      requestAnimationFrame(animateRipple);
    } else {
      svg.remove();
    }
  }

  requestAnimationFrame(animateRipple);
}
</script>

    const delay     = (Math.random() * 0.8).toFixed(2);       // 0s~0.8s
    const size      = Math.floor(6 + Math.random() * 7);       // 6px~12px

    el.style.cssText = [
      "left:" + left + "%",
      "--duration:" + duration + "s",
      "--delay:" + delay + "s",
      "width:" + size + "px",
      "height:" + size + "px"
    ].join(";");

    wrapper.appendChild(el);
  }

  container.appendChild(wrapper);

  // 3초 후 컨페티 제거
  setTimeout(function() {
    if (wrapper.parentNode) wrapper.remove();
  }, 3500);
}
</script>

    <script>
/**
 * 전역 이벤트 버스 객체.
 * 컴포넌트 간 직접 결합을 방지하고 상태 변경 이벤트를 비동기식으로 브로드캐스트합니다.
 */
const EventBus = (function() {
  const listeners = {};

  return {
    /**
     * 특정 이벤트에 대해 구독을 신청합니다.
     * @param {String} event - 이벤트명
     * @param {Function} callback - 호출할 콜백 함수
     * @returns {Function} 구독 해제를 수행하는 함수
     */
    subscribe: function(event, callback) {
      if (!listeners[event]) {
        listeners[event] = [];
      }
      listeners[event].push(callback);
      
      return () => this.unsubscribe(event, callback);
    },

    /**
     * 특정 이벤트의 구독을 해제합니다.
     * @param {String} event
     * @param {Function} callback
     */
    unsubscribe: function(event, callback) {
      if (!listeners[event]) return;
      listeners[event] = listeners[event].filter(cb => cb !== callback);
    },

    /**
     * 특정 이벤트를 발행하여 구독 중인 모든 콜백을 실행시킵니다.
     * @param {String} event
     * @param {*} data - 콜백에 주입할 데이터
     */
    publish: function(event, data) {
      if (!listeners[event]) return;
      const callbacks = [...listeners[event]];
      callbacks.forEach(cb => {
        try {
          cb(data);
        } catch (err) {
          console.error(`EventBus publish error for [${event}]:`, err);
        }
      });
    }
  };
})();
</script>

    <script>
/**
 * 씬 전환 및 생명주기 제어를 담당하는 엔진.
 * 개별 Scene 객체들은 SceneManager에 등록되어 생명주기 훅(enter, exit)을 수행합니다.
 */
const SceneManager = (function() {
  let currentScene = null;
  const scenes = {};

  return {
    /**
     * Scene 객체를 등록합니다.
     * @param {String} sceneId - 등록할 씬의 ID (DOM 컨테이너 ID 매핑용)
     * @param {Object} sceneInstance - enter(), exit() 메서드를 구현한 씬 객체
     */
    register: function(sceneId, sceneInstance) {
      scenes[sceneId] = sceneInstance;
    },

    /**
     * 지정된 씬으로 전환하고 생명주기 훅을 실행시킵니다.
     * @param {String} sceneId - 대상 씬 ID
     * @param {*} data - 새 씬 진입 시 전달할 옵션 데이터
     */
    showScene: function(sceneId, data) {
      const nextScene = scenes[sceneId];
      if (!nextScene) {
        console.error(`Scene [${sceneId}]이 등록되지 않았습니다.`);
        return;
      }

      // 1. 기존 씬 정리 (exit)
      if (currentScene) {
        try {
          if (typeof currentScene.exit === "function") {
            currentScene.exit();
          }
        } catch (err) {
          console.error("이전 씬 exit() 실행 실패:", err);
        }
      }

      // 화면 상의 모든 씬 컨테이너를 비활성화 (겹침 방지)
      document.querySelectorAll(".scene").forEach(el => {
        el.classList.remove("active");
      });

      // 2. 상태 갱신 및 이벤트 전파
      if (typeof UiState !== "undefined") {
        UiState.currentSceneId = sceneId;
        if (typeof EventBus !== "undefined") {
          EventBus.publish("stateChange:ui", UiState);
        }
      }

      // 3. 새 씬 표시 (enter)
      currentScene = nextScene;
      const nextDom = document.getElementById(`scene-${sceneId}`);
      if (nextDom) {
        nextDom.classList.add("active");
      } else {
        console.warn(`scene-${sceneId} 아이디를 가진 DOM 컨테이너가 존재하지 않습니다.`);
      }

      try {
        if (typeof currentScene.enter === "function") {
          currentScene.enter(data);
        }
      } catch (err) {
        console.error("새로운 씬 enter() 실행 실패:", err);
      }
    }
  };
})();
</script>

    <script>
/**
 * 대사(스토리) 진행 및 타이핑 이펙트를 담당하는 매니저.
 */
const StoryManager = (function() {
  let dialogueQueue = [];
  let onComplete = null;
  let isTyping = false;
  let typingTimer = null;
  let currentFullText = "";
  let currentEl = null;

  return {
    /**
     * 특정 스테이지의 스토리를 시작합니다.
     * @param {Number} stageId
     * @param {Function} onCompleteCallback - 모든 대사 소진 시 실행할 콜백
     */
    startStory: function(stageId, onCompleteCallback) {
      if (typeof StoryDictionary === "undefined" || !StoryDictionary[stageId]) {
        console.error(`스테이지 ${stageId}의 스토리 데이터가 존재하지 않습니다.`);
        if (onCompleteCallback) onCompleteCallback();
        return;
      }
      
      dialogueQueue = [...StoryDictionary[stageId]];
      onComplete = onCompleteCallback;
      
      this.next();
    },

    /**
     * 다음 대사로 넘어가거나, 타이핑 도중이면 전체 텍스트를 즉시 노출합니다.
     */
    next: function() {
      currentEl = document.getElementById("story-dialog-text");
      if (!currentEl) return;

      // 1. 타이핑 중 클릭 시 타이핑 중단하고 전체 텍스트 일괄 노출
      if (isTyping) {
        clearTimeout(typingTimer);
        isTyping = false;
        currentEl.innerText = currentFullText;
        return;
      }

      // 2. 대사가 남아있지 않은 경우 완료 함수 트리거
      if (dialogueQueue.length === 0) {
        if (typeof onComplete === "function") {
          onComplete();
        }
        return;
      }

      // 3. 다음 대사를 꺼내 타이핑 효과 적용
      currentFullText = dialogueQueue.shift();
      this.typeText(currentFullText, currentEl);
    },

    /**
     * 문자열을 타이핑 효과와 함께 화면에 출력합니다.
     * @param {String} text
     * @param {HTMLElement} element
     */
    typeText: function(text, element) {
      isTyping = true;
      element.innerText = "";
      let index = 0;
      const speed = 35; // 한 글자당 대기 시간 (ms)

      // 타이핑 시작 시 앱니메이션 훅
      if (typeof AnimationManager !== "undefined") {
        AnimationManager.playTypingStart();
      }

      function type() {
        if (!isTyping) return; // 타이핑 도중 정지(전체 텍스트 출력) 처리되면 루프 즉시 종료
        if (index < text.length) {
          element.innerText += text.charAt(index);
          index++;
          typingTimer = setTimeout(type, speed);
        } else {
          isTyping = false;
          // 타이핑 완료 시 애니메이션 종료
          if (typeof AnimationManager !== "undefined") {
            AnimationManager.playTypingEnd();
          }
        }
      }
      
      type();
    }
  };
})();
</script>

/* ============================================================

   ============================================================ */
const AchievementManager = (function() {
  "use strict";

  /* 업적 정의 */
  const ACHIEVEMENTS = [
    {
      id: "first_clear",
      icon: "🏅",
      title: "첫 탈출",
      desc: "처음으로 성을 탈출했습니다.",
      check: function(state) {
        return state.game && state.game.cleared === true;
      }
    },
    {
      id: "no_wrong",
      icon: "🎯",
      title: "무오답 도전",
      desc: "한 번도 틀리지 않고 탈출했습니다.",
      check: function(state) {
        return state.puzzle && state.puzzle.wrongCount === 0 && state.game && state.game.cleared;
      }
    },
    {
      id: "no_hint",
      icon: "💡",
      title: "힌트 거부",
      desc: "힌트 없이 탈출했습니다.",
      check: function(state) {
        return state.puzzle && state.puzzle.hintCount === 0 && state.game && state.game.cleared;
      }
    },
    {
      id: "speed_run",
      icon: "⚡",
      title: "번개 탈출",
      desc: "5분 이내에 탈출했습니다.",
      check: function(state) {
        if (!state.game || !state.game.cleared) return false;
        if (!state.game.startTime || !state.game.endTime) return false;
        const elapsed = (new Date(state.game.endTime) - new Date(state.game.startTime)) / 1000;
        return elapsed <= 300; // 5분 = 300초
      }
    },
    {
      id: "perfect",
      icon: "🔥",
      title: "완벽한 탈출",
      desc: "오답도, 힌트도 없이 탈출했습니다.",
      check: function(state) {
        return state.puzzle &&
               state.puzzle.wrongCount === 0 &&
               state.puzzle.hintCount === 0 &&
               state.game && state.game.cleared;
      }
    }
  ];

  /* 이미 보여준 업적 ID 추적 (중복 방지) */
  const _shown = {};

  /* 현재 상태 스냅샷 수집 */
  function _collectState() {
    return {
      game:   (typeof GameState   !== "undefined") ? GameState   : null,
      puzzle: (typeof PuzzleState !== "undefined") ? PuzzleState : null
    };
  }

  /* 업적 확인 및 표시 */
  function _evaluate() {
    const state = _collectState();
    ACHIEVEMENTS.forEach(function(ach) {
      if (_shown[ach.id]) return;
      try {
        if (ach.check(state)) {
          _shown[ach.id] = true;
          if (typeof AnimationManager !== "undefined") {
            AnimationManager.playAchievement(ach.icon, ach.title);
          }
        }
      } catch (e) {
        /* 안전하게 무시 */
      }
    });
  }

  return {
    init: function() {
      /* EventBus 구독 — 상태 변경마다 업적 평가 */
      if (typeof EventBus !== "undefined") {
        EventBus.subscribe("stateChange:game",   _evaluate);
        EventBus.subscribe("stateChange:puzzle", _evaluate);
      }
      console.log("[AchievementManager] 초기화 완료. 업적:", ACHIEVEMENTS.length + "개");
    },

    /* 외부 강제 평가 (테스트용) */
    evaluate: function() {
      _evaluate();
    }
  };
})();

/* 자동 초기화 */
(function() {
  function tryInit() {
    if (typeof EventBus !== "undefined" && typeof AnimationManager !== "undefined") {
      AchievementManager.init();
    } else {
      setTimeout(tryInit, 100);
    }
  }
  tryInit();
})();
</script>

    <script>
/**
 * GAS 서버 API 호출을 대행하는 범용 비동기 클라이언트 유틸리티.
 * google.script.run 환경이 없는 로컬 오프라인 브라우저에서의 테스트를 지원하기 위해
 * 자동으로 환경을 감지하고 모의(Mock) 응답을 반환하는 가상 런타임을 포함합니다.
 */
const DbService = {
  /**
   * 백엔드 Code.js의 서버 사이드 함수를 호출합니다.
   * @param {String} functionName - 호출할 서버 함수명 (예: 'saveGameResult')
   * @param {Array} args - 전달할 인수 배열 (예: [payload])
   * @param {Function} onSuccess - 성공 수신 콜백
   * @param {Function} onFailure - 실패 수신 콜백
   */
  call: function(functionName, args, onSuccess, onFailure) {
    // 1. 실제 GAS 서빙 환경인 경우
    if (typeof google !== "undefined" && google.script && google.script.run) {
      let runner = google.script.run;
      if (onSuccess) {
        runner = runner.withSuccessHandler(onSuccess);
      }
      if (onFailure) {
        runner = runner.withFailureHandler(onFailure);
      }
      
      // 동적 함수 호출 바인딩
      if (typeof runner[functionName] === "function") {
        runner[functionName].apply(runner, args);
      } else {
        console.error(`[DbService] 서버 함수 [${functionName}]를 호출할 수 없습니다.`);
        if (onFailure) onFailure(new Error(`함수 ${functionName} 존재 안 함`));
      }
    } 
    // 2. 로컬 브라우저 개발/디버그 환경인 경우 (Mock)
    else {
      console.warn(`[DbService] 로컬 모의 환경에서 [${functionName}]을 처리합니다.`);
      setTimeout(() => {
        try {
          if (functionName === "saveGameResult") {
            if (onSuccess) onSuccess({ success: true, message: "[로컬 환경] 데이터 저장 성공" });
          } else if (functionName === "getLeaderboard") {
            if (onSuccess) onSuccess([
              { rank: 1, name: "아더", studentNo: "10203", score: 100, playTime: 120 },
              { rank: 2, name: "멀린", studentNo: "10105", score: 95, playTime: 145 },
              { rank: 3, name: "랜슬롯", studentNo: "10311", score: 90, playTime: 160 }
            ]);
          } else {
            if (onSuccess) onSuccess();
          }
        } catch (e) {
          if (onFailure) onFailure(e);
        }
      }, 600);
    }
  }
};
</script>

    <script>
/**
 * 게임 결과 영속성 데이터 저장소.
 * 클라이언트와 GAS 백엔드 DB 연동 레이어 간의 데이터 전송을 담당하며,
 * 동시성 락 충돌 및 네트워크 유실에 대비한 지수 백오프 재시도 및 로컬 임시 백업 보관 정책을 지원합니다.
 */
const ResultRepository = {
  /**
   * 게임 플레이 최종 기록을 서버에 전송하여 안전하게 저장합니다.
   * @param {Object} payload - 결과 기록 정보 DTO
   * @param {Function} onSuccess - 성공 콜백
   * @param {Function} onFailure - 최종 실패 콜백
   * @param {Number} retryCount - 내부 재시도 인덱스
   */
  saveResult: function(payload, onSuccess, onFailure, retryCount = 1) {
    if (!payload || !payload.studentNo || !payload.name) {
      if (onFailure) {
        onFailure(new Error("학번과 이름이 누락된 데이터는 저장할 수 없습니다."));
      }
      return;
    }

    payload.gameVersion = payload.gameVersion || "1.0.0";
    payload.submitTime = payload.submitTime || new Date().toISOString();

    const maxRetries = 3;
    const retryDelay = 2000; // 재시도 대기 간격 (2초)

    DbService.call(
      "saveGameResult",
      [payload],
      function(response) {
        if (response && response.success) {
          // 최종 성공 시 백업 보관했던 결과가 있다면 클리어
          localStorage.removeItem("saved_game_result_backup");
          if (onSuccess) onSuccess(response);
        } else {
          // 서버 측 락 획득 타임아웃 등으로 처리가 밀린 경우 재시도 작동
          if (retryCount <= maxRetries) {
            console.warn(`[ResultRepository] 락 타임아웃 감지. ${retryDelay}ms 후 재시도 (${retryCount}/${maxRetries})`);
            setTimeout(() => {
              ResultRepository.saveResult(payload, onSuccess, onFailure, retryCount + 1);
            }, retryDelay);
          } else {
            // 로컬 스토리지에 결과 복구용 임시 보존
            localStorage.setItem("saved_game_result_backup", JSON.stringify(payload));
            if (onFailure) {
              onFailure(new Error(response.message || "서버 혼잡으로 기록 저장에 실패하여 로컬 브라우저에 결과를 보관했습니다."));
            }
          }
        }
      },
      function(err) {
        // 네트워크 연결 에러 등 RPC 실패 시 재시도 작동
        if (retryCount <= maxRetries) {
          console.warn(`[ResultRepository] 네트워크 장애 감지. ${retryDelay}ms 후 재시도 (${retryCount}/${maxRetries})`);
          setTimeout(() => {
            ResultRepository.saveResult(payload, onSuccess, onFailure, retryCount + 1);
          }, retryDelay);
        } else {
          // 로컬 스토리지 백업 처리
          localStorage.setItem("saved_game_result_backup", JSON.stringify(payload));
          if (onFailure) {
            onFailure(new Error("서버와의 통신 오류로 전송하지 못했습니다. 결과 기록은 브라우저에 임시 백업되었습니다."));
          }
        }
      }
    );
  },

  /**
   * 서버로부터 원본 랭킹 목록을 조회합니다.
   * @param {Function} onSuccess
   * @param {Function} onFailure
   */
  getRawLeaderboard: function(onSuccess, onFailure) {
    DbService.call(
      "getLeaderboard",
      [],
      function(response) {
        if (onSuccess) onSuccess(response);
      },
      function(err) {
        if (onFailure) onFailure(err);
      }
    );
  }
};
</script>

    <script>
/**
 * 랭킹 및 리더보드 데이터 가공 비즈니스 서비스.
 * 서버로부터 수신된 원본 데이터를 정렬 조건에 맞추어 정제합니다.
 */
const RankingService = {
  /**
   * 정렬 가이드라인을 적용하여 상위 랭킹 리스트를 획득합니다.
   * 정렬 조건 우선순위:
   * 1. 점수(Score) 내림차순 (높은 순)
   * 2. 소요시간(PlayTime) 오름차순 (빠른 순)
   * 3. 제출시간(SubmitTime) 오름차순 (먼저 완료한 순)
   * @param {Function} onSuccess
   * @param {Function} onFailure
   */
  getLeaderboard: function(onSuccess, onFailure) {
    ResultRepository.getRawLeaderboard(
      function(rawList) {
        if (!rawList || !Array.isArray(rawList)) {
          if (onSuccess) onSuccess([]);
          return;
        }

        // 다중 정렬 규칙 가공 적용
        const sortedList = [...rawList].sort((a, b) => {
          // 1순위: 점수 비교
          if (b.score !== a.score) {
            return b.score - a.score;
          }
          // 2순위: 소요 시간 비교
          if (a.playTime !== b.playTime) {
            return a.playTime - b.playTime;
          }
          // 3순위: 제출 타임스탬프 비교
          const timeA = a.submitTime ? new Date(a.submitTime).getTime() : 0;
          const timeB = b.submitTime ? new Date(b.submitTime).getTime() : 0;
          return timeA - timeB;
        });

        // 상위 10개 레코드 추출 제한
        const topTen = sortedList.slice(0, 10).map((item, idx) => ({
          rank: idx + 1,
          studentNo: item.studentNo,
          name: item.name,
          score: item.score,
          playTime: item.playTime
        }));

        if (onSuccess) onSuccess(topTen);
      },
      function(err) {
        if (onFailure) onFailure(err);
      }
    );
  }
};
</script>

          </svg>
        </div>

          <input type="range" id="stage1-slider" min="30" max="150" value="90" style="width: 80%; accent-color: #d4af37;">

        // EventBus를 통해 클리어 알림 발행
        setTimeout(() => {

          <!-- 드롭존 A (동위각 자리) -->
          <div id="drop-zone-A" class="dropzone" style="position: absolute; top: 95px; left: 100px; width: 40px; height: 24px; border: 2px dashed #d4af37; border-radius: 4px; font-size: 0.8rem; text-align: center; line-height: 20px; color: #a5a5a5; background: rgba(0,0,0,0.4); cursor: pointer;">A</div>
          <div style="position: absolute; top: 76px; left: 104px; font-size: 0.65rem; color: #d4af37; font-weight:bold;">동위각</div>
          
          <!-- 드롭존 B (엇각 자리) -->
          <div id="drop-zone-B" class="dropzone" style="position: absolute; top: 95px; left: 160px; width: 40px; height: 24px; border: 2px dashed #d4af37; border-radius: 4px; font-size: 0.8rem; text-align: center; line-height: 20px; color: #a5a5a5; background: rgba(0,0,0,0.4); cursor: pointer;">B</div>
          <div style="position: absolute; top: 76px; left: 166px; font-size: 0.65rem; color: #d4af37; font-weight:bold;">엇각</div>
        </div>
        
        <!-- 선택 카드들 -->
        <div style="margin-top: 15px; display: flex; justify-content: center; gap: 15px;">
          <div class="drag-card" data-value="60" style="width: 55px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">60°</div>
          <div class="drag-card" data-value="120" style="width: 55px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">120°</div>
        </div>
      </div>
    `;
    this.cards = this.container.querySelectorAll(".drag-card");
    this.zones = this.container.querySelectorAll(".dropzone");
    this.selectedCard = null;
  }

  bindEvents() {
    this.cardClickHandler = (e) => {
      // 모든 카드의 선택 스타일 제거
      this.cards.forEach(c => {
        c.style.borderColor = "#d4af37";
        c.style.background = "#1b263b";
        c.style.boxShadow = "0 4px 6px rgba(0,0,0,0.3)";
      });
      // 선택된 카드 지정 및 스타일 부여
      this.selectedCard = e.currentTarget;
      this.selectedCard.style.borderColor = "#ff4757";
      this.selectedCard.style.background = "rgba(255, 71, 87, 0.2)";
      this.selectedCard.style.boxShadow = "0 0 10px rgba(255, 71, 87, 0.6)";
    };

    this.zoneClickHandler = (e) => {
      if (!this.selectedCard) {
        alert("먼저 아래 각도 카드 중 하나를 선택한 뒤 빈칸을 클릭해 주세요.");
        return;
      }
      
      const zoneId = e.currentTarget.id;
      const val = this.selectedCard.getAttribute("data-value");

      e.currentTarget.innerText = val + "°";
      e.currentTarget.style.background = "rgba(212,175,55,0.2)";
      e.currentTarget.style.borderColor = "#d4af37";
      e.currentTarget.style.color = "#fff";
      e.currentTarget.style.borderStyle = "solid";
      
      if (val === "60") {
        if (zoneId === "drop-zone-A") this.solved.zoneA = true;
        if (zoneId === "drop-zone-B") this.solved.zoneB = true;
      } else {
        if (zoneId === "drop-zone-A") this.solved.zoneA = false;
        if (zoneId === "drop-zone-B") this.solved.zoneB = false;
        
        // 오답 카운트 기록
        if (typeof PuzzleState !== "undefined") {
          PuzzleState.wrongCount += 1;
          EventBus.publish("stateChange:puzzle", PuzzleState);
        }
        alert("정답이 아닙니다. 동위각과 엇각은 평행선 조건에서 기준각과 크기가 같습니다.");
      }

      if (this.checkAnswer()) {
        setTimeout(() => {
          alert("정답입니다! 동위각과 엇각의 크기가 같음이 입증되어 회랑의 철창이 올라갔습니다.");
          if (this.onClearCallback) {
            this.onClearCallback();
          } else {
            const clearBtn = document.getElementById("mock-puzzle-clear-btn");
            if (clearBtn) clearBtn.click();
          }
        }, 300);
      }
    };

    this.cards.forEach(card => {
      card.addEventListener("click", this.cardClickHandler);
    });

    this.zones.forEach(zone => {
      zone.addEventListener("click", this.zoneClickHandler);
    });
  }

  checkAnswer() {
    return this.solved.zoneA && this.solved.zoneB;
  }

  reset() {
    this.solved = { zoneA: false, zoneB: false };
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.cards) {
      this.cards.forEach(card => {
        card.removeEventListener("click", this.cardClickHandler);
      });
    }
    if (this.zones) {
      this.zones.forEach(zone => {
        zone.removeEventListener("click", this.zoneClickHandler);
      });
    }
    this.container.innerHTML = "";
  }
}

// 퍼즐 등록
PuzzleManager.register(2, Stage2Puzzle);
</script>

          <div class="drag-card" data-value="60" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">60°</div>
          <div class="drag-card" data-value="70" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">70°</div>
          <div class="drag-card" data-value="90" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid #d4af37; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">90°</div>
        </div>
      </div>
    `;
    this.cards = this.container.querySelectorAll(".drag-card");
    this.zones = this.container.querySelectorAll(".dropzone");
    this.formula = document.getElementById("sum-formula");
    this.selectedCard = null;
  }

  bindEvents() {
    this.cardClickHandler = (e) => {
      // 모든 카드의 선택 스타일 제거
      this.cards.forEach(c => {
        c.style.borderColor = "#d4af37";
        c.style.background = "#1b263b";
        c.style.boxShadow = "0 4px 6px rgba(0,0,0,0.3)";
      });
      // 선택 카드 지정 및 스타일 적용
      this.selectedCard = e.currentTarget;
      this.selectedCard.style.borderColor = "#ff4757";
      this.selectedCard.style.background = "rgba(255, 71, 87, 0.2)";
      this.selectedCard.style.boxShadow = "0 0 10px rgba(255, 71, 87, 0.6)";
    };

    this.zoneClickHandler = (e) => {
      if (!this.selectedCard) {
        alert("먼저 아래 각도 카드 중 하나를 선택한 뒤 빈칸을 클릭해 주세요.");
        return;
      }

      const zoneId = e.currentTarget.id;
      const val = parseInt(this.selectedCard.getAttribute("data-value"));

      e.currentTarget.innerText = val + "°";
      e.currentTarget.style.background = "rgba(212,175,55,0.2)";
      e.currentTarget.style.borderColor = "#d4af37";
      e.currentTarget.style.color = "#fff";
      e.currentTarget.style.borderStyle = "solid";

      if (zoneId === "drop-zone-B") this.solved.zoneB = val;
      if (zoneId === "drop-zone-C") this.solved.zoneC = val;

      this.render();

      if (this.checkAnswer()) {
        setTimeout(() => {
          alert(`축하합니다! 50° + ${this.solved.zoneB}° + ${this.solved.zoneC}° = 180°가 완성되어 제단의 봉인이 풀렸습니다.`);
          if (this.onClearCallback) {
            this.onClearCallback();
          } else {
            const clearBtn = document.getElementById("mock-puzzle-clear-btn");
            if (clearBtn) clearBtn.click();
          }
        }, 300);
      } else {
        // 둘 다 값이 차있는데 틀린 경우 오답 카운팅 및 안내
        if (this.solved.zoneB && this.solved.zoneC) {
          if (typeof PuzzleState !== "undefined") {
            PuzzleState.wrongCount += 1;
            EventBus.publish("stateChange:puzzle", PuzzleState);
          }
          alert("세 내각의 크기의 합이 180°가 되지 않습니다. 다시 구성해 보세요.");
        }
      }
    };

    this.cards.forEach(card => {
      card.addEventListener("click", this.cardClickHandler);
    });

    this.zones.forEach(zone => {
      zone.addEventListener("click", this.zoneClickHandler);
    });
  }

  render() {
    if (this.formula) {
      const bStr = this.solved.zoneB ? `${this.solved.zoneB}°` : "B";
      const cStr = this.solved.zoneC ? `${this.solved.zoneC}°` : "C";
      const total = this.fixedAngle + (this.solved.zoneB || 0) + (this.solved.zoneC || 0);
      this.formula.innerHTML = `식: 50° + ${bStr} + ${cStr} = <strong style="color: ${total === 180 ? '#2ecc71' : '#ff4757'}">${total}°</strong>`;
    }
  }

  checkAnswer() {
    if (!this.solved.zoneB || !this.solved.zoneC) return false;
    return (this.fixedAngle + this.solved.zoneB + this.solved.zoneC) === 180;
  }

  reset() {
    this.solved = { zoneB: null, zoneC: null };
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.cards) {
      this.cards.forEach(card => {
        card.removeEventListener("click", this.cardClickHandler);
      });
    }
    if (this.zones) {
      this.zones.forEach(zone => {
        zone.removeEventListener("click", this.zoneClickHandler);
      });
    }
    this.container.innerHTML = "";
  }
}

// 퍼즐 등록
PuzzleManager.register(4, Stage4Puzzle);
</script>

    <script>
/**
 * 퍼즐 풀이 화면 씬 객체.
 */
const PuzzleScene = {
  enter: function(data) {
    const stageId = data ? data.stageId : 1;
    console.log(`[PuzzleScene] 진입 - 스테이지 ${stageId}`);
    
    const stageTitleEl = document.getElementById("puzzle-stage-title");
    if (stageTitleEl) {
      stageTitleEl.innerText = `스테이지 ${stageId} - 방 탈출 퍼즐`;
    }
    
    // 1. PuzzleManager를 통해 퍼즐 인스턴스 기동 및 클리어 핸들러 연결
    const currentPuzzle = PuzzleManager.loadPuzzle(stageId, "puzzle-board-container");
    if (currentPuzzle) {
      currentPuzzle.onClearCallback = () => {
        // 정답 연출
        const puzzleArea = document.getElementById("puzzle-board-container");
        if (typeof AnimationManager !== "undefined" && puzzleArea) {
          AnimationManager.playSolved(puzzleArea);
        }
        
        // 정답 수 갱신
        PuzzleState.correctCount = stageId;
        EventBus.publish("stateChange:puzzle", PuzzleState);
        
        const DELAY_AFTER_SOLVE = 1300; // ms - 클리어 연출 후 다음 샴으로 이동
        setTimeout(function() {
          if (stageId < 5) {
            // 다음 스테이지 이동
            GameState.currentStage = stageId + 1;
            EventBus.publish("stateChange:game", GameState);
            
            if (typeof StateStore !== "undefined") {
              StateStore.saveToLocalStorage();
            }
            
            SceneManager.showScene("story", { stageId: GameState.currentStage });
          } else {
            // 보스 퍼즐 클리어 -> 엔딩으로
            GameState.endTime = new Date().toISOString();
            GameState.cleared = true;
            EventBus.publish("stateChange:game", GameState);
            
            if (typeof StateStore !== "undefined") {
              StateStore.saveToLocalStorage();
            }
            
            SceneManager.showScene("ending");
          }
        }, DELAY_AFTER_SOLVE);
      };
      
      // SVG Ripple: 퍼즐 캔버스 클릭 시
      const puzzleBoard = document.getElementById("puzzle-board-container");
      if (puzzleBoard) {
        this.rippleHandler = (e) => {
          if (typeof AnimationManager !== "undefined") {
            const rect = puzzleBoard.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0) - rect.top;
            AnimationManager.playRipple(x, y, puzzleBoard);
          }
        };
        puzzleBoard.addEventListener("click",      this.rippleHandler);
        puzzleBoard.addEventListener("touchstart", this.rippleHandler, { passive: true });
      }
    }
    
    // 2. 힌트 버튼 리스너 바인딩
    const hintBtn = document.getElementById("puzzle-hint-btn");
    if (hintBtn) {
      this.hintHandler = () => {
        PuzzleState.hintCount += 1;
        EventBus.publish("stateChange:puzzle", PuzzleState);
        
        let hintMsg = "도형의 정의를 찬찬히 살펴보세요.";
        if (stageId === 1) hintMsg = "맞꼭지각은 두 직선이 만날 때 생기는 서로 마주 보는 두 각이며, 크기가 항상 동일합니다.";
        if (stageId === 2) hintMsg = "두 선이 평행할 때, 횡단선과의 위치가 동일한 동위각과 서로 지그재그 관계인 엇각의 크기는 같습니다.";
        if (stageId === 3) hintMsg = "꺾인 점을 가로지르는 제3의 평행 가상 보조선을 그리면 위아래 엇각 관계(45도와 30도)로 쪼개져 합이 75도가 됩니다.";
        if (stageId === 4) hintMsg = "삼각형 내부의 세 내각의 총합은 언제나 180도입니다. 고정 50도를 제외한 나머지 두 칸의 각도 카드의 합이 130도가 되도록 배치해 보세요.";
        if (stageId === 5) hintMsg = "평행선 사이의 엇각(45도)을 유추하여 삼각형 내부의 내각(45도)을 얻고, 삼각형의 한 외각은 이웃하지 않는 두 내각의 합과 같으므로 x = 45 + 60 입니다.";
        
        alert(`[마도사의 힌트]\n${hintMsg} (누적 사용: ${PuzzleState.hintCount}회)`);
      };
      hintBtn.addEventListener("click", this.hintHandler);
    }
  },
  
  exit: function() {
    console.log("[PuzzleScene] 이탈");
    
    // 퍼즐 인스턴스 메모리 자원 회수
    PuzzleManager.clearActivePuzzle();
    
    const hintBtn = document.getElementById("puzzle-hint-btn");
    if (hintBtn && this.hintHandler) {
      hintBtn.removeEventListener("click", this.hintHandler);
    }
    
    // Ripple 리스너 제거
    const puzzleBoard = document.getElementById("puzzle-board-container");
    if (puzzleBoard && this.rippleHandler) {
      puzzleBoard.removeEventListener("click",      this.rippleHandler);
      puzzleBoard.removeEventListener("touchstart", this.rippleHandler);
    }
  }
};

// 씬 등록
SceneManager.register("puzzle", PuzzleScene);
</script>

const EndingScene = {
  enter: function(data) {
    console.log("[EndingScene] 진입");
    
    // 소요시간 및 최종 점수 연산
    const playTimeSec = Math.round((new Date(GameState.endTime) - new Date(GameState.startTime)) / 1000);
    const score = Math.max(0, 100 - (PuzzleState.wrongCount * 5));
    PuzzleState.score = score;
    EventBus.publish("stateChange:puzzle", PuzzleState);

    if (typeof AnimationManager !== "undefined") {
      AnimationManager.playGateOpen(score);
    }
    
    // 점수 레코드 바인딩
    const recordEl = document.getElementById("ending-record");
    if (recordEl) {
      recordEl.innerText = `소요 시간: ${playTimeSec}초 | 오답 횟수: ${PuzzleState.wrongCount}회 | 최종 점수: ${score}점`;
    }
    
    const submitBtn = document.getElementById("ending-submit-btn");
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.innerText = "기록 및 랭킹 등록";
      
      this.submitHandler = () => {
        submitBtn.disabled = true;
        submitBtn.innerText = "제출 중...";
        
        const payload = {
          studentNo: UserState.studentNo,
          name: UserState.name,
          startTime: GameState.startTime,
          endTime: GameState.endTime,
          playTime: playTimeSec,
          score: PuzzleState.score,
          correctCount: PuzzleState.correctCount,
          wrongCount: PuzzleState.wrongCount,
          hintCount: PuzzleState.hintCount,
          cleared: GameState.cleared,
          gameVersion: GameState.gameVersion,
          browser: UserState.browser,
          device: UserState.device,
          stageReached: GameState.currentStage
        };
        
        // ResultRepository 저장 호출
        ResultRepository.saveResult(
          payload,
          function(response) {
            alert(response.message || "성공적으로 저장되었습니다.");
            if (typeof StateStore !== "undefined") {
              StateStore.clearStorage();
            }
            SceneManager.showScene("ranking");
          },
          function(err) {
            alert("저장 실패: " + err.message + "\n인터넷 연결 상태를 확인 후 다시 시도해 주세요.");
            submitBtn.disabled = false;
            submitBtn.innerText = "다시 기록 제출하기";
          }
        );
      };
      submitBtn.addEventListener("click", this.submitHandler);
    }
  },
  
  exit: function() {
    console.log("[EndingScene] 이탈");
    const submitBtn = document.getElementById("ending-submit-btn");
    if (submitBtn && this.submitHandler) {
      submitBtn.removeEventListener("click", this.submitHandler);
    }
  }
};

// 씬 등록
SceneManager.register("ending", EndingScene);
</script>

    <script>
/**
 * 랭킹/순위표 화면 씬 객체.
 */
const RankingScene = {
  enter: function(data) {
    console.log("[RankingScene] 진입");
    
    const tbody = document.getElementById("ranking-list-body");
    if (tbody) {
      tbody.innerHTML = `<tr><td colspan="5">순위 데이터를 불러오는 중...</td></tr>`;
    }
    
    // RankingService를 통해 가공된 정렬 데이터를 수신받아 출력
    RankingService.getLeaderboard(
      function(topList) {
        RankingScene.renderList(topList);
      },
      function(err) {
        if (tbody) {
          tbody.innerHTML = `<tr><td colspan="5" style="color:#ff4757; font-weight:bold;">랭킹 데이터를 로드하지 못했습니다.</td></tr>`;
        }
      }
    );
    
    // 처음부터 다시 하기 버튼 바인딩
    const restartBtn = document.getElementById("ranking-restart-btn");
    if (restartBtn) {
      this.restartHandler = () => {
        // 모든 상태 롤백 초기화
        UserState.studentNo = "";
        UserState.name = "";
        EventBus.publish("stateChange:user", UserState);
        
        GameState.startTime = null;
        GameState.endTime = null;
        GameState.cleared = false;
        GameState.currentStage = 1;
        EventBus.publish("stateChange:game", GameState);
        
        PuzzleState.correctCount = 0;
        PuzzleState.wrongCount = 0;
        PuzzleState.hintCount = 0;
        PuzzleState.score = 0;
        EventBus.publish("stateChange:puzzle", PuzzleState);
        
        if (typeof StateStore !== "undefined") {
          StateStore.clearStorage();
        }
        
        SceneManager.showScene("intro");
      };
      restartBtn.addEventListener("click", this.restartHandler);
    }
  },
  
  /**
   * 상위 랭킹 리스트 테이블을 동적으로 그립니다.
   */
  renderList: function(list) {
    const tbody = document.getElementById("ranking-list-body");
    if (!tbody) return;
    
    if (!list || list.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5">기록된 순위가 없습니다. 첫 랭커가 되어보세요!</td></tr>`;
      return;
    }
    
    tbody.innerHTML = list.map((item) => `
      <tr>
        <td style="color:#d4af37; font-weight:bold;">${item.rank}위</td>
        <td>${item.studentNo}</td>
        <td>${item.name}</td>
        <td style="color:#d4af37; font-weight:bold;">${item.score}점</td>
        <td>${item.playTime}초</td>
      </tr>
    `).join("");
  },
  
  exit: function() {
    console.log("[RankingScene] 이탈");
    const restartBtn = document.getElementById("ranking-restart-btn");
    if (restartBtn && this.restartHandler) {
      restartBtn.removeEventListener("click", this.restartHandler);
    }
  }
};

// 씬 등록
SceneManager.register("ranking", RankingScene);
</script>

    
    <!-- Client Core App Initialize -->
    <script>
/**
 * 클라이언트 메인 애플리케이션 라이프사이클 엔트리 포인트.
 */
document.addEventListener("DOMContentLoaded", function() {
  console.log("Geometry Escape 클라이언트 코어 초기화 시작.");

  // 1. 전역 상태 변화 디버깅 구독
  if (typeof EventBus !== "undefined") {
    EventBus.subscribe("stateChange:user", function(user) {
      console.log("[State Update] UserState:", user);
    });
    EventBus.subscribe("stateChange:game", function(game) {
      console.log("[State Update] GameState:", game);
    });
    EventBus.subscribe("stateChange:puzzle", function(puzzle) {
      console.log("[State Update] PuzzleState:", puzzle);
    });
    EventBus.subscribe("stateChange:ui", function(ui) {
      console.log("[State Update] UiState:", ui);
    });
  }

  // 2. 새로고침 상태 복구 시도
  let restored = false;
  if (typeof StateStore !== "undefined") {
    restored = StateStore.loadFromLocalStorage();
  }

  // 3. 최초 라우팅 제어
  if (restored && GameState.startTime && !GameState.cleared) {
    console.log(`이전 세션이 존재하여 스테이지 ${GameState.currentStage}로 복구합니다.`);
    SceneManager.showScene("puzzle", { stageId: GameState.currentStage });
  } else {
    SceneManager.showScene("intro");
  }

  // 4. 비정상 이탈 방지 경고 리스너
  window.addEventListener("beforeunload", function(e) {
    if (GameState.startTime && !GameState.cleared) {
      const msg = "진행 중인 탈출 기록이 사라집니다. 정말 페이지를 나가시겠습니까?";
      (e || window.event).returnValue = msg;
      return msg;
    }
  });
});
</script>
