        this.renderSub1();
      } else {
        // 두 번째 꼭짓점 선택
        const startV = this.selectedVertex;
        const endV = v;
        
        if (startV.id === endV.id) {
          // 동일한 꼭짓점
          this.selectedVertex = null;
          this.renderSub1();
          return;
        }
        
        // 인접 여부 검사 (육각형 환형 정렬: A-B-C-D-E-F-A)
        const idxA = this.vertices.findIndex(item => item.id === startV.id);
        const idxB = this.vertices.findIndex(item => item.id === endV.id);
        const diff = Math.abs(idxA - idxB);
        const isAdjacent = (diff === 1) || (diff === 5); // 환형이므로 차이가 1 또는 5이면 변(인접)
        
        if (isAdjacent) {
          if (typeof FeedbackSystem !== "undefined") {
            FeedbackSystem.showWarning("인접한 두 꼭짓점을 잇는 선은 대각선이 아니라 다각형의 '변'입니다!");
          }
          this.selectedVertex = null;
          this.renderSub1();
          return;
        }
        
        // 대각선 성립: 알파벳 순으로 정렬하여 유니크 키 생성
        const key = [startV.id, endV.id].sort().join("-");
        
        if (this.drawnDiagonals.includes(key)) {
          if (typeof FeedbackSystem !== "undefined") {
            FeedbackSystem.showInfo("이미 그린 대각선입니다.");
          }
        } else {
          this.drawnDiagonals.push(key);
          if (typeof FeedbackSystem !== "undefined") {
            FeedbackSystem.showSuccess(`대각선 하나를 연결했습니다! (${this.drawnDiagonals.length} / 9)`);
          }
        }
        
        this.selectedVertex = null;
        this.renderSub1();
        
        // 정답 검사
        if (this.drawnDiagonals.length === 9) {
          setTimeout(() => {
            if (typeof FeedbackSystem !== "undefined") {
              FeedbackSystem.showSuccess("성공! 육각형의 모든 대각선(9개)을 완벽히 완성하였습니다! 결계 해제! (+5점)");
            }
            if (this.onClearCallback) {
              this.onClearCallback();
            }
          }, 400);
        }
      }
    };
  }

  bindEventsSubstage2() {
    this.sub2InputHandler = (e) => {
      this.userInput = e.target.value;
    };

    this.sub2SubmitHandler = () => {
      const val = parseInt(this.userInput);
      if (val === this.targetAnswer) {
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showSuccess("정답입니다! 8각형 대각선 총 개수는 8 * 5 / 2 = 20개입니다! 성검의 적색 수정이 충전되었습니다! (+5점)");
        }
        if (this.onClearCallback) {
          this.onClearCallback();
        }
      } else {
        if (typeof PuzzleState !== "undefined") {
          PuzzleState.wrongCount += 1;
          EventBus.publish("stateChange:puzzle", PuzzleState);
        }
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showError("오답입니다! n각형의 대각선 공식 n(n-3)/2 에 n=8을 대입해 계산해 보세요.");
        }
      }
    };

    if (this.sub2Input) this.sub2Input.addEventListener("input", this.sub2InputHandler);
    if (this.sub2Submit) this.sub2Submit.addEventListener("click", this.sub2SubmitHandler);
  }

  renderSub1() {
    const linesGroup = document.getElementById("stage4-lines-group");
    const verticesGroup = document.getElementById("stage4-vertices-group");
    const counter = document.getElementById("diagonal-counter");
    
    if (!linesGroup || !verticesGroup) return;
    
    // 1) 그려진 대각선 렌더링
    let linesHtml = "";
    this.drawnDiagonals.forEach(key => {
      const [id1, id2] = key.split("-");
      const v1 = this.vertices.find(item => item.id === id1);
      const v2 = this.vertices.find(item => item.id === id2);
      linesHtml += `<line x1="${v1.x}" y1="${v1.y}" x2="${v2.x}" y2="${v2.y}" stroke="#ff4757" stroke-width="2.5" style="filter: drop-shadow(0 0 2px #ff4757);" />`;
    });
    linesGroup.innerHTML = linesHtml;
    
    // 2) 꼭짓점 렌더링
    let vHtml = "";
    this.vertices.forEach(v => {
      const isSelected = this.selectedVertex && this.selectedVertex.id === v.id;
      const fill = isSelected ? "#ff4757" : "var(--gold-primary)";
      const stroke = isSelected ? "#fff" : "rgba(0,0,0,0.5)";
      const r = isSelected ? 9 : 7;
      const glow = isSelected ? "filter: drop-shadow(0 0 5px #ff4757);" : "";
      
      vHtml += `
        <g class="vertex-btn" data-id="${v.id}" style="cursor: pointer; ${glow}">
          <circle cx="${v.x}" cy="${v.y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="2" />
          <text x="${v.x}" y="${v.y - 12}" fill="#fff" font-size="9" font-weight="bold" text-anchor="middle">${v.label}</text>
        </g>
      `;
    });
    verticesGroup.innerHTML = vHtml;
    
    // 꼭짓점 클릭 리스너 재바인딩
    const vElements = verticesGroup.querySelectorAll(".vertex-btn");
    vElements.forEach(el => {
      el.addEventListener("click", this.vClickHandler);
    });
    
    // 카운터 갱신
    if (counter) {
      counter.textContent = `그린 대각선: ${this.drawnDiagonals.length} / 9 개`;
    }
  }

  checkAnswer() {
    if (this.substage === 1) {
      return this.drawnDiagonals.length === 9;
    } else {
      return parseInt(this.userInput) === this.targetAnswer;
    }
  }

  goNextSubstage() {
    if (this.substage === 1) {
      this.destroy();
      this.substage = 2;
      this.userInput = "";
      
      if (typeof SceneManager !== "undefined") {
        SceneManager.showScene("story", { stageId: "4_mid" });
      } else {
        this.init();
        this.bindEvents();
      }
      return true;
    }
    return false;
  }

  getHint(count) {
    if (this.substage === 1) {
      if (count === 1) return "대각선은 다각형에서 서로 이웃하지 않는 두 꼭짓점을 잇는 선분입니다. A와 바로 옆의 B 또는 F를 연결하면 대각선이 아닙니다.";
      if (count === 2) return "A에서는 C, D, E로 3개, B에서는 D, E, F로 3개, C에서는 E, F로 2개, D에서는 F로 1개를 연결해 총 9개를 연결하면 완성됩니다!";
      return this.getSolution();
    } else {
      if (count === 1) return "n각형에서 대각선을 구할 때 한 꼭짓점에서는 자기 자신과 양옆의 2개 꼭짓점을 뺀 (n - 3)개를 그을 수 있습니다.";
      if (count === 2) return "전체 꼭짓점 수 n개를 곱하고 중복(2로 나눔)을 적용해 n(n-3)/2 공식이 됩니다. 팔각형은 n=8을 대입해 8 * 5 / 2 = 20 개입니다.";
      return this.getSolution();
    }
  }

  getSolution() {
    if (this.substage === 1) {
      return "육각형의 대각선 9종은 A-C, A-D, A-E, B-D, B-E, B-F, C-E, C-F, D-F 입니다. 이 비인접 라인을 모두 이으면 통과됩니다.";
    } else {
      return "다각형의 총 대각선 수 공식 n(n-3)/2 에 n=8을 대입하면 8 * (8 - 3) / 2 = 8 * 5 / 2 = 20개입니다.";
    }
  }

  getConceptText() {
    return "n각형의 한 꼭짓점에서 그을 수 있는 대각선의 수는 (n - 3)개이고, 총 대각선 수는 n(n - 3) / 2 개입니다.";
  }

  reset() {
    this.selectedVertex = null;
    this.drawnDiagonals = [];
    this.userInput = "";
    this.init();
    this.bindEvents();
  }

  destroy() {
    const verticesGroup = document.getElementById("stage4-vertices-group");
    if (verticesGroup) {
      const vElements = verticesGroup.querySelectorAll(".vertex-btn");
      vElements.forEach(el => {
        el.removeEventListener("click", this.vClickHandler);
      });
    }
    if (this.sub2Input && this.sub2InputHandler) {
      this.sub2Input.removeEventListener("input", this.sub2InputHandler);
    }
    if (this.sub2Submit && this.sub2SubmitHandler) {
      this.sub2Submit.removeEventListener("click", this.sub2SubmitHandler);
    }
    this.container.innerHTML = "";
  }
}

// 퍼즐 등록
PuzzleManager.register(4, Stage4Puzzle);
</script>

            <!-- 외각 설명 키 -->
            <text x="140" y="170" fill="var(--text-muted)" font-size="9" text-anchor="middle">외각 x = 이웃하지 않는 두 내각의 합</text>
          </svg>
        </div>

        <div style="margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 8px;">
          <span style="font-size: 0.95rem; color: #fff;">외각 x = </span>
          <input type="number" id="stage5-input-x" placeholder="x의 값" style="width: 80px; padding: 8px; text-align: center; font-size: 1rem; border: 1px solid var(--gold-primary); border-radius: 6px; background: rgba(0,0,0,0.5); color: #fff; outline:none;">

  bindEvents() {
    if (this.substage === 1) {
      this.bindEventsSubstage1();
    } else {
      this.bindEventsSubstage2();
    }
  }

  bindEventsSubstage1() {
    this.cardClickHandler = (e) => {
      this.cards.forEach(c => {
        c.style.borderColor = "var(--gold-primary)";
        c.style.background = "#1b263b";
        c.style.boxShadow = "0 4px 6px rgba(0,0,0,0.3)";
      });
      this.selectedCard = e.currentTarget;
      this.selectedCard.style.borderColor = "#ff4757";
      this.selectedCard.style.background = "rgba(255, 71, 87, 0.2)";
      this.selectedCard.style.boxShadow = "0 0 10px rgba(255, 71, 87, 0.6)";
    };

    this.zoneClickHandler = (e) => {
      if (!this.selectedCard) {
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showWarning("먼저 아래 각도 카드 중 하나를 선택한 뒤 빈칸을 클릭해 주세요.");
        }
        return;
      }

      const zoneId = e.currentTarget.id;
      const val = parseInt(this.selectedCard.getAttribute("data-value"));

      e.currentTarget.textContent = val + "°";
      e.currentTarget.style.background = "rgba(212,175,55,0.25)";
      e.currentTarget.style.borderColor = "var(--gold-primary)";
      e.currentTarget.style.color = "#fff";
      e.currentTarget.style.borderStyle = "solid";

      if (zoneId === "drop-zone-B") this.solved.zoneB = val;
      if (zoneId === "drop-zone-C") this.solved.zoneC = val;

      this.render();

      if (this.checkAnswer()) {
        this.zones.forEach(z => z.style.borderColor = "#2ecc71");
        setTimeout(() => {
          if (this.onClearCallback) {
            this.onClearCallback();
          }
        }, 300);
      } else {
        if (this.solved.zoneB && this.solved.zoneC) {
          if (typeof PuzzleState !== "undefined") {
            PuzzleState.wrongCount += 1;
            EventBus.publish("stateChange:puzzle", PuzzleState);
          }
          const sum = 50 + this.solved.zoneB + this.solved.zoneC;
          if (typeof FeedbackSystem !== "undefined") {
            if (sum === 180) {
              FeedbackSystem.showError(`세 각의 합(${sum}°)은 맞으나, 도형의 생김새(예각삼각형)를 보세요. 직각(90°)이나 둔각 카드는 각 B나 C에 적합하지 않습니다. 다시 조합해 보세요.`);
            } else {
              FeedbackSystem.showError(`틀렸습니다! 세 각의 합이 ${sum}°입니다. 삼각형 내각의 합은 항상 180°가 되어야 합니다.`);
            }
          }
        }
      }
    };

    this.cards.forEach(card => {
      card.addEventListener("click", this.cardClickHandler);
    });

    this.zones.forEach(zone => {
      zone.addEventListener("click", this.zoneClickHandler);
    });
  }

  bindEventsSubstage2() {
    this.sub2InputHandler = (e) => {
      this.inputX = e.target.value;
    };

    this.sub2SubmitHandler = () => {
      const val = parseInt(this.inputX);
      if (val === this.targetX) {
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showSuccess("정답입니다! 삼각형의 한 외각은 이웃하지 않는 두 내각의 합과 같으므로 x = 50° + 60° = 110°가 맞습니다! (+5점)");
        }
        if (this.onClearCallback) {
          this.onClearCallback();
        }
      } else {
        if (typeof PuzzleState !== "undefined") {
          PuzzleState.wrongCount += 1;
          EventBus.publish("stateChange:puzzle", PuzzleState);
        }
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showError("틀렸습니다! 연장선 위의 외각 x는 삼각형 내부의 이웃하지 않는 두 각(50°, 60°)의 합과 같아야 합니다.");
        }
      }
    };

    if (this.sub2Input) this.sub2Input.addEventListener("input", this.sub2InputHandler);
    if (this.sub2Submit) this.sub2Submit.addEventListener("click", this.sub2SubmitHandler);
  }

  render() {
    if (this.substage === 1 && this.formula) {
      const bStr = this.solved.zoneB ? `${this.solved.zoneB}°` : "B";
      const cStr = this.solved.zoneC ? `${this.solved.zoneC}°` : "C";
      const total = 50 + (this.solved.zoneB || 0) + (this.solved.zoneC || 0);
      
      let color = "var(--text-muted)";
      let glow = "none";
      if (this.solved.zoneB && this.solved.zoneC) {
        if (total === 180) {
          const isValidShape = (this.solved.zoneB === 60 && this.solved.zoneC === 70) || (this.solved.zoneB === 70 && this.solved.zoneC === 60);
          color = isValidShape ? "#2ecc71" : "#f1c40f";
          glow = isValidShape ? "0 0 10px rgba(46,204,113,0.5)" : "none";
        } else {
          color = "#ff4757";
          glow = "0 0 10px rgba(255,71,87,0.5)";
        }
      }
      
      this.formula.innerHTML = `
        <span style="color: #fff;">∑ = </span>
        <span style="color: ${color}; text-shadow: ${glow}; font-size: 1.15rem;">${total}°</span>
        <div style="font-size: 0.72rem; color: var(--text-muted); margin-top: 4px;">
          50° + ${bStr} + ${cStr} = 180°
        </div>
      `;
    }
  }

  checkAnswer() {
    if (this.substage === 1) {
      if (!this.solved.zoneB || !this.solved.zoneC) return false;
      const isSumCorrect = (50 + this.solved.zoneB + this.solved.zoneC) === 180;
      const isShapeCorrect = (this.solved.zoneB === 60 && this.solved.zoneC === 70) || (this.solved.zoneB === 70 && this.solved.zoneC === 60);
      return isSumCorrect && isShapeCorrect;
    } else {
      return parseInt(this.inputX) === this.targetX;
    }
  }

  goNextSubstage() {
    if (this.substage === 1) {
      this.destroy();
      this.substage = 2;
      this.inputX = "";
      
      if (typeof SceneManager !== "undefined") {
        SceneManager.showScene("story", { stageId: "5_mid" });
      } else {
        this.init();
        this.bindEvents();
      }
      return true;
    }
    return false;
  }

  getHint(count) {
    if (this.substage === 1) {
      if (count === 1) return "삼각형의 가장 기초적인 성질인 세 내각의 총합을 기억해 보세요.";
      if (count === 2) return "삼각형 내부의 각들의 합은 언제나 180°입니다. 주어진 각이 50°이니 B + C = 130°가 되도록 채우되 예각 비율에 알맞게 각각 60°와 70°를 넣어보세요.";
      return this.getSolution();
    } else {
      if (count === 1) return "삼각형 밑변을 연장하여 생긴 외각 x는, 바로 이웃한 안쪽 각을 뺀 나머지 두 내각의 합과 같습니다.";
      if (count === 2) return "즉, x는 안쪽의 50°와 60°를 합친 크기와 완벽하게 같습니다. 이 성질을 수식으로 정리하면 x = 50 + 60 이 됩니다!";
      return this.getSolution();
    }
  }

  getSolution() {
    if (this.substage === 1) {
      return "삼각형 내각의 총합은 180°입니다. 각 A = 50°이므로 B + C = 130°여야 합니다. 예각삼각형 형태에 일치하도록 각 B = 60°(또는 70°), 각 C = 70°(또는 60°) 카드를 배치해야 합니다.";
    } else {
      return "삼각형의 외각 성질에 의해 외각 x는 이웃하지 않는 두 내각의 합인 50° + 60° = 110°가 됩니다.";
    }
  }

  getConceptText() {
    return "삼각형의 한 외각의 크기는 이웃하지 않는 두 내각의 크기의 합과 같습니다.";
  }

  reset() {
    this.solved = { zoneB: null, zoneC: null };
    this.inputX = "";
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.cards) {
      this.cards.forEach(card => {
        card.removeEventListener("click", this.cardClickHandler);
      });
    }
    if (this.zones) {
      this.zones.forEach(zone => {
        zone.removeEventListener("click", this.zoneClickHandler);
      });
    }
    if (this.sub2Input && this.sub2InputHandler) {
      this.sub2Input.removeEventListener("input", this.sub2InputHandler);
    }
    if (this.sub2Submit && this.sub2SubmitHandler) {
      this.sub2Submit.removeEventListener("click", this.sub2SubmitHandler);
    }
    this.container.innerHTML = "";
  }
}

// 퍼즐 등록
PuzzleManager.register(5, Stage5Puzzle);
</script>

    <script>
/**

class Stage6Puzzle extends PuzzleBase {
  constructor(containerId) {

        <div style="position: relative; width: 280px; height: 180px; margin: 0 auto; background: #0b131f; border: 2px solid var(--gold-primary); border-radius: 8px; box-shadow: 0 0 15px var(--gold-glow); display: flex; justify-content: center; align-items: center; gap: 15px;">

          <!-- 정육각형 구역 -->
          <div style="text-align: center; width: 120px;">

              <path d="M 30,5 A 15,15 0 0,0 19,11" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
            </svg>
            <div id="drop-zone-p6" class="dropzone" style="width: 56px; height: 34px; margin: 0 auto; border: 2px dashed var(--gold-primary); border-radius: 6px; font-size: 0.85rem; font-weight: bold; text-align: center; line-height: 30px; color: var(--gold-primary); background: rgba(0,0,0,0.65); cursor: pointer; transition: all 0.2s;">육각</div>
            <div style="margin-top: 4px; font-size: 0.65rem; color: var(--gold-primary); font-weight:bold;">정육각형 한 내각</div>
          </div>
          
        </div>
        
        <div style="margin-top: 15px; display: flex; justify-content: center; gap: 8px;">
          <div class="drag-card" data-value="90" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">90°</div>
          <div class="drag-card" data-value="108" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">108°</div>
          <div class="drag-card" data-value="120" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">120°</div>
          <div class="drag-card" data-value="135" style="width: 45px; height: 35px; background: #1b263b; border: 2px solid var(--gold-primary); border-radius: 6px; color: #fff; font-weight: bold; text-align: center; line-height: 31px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s; font-size: 0.85rem;">135°</div>
        </div>
      </div>
    `;
    this.cards = this.container.querySelectorAll(".drag-card");
    this.zones = this.container.querySelectorAll(".dropzone");
    this.selectedCard = null;
  }

  initSubstage2() {
    this.container.innerHTML = `
      <div style="text-align: center; width: 100%; padding: 15px; user-select: none;">
        <p style="color: var(--gold-primary); margin-bottom: 12px; font-size: 0.9rem;">
          [Part 2] 모든 다각형의 외각 합(360°)을 이용해 <strong>정팔각형 한 외각 x</strong>를 구하세요.
        </p>
        
        <div style="position: relative; width: 280px; height: 180px; margin: 0 auto; background: #0b131f; border: 2px solid var(--gold-primary); border-radius: 8px; box-shadow: 0 0 15px var(--gold-glow);">
          <svg width="280" height="180" style="position: absolute; top:0; left:0; pointer-events: none;">
            <!-- 정팔각형 일부 (3변): 자연스러운 내각 135° 모양으로 배치 -->
            <!-- 약 P1(80,155), P2(140,155), P3(185,110), P2에서 연장선으로 기준 다른선 방향 -->
            <!-- 내각 135°를 나타낼 수 있도록 P1-P2-P3 배치 -->
            <polyline points="80,155 175,155 220,95" fill="none" stroke="var(--gold-primary)" stroke-width="3" />
            <!-- P2(175,155)에서 왜쪽으로 연장선 (BC 연장 = 외각용) -->
            <line x1="175" y1="155" x2="95" y2="155" stroke="rgba(255, 71, 87, 0.7)" stroke-width="3" stroke-dasharray="3 2" />

            <!-- 내각 위치 (P2 = 175,155) -->
            <!-- 내각은 P1방향과 P3방향 사이: P1은 왼쪽(0°), P3은 위쓰(45° 위) -->
            <!-- 내각 호 (135°): P2에서 P1 방향(왼쪽)과 P3 방향(오른쪽 위) 사이 -->
            <path d="M 155,155 A 22,22 0 0,1 197,131" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" />
            <text x="150" y="145" fill="rgba(255,255,255,0.5)" font-size="9" font-weight="bold">내각 135°</text>

            <!-- 외각 x 호: 연장선 방향(왼쪽)과 P3 방향 사이 -->
            <!-- 연장선 왼쪽, P3 위쪽 => x=45° 자리 -->
            <path d="M 197,131 A 22,22 0 0,1 195,155" fill="none" stroke="#ff4757" stroke-width="2.5" />
            <text x="200" y="148" fill="#ff4757" font-size="14" font-weight="bold">x</text>

            <!-- 레이블 -->
            <text x="140" y="30" fill="var(--text-muted)" font-size="9" text-anchor="middle">제수공식: 360° ÷ n각인준 = 한 외각</text>
            <text x="140" y="45" fill="var(--gold-primary)" font-size="9" text-anchor="middle">정팔각형(n=8) 외각 합 = 360°</text>
          </svg>
          
          <div style="position: absolute; top: 60px; left: 0; width: 100%; text-align: center; font-size: 0.8rem; color: var(--text-muted); font-weight: bold;">정팔각형</div>

        </div>

        <div style="margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 8px;">
          <span style="font-size: 0.95rem; color: #fff;">외각 x = </span>
          <input type="number" id="stage6-input-x" placeholder="x의 값" style="width: 80px; padding: 8px; text-align: center; font-size: 1rem; border: 1px solid var(--gold-primary); border-radius: 6px; background: rgba(0,0,0,0.5); color: #fff; outline:none;">
          <span style="font-size: 0.95rem; color: #fff;">°</span>
          <button id="stage6-submit-btn" class="btn" style="width: 70px; padding: 9px; font-size: 0.85rem; margin: 0;">확인</button>
        </div>
      </div>
    `;
    this.sub2Input = document.getElementById("stage6-input-x");
    this.sub2Submit = document.getElementById("stage6-submit-btn");
  }

  bindEvents() {
    if (this.substage === 1) {
      this.bindEventsSubstage1();
    } else {
      this.bindEventsSubstage2();
    }
  }

  bindEventsSubstage1() {
    this.cardClickHandler = (e) => {
      this.cards.forEach(c => {
        c.style.borderColor = "var(--gold-primary)";
        c.style.background = "#1b263b";
        c.style.boxShadow = "0 4px 6px rgba(0,0,0,0.3)";
      });
      this.selectedCard = e.currentTarget;
      this.selectedCard.style.borderColor = "#ff4757";
      this.selectedCard.style.background = "rgba(255, 71, 87, 0.2)";
      this.selectedCard.style.boxShadow = "0 0 10px rgba(255, 71, 87, 0.6)";
    };

    this.zoneClickHandler = (e) => {
      if (!this.selectedCard) {
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showWarning("먼저 아래 각도 카드 중 하나를 선택한 뒤 빈칸을 클릭해 주세요.");
        }
        return;
      }

      const zoneId = e.currentTarget.id;
      const val = parseInt(this.selectedCard.getAttribute("data-value"));

      e.currentTarget.textContent = val + "°";
      e.currentTarget.style.background = "rgba(212,175,55,0.25)";
      e.currentTarget.style.borderColor = "var(--gold-primary)";
      e.currentTarget.style.color = "#fff";
      e.currentTarget.style.borderStyle = "solid";

      if (zoneId === "drop-zone-p5") this.solved.zoneP5 = val;
      if (zoneId === "drop-zone-p6") this.solved.zoneP6 = val;

      if (this.checkAnswer()) {
        this.zones.forEach(z => z.style.borderColor = "#2ecc71");
        setTimeout(() => {
          if (this.onClearCallback) {
            this.onClearCallback();
          }
        }, 300);
      } else {
        if (this.solved.zoneP5 && this.solved.zoneP6) {
          if (typeof PuzzleState !== "undefined") {
            PuzzleState.wrongCount += 1;
            EventBus.publish("stateChange:puzzle", PuzzleState);
          }
          if (typeof FeedbackSystem !== "undefined") {
            FeedbackSystem.showError("틀렸습니다! 정오각형 한 내각은 108°, 정육각형 한 내각은 120°입니다. 다시 조합해 보세요.");
          }
        }
      }
    };

    this.cards.forEach(card => {
      card.addEventListener("click", this.cardClickHandler);
    });

    this.zones.forEach(zone => {
      zone.addEventListener("click", this.zoneClickHandler);
    });
  }

  bindEventsSubstage2() {
    this.sub2InputHandler = (e) => {
      this.inputX = e.target.value;
    };

    this.sub2SubmitHandler = () => {
      const val = parseInt(this.inputX);
      if (val === this.targetX) {
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showSuccess("정답입니다! 정팔각형의 한 외각은 360° / 8 = 45° 가 맞습니다! 남색 수정 획득! (+5점)");
        }
        if (this.onClearCallback) {
          this.onClearCallback();
        }
      } else {
        if (typeof PuzzleState !== "undefined") {
          PuzzleState.wrongCount += 1;
          EventBus.publish("stateChange:puzzle", PuzzleState);
        }
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showError("틀렸습니다! 정n각형의 한 외각은 360° / n 공식으로 구합니다. 팔각형이므로 360 / 8을 계산해 보세요.");
        }
      }
    };

    if (this.sub2Input) this.sub2Input.addEventListener("input", this.sub2InputHandler);
    if (this.sub2Submit) this.sub2Submit.addEventListener("click", this.sub2SubmitHandler);
  }

  checkAnswer() {
    if (this.substage === 1) {
      return this.solved.zoneP5 === 108 && this.solved.zoneP6 === 120;
    } else {
      return parseInt(this.inputX) === this.targetX;
    }
  }

  goNextSubstage() {
    if (this.substage === 1) {
      this.destroy();
      this.substage = 2;
      this.inputX = "";
      
      if (typeof SceneManager !== "undefined") {
        SceneManager.showScene("story", { stageId: "6_mid" });
      } else {
        this.init();
        this.bindEvents();
      }
      return true;
    }
    return false;
  }

  getHint(count) {
    if (this.substage === 1) {
      if (count === 1) return "정n각형의 한 내각의 크기 공식은 180° * (n - 2) / n 입니다.";
      if (count === 2) return "정오각형은 180° * 3 / 5 = 108° 이고, 정육각형은 180° * 4 / 6 = 120° 입니다.";
      return this.getSolution();
    } else {
      if (count === 1) return "어떤 다각형이든 상관없이 외각 크기의 합은 항상 360°가 됩니다.";
      if (count === 2) return "정팔각형은 모든 외각의 크기도 대칭을 이루므로, 한 외각 x는 360°를 꼭짓점 수 8로 나누어 구합니다. 즉 x = 360 / 8 입니다.";
      return this.getSolution();
    }
  }

  getSolution() {
    if (this.substage === 1) {
      return "정오각형 한 내각은 108°이며, 정육각형 한 내각은 120°입니다. 각 카드를 드롭존에 알맞게 정렬해 드롭하세요.";
    } else {
      return "정다각형의 외각의 총합은 360°입니다. 정팔각형의 한 외각 x는 360° / 8 = 45°가 됩니다.";
    }
  }

  getConceptText() {
    return "정n각형의 한 내각은 180°(n-2)/n 이고, 다각형 외각의 합은 항상 360°이며 정n각형 한 외각은 360°/n 입니다.";
  }

  reset() {
    this.solved = { zoneP5: null, zoneP6: null };
    this.inputX = "";
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.cards) {
      this.cards.forEach(card => {
        card.removeEventListener("click", this.cardClickHandler);
      });
    }
    if (this.zones) {
      this.zones.forEach(zone => {
        zone.removeEventListener("click", this.zoneClickHandler);
      });
    }
    if (this.sub2Input && this.sub2InputHandler) {
      this.sub2Input.removeEventListener("input", this.sub2InputHandler);
    }
    if (this.sub2Submit && this.sub2SubmitHandler) {
      this.sub2Submit.removeEventListener("click", this.sub2SubmitHandler);
    }
    this.container.innerHTML = "";
  }
}

PuzzleManager.register(6, Stage6Puzzle);
</script>

/**
 * 7스테이지 마왕 발록 최종 종합 보스전 퍼즐 클래스.
 * 상단 실시간 보스 HP 바 렌더링 및 3페이즈 격퇴 연출 적용.
 * Substage 1 (Phase 1): 평행선 결계 (엇각 + 맞꼭지각) -> HP 100%
 * Substage 2 (Phase 2): 삼각형 결계 (엇각 + 외각) -> HP 66%
 * Substage 3 (Phase 3): 다각형 최종 종합 융합 결계 -> HP 33%
 */
class Stage7Puzzle extends PuzzleBase {
  constructor(containerId) {
    super(containerId);
    this.substage = 1;
    this.userAnswer = "";
    this.targetAnswer = 45; // Default Phase 1 정답
    this.onClearCallback = null;
    
    this.inputHandler = null;
    this.submitHandler = null;
  }

  init() {
    if (this.substage === 1) {
      this.initSubstage1();
    } else if (this.substage === 2) {
      this.initSubstage2();
    } else {
      this.initSubstage3();
    }
    this.updateBossHp();
  }

  // 공통 마왕 발록 HP 바 UI 마크업
  getBossHeaderHtml(phaseText) {
    return `
      <div id="balrog-boss-container" style="margin-bottom: 12px; width: 100%; text-align: center; user-select: none;">
        <div style="font-weight: bold; color: #ff4757; font-size: 0.95rem; margin-bottom: 5px; text-shadow: 0 0 5px rgba(255, 71, 87, 0.4);">
          기하를 왜곡하는 마왕 발록 (LV.99)
        </div>
        <div style="width: 240px; height: 14px; background: rgba(255,255,255,0.08); border: 2px solid #ff4757; border-radius: 7px; margin: 0 auto; overflow: hidden; position: relative; box-shadow: 0 0 10px rgba(255, 71, 87, 0.25);">
          <div id="balrog-hp-bar" style="width: 100%; height: 100%; background: linear-gradient(90deg, #ff4757, #ff9f43); transition: width 0.8s ease-out; box-shadow: inset 0 2px 4px rgba(255,255,255,0.3);"></div>
        </div>
        <div id="balrog-phase-label" style="font-size: 0.72rem; color: var(--gold-primary); margin-top: 5px; font-weight: bold; text-shadow: 0 0 3px var(--gold-glow);">
          ${phaseText}
        </div>
      </div>
    `;
  }

  initSubstage1() {
    this.targetAnswer = 45;
    this.container.innerHTML = `
      <div style="text-align: center; width: 100%; padding: 15px; user-select: none;">
        ${this.getBossHeaderHtml("[1페이즈] 맞꼭지각과 동위각의 1차 평행선 결계")}
        
        <div style="position: relative; display: inline-block; margin-bottom: 10px;">
          <svg id="stage7-svg" width="280" height="180" style="background:#0b131f; border: 2px solid var(--gold-primary); border-radius: 8px; box-shadow: 0 0 15px var(--gold-glow);">
            <!-- 평행선 L(y=50), M(y=130) -->
            <line x1="20" y1="50" x2="260" y2="50" stroke="#a5a5a5" stroke-width="2" />
            <line x1="20" y1="130" x2="260" y2="130" stroke="#a5a5a5" stroke-width="2" />
            <text x="245" y="45" fill="#a5a5a5" font-size="9">L</text>
            <text x="245" y="125" fill="#a5a5a5" font-size="9">M</text>
            <text x="30" y="32" fill="var(--gold-primary)" font-size="9" font-weight="bold">L // M (평행)</text>

            <!-- 교차선 t: 위 교차점(100,50), 아래 교차점(190,130) -->
            <line x1="65" y1="20" x2="220" y2="160" stroke="#ff4757" stroke-width="2.5" />

            <!-- 위 교차점 (100, 50): L선 위쪽 왼쪽 = 45° 표시호 -->
            <!-- t선이 L에서 왜쪽 위쪽에 생기는 45° -->
            <path d="M 100,50 A 20,20 0 0,0 86,37" fill="none" stroke="var(--gold-primary)" stroke-width="2" />
            <text x="66" y="40" fill="#fff" font-size="11" font-weight="bold">45°</text>

            <!-- 아래 교차점 (190, 130): M선 아래 오른쪽 = 동위각 x -->
            <!-- 동위각: t선이 M에서 오른쪽 아래쪽에 생기는 각 -->
            <path d="M 190,130 A 20,20 0 0,1 205,143" fill="none" stroke="#ff4757" stroke-width="2.5" />
            <text x="210" y="157" fill="#ff4757" font-size="13" font-weight="bold">x</text>
          </svg>
        </div>
        
        <div style="margin-top: 10px;">
          <input type="number" id="stage7-input" placeholder="x의 각도" style="width: 120px; padding: 9px; text-align: center; font-size: 1rem; border: 1px solid var(--gold-primary); border-radius: 6px; background: rgba(0,0,0,0.5); color: #fff; outline:none; vertical-align: middle;">
          <button id="stage7-submit-btn" class="btn" style="width: 80px; padding: 10px; display: inline-block; vertical-align: middle; margin-left: 10px; font-size: 0.9rem;">성검공격</button>
        </div>

    this.submitBtn = document.getElementById("stage7-submit-btn");
  }

  initSubstage2() {
    this.targetAnswer = 105;
    this.container.innerHTML = `
      <div style="text-align: center; width: 100%; padding: 15px; user-select: none;">
        ${this.getBossHeaderHtml("[2페이즈] 엇각과 삼각형 외각의 2차 삼각 결계")}
        
        <div style="position: relative; display: inline-block; margin-bottom: 10px;">
          <svg id="stage7-svg" width="280" height="185" style="background:#0b131f; border: 2px solid var(--gold-primary); border-radius: 8px; box-shadow: 0 0 15px var(--gold-glow);">
            <!-- 평행선 L(y=40), M(y=155) -->
            <line x1="20" y1="40" x2="260" y2="40" stroke="#a5a5a5" stroke-width="2" />
            <line x1="20" y1="155" x2="260" y2="155" stroke="#a5a5a5" stroke-width="2" />
            <text x="30" y="25" fill="var(--gold-primary)" font-size="9" font-weight="bold">L // M (평행)</text>
            <text x="245" y="35" fill="#a5a5a5" font-size="9">L</text>
            <text x="245" y="150" fill="#a5a5a5" font-size="9">M</text>

            <!-- 삼각형 ABC:
                 A = L선 위: (175, 40)
                 B = 왼쪽 아래: (70, 155)
                 C = 오른쪽 아래: (220, 155) -->
            <polygon points="175,40 70,155 220,155" fill="none" stroke="#e0e1dd" stroke-width="2" />

            <!-- 각 A (삼각형 안쪽, L선 위): 45° 엇각 -->
            <path d="M 155,40 A 22,22 0 0,1 175,62" fill="none" stroke="var(--gold-primary)" stroke-width="1.5" />
            <text x="130" y="60" fill="#fff" font-size="11" font-weight="bold">45°</text>

            <!-- 각 B (삼각형 왼쪽 내각): 60° -->
            <path d="M 88,155 A 22,22 0 0,0 80,134" fill="none" stroke="var(--gold-primary)" stroke-width="1.5" />
            <text x="50" y="145" fill="#fff" font-size="11" font-weight="bold">60°</text>

            <!-- BC 연장선: C(220,155) 오른쪽 -->
            <line x1="220" y1="155" x2="262" y2="155" stroke="rgba(255, 71, 87, 0.7)" stroke-width="3" stroke-dasharray="3 2" />

            <!-- 외각 x 호: C(220,155)에서 AC변 방향과 연장선(오른쪽) 사이 -->
            <path d="M 220,133 A 25,25 0 0,1 244,155" fill="none" stroke="#ff4757" stroke-width="2.5" />
            <text x="233" y="143" fill="#ff4757" font-size="13" font-weight="bold">x</text>
          </svg>
        </div>
        
        <div style="margin-top: 10px;">
          <input type="number" id="stage7-input" placeholder="x의 각도" style="width: 120px; padding: 9px; text-align: center; font-size: 1rem; border: 1px solid var(--gold-primary); border-radius: 6px; background: rgba(0,0,0,0.5); color: #fff; outline:none; vertical-align: middle;">
          <button id="stage7-submit-btn" class="btn" style="width: 80px; padding: 10px; display: inline-block; vertical-align: middle; margin-left: 10px; font-size: 0.9rem;">성검공격</button>
        </div>
      </div>
    `;
    this.input = document.getElementById("stage7-input");
    this.submitBtn = document.getElementById("stage7-submit-btn");
  }

  initSubstage3() {
    this.targetAnswer = 115;
    this.container.innerHTML = `
      <div style="text-align: center; width: 100%; padding: 15px; user-select: none;">
        ${this.getBossHeaderHtml("[최종 3페이즈] 맞꼭지+평행선+삼각형 최종 융합 배리어")}
        
        <div style="position: relative; display: inline-block; margin-bottom: 10px;">
          <svg id="stage7-svg" width="280" height="205" style="background:#0b131f; border: 2px solid var(--gold-primary); border-radius: 8px; box-shadow: 0 0 15px var(--gold-glow);">
            <line x1="20" y1="40" x2="260" y2="40" stroke="#a5a5a5" stroke-width="2" />
            <line x1="20" y1="130" x2="260" y2="130" stroke="#a5a5a5" stroke-width="2" />
            <text x="30" y="25" fill="var(--gold-primary)" font-size="9" font-weight="bold">L // M (평행)</text>
            <line x1="50" y1="10" x2="90" y2="40" stroke="#fff" stroke-width="2" opacity="0.5" />
            <line x1="90" y1="40" x2="160" y2="90" stroke="#fff" stroke-width="2.2" />
            <line x1="160" y1="90" x2="110" y2="130" stroke="#fff" stroke-width="2.2" />
            <path d="M 90,40 A 16,16 0 0,0 76,29" fill="none" stroke="var(--gold-primary)" stroke-width="1.5" />
            <text x="58" y="28" fill="#fff" font-size="10" font-weight="bold">55°</text>
            <path d="M 148,80 A 18,18 0 0,0 148,102" fill="none" stroke="#ff4757" stroke-width="2.5" />
            <text x="125" y="96" fill="#ff4757" font-size="13" font-weight="bold">x</text>
            <polygon points="110,130 70,190 160,190" fill="none" stroke="#e0e1dd" stroke-width="1.8" />
            <text x="60" y="200" fill="#fff" font-size="10" font-weight="bold">50°</text>
            <text x="148" y="200" fill="#fff" font-size="10" font-weight="bold">70°</text>
          </svg>
        </div>
        
        <div style="margin-top: 10px;">
          <input type="number" id="stage7-input" placeholder="최종 각도 x" style="width: 120px; padding: 9px; text-align: center; font-size: 1rem; border: 1px solid var(--gold-primary); border-radius: 6px; background: rgba(0,0,0,0.5); color: #fff; outline:none; vertical-align: middle;">
          <button id="stage7-submit-btn" class="btn" style="width: 80px; padding: 10px; display: inline-block; vertical-align: middle; margin-left: 10px; font-size: 0.9rem;">최후일격</button>
        </div>
      </div>
    `;
    this.input = document.getElementById("stage7-input");
    this.submitBtn = document.getElementById("stage7-submit-btn");
  }

  updateBossHp() {
    const hpBar = document.getElementById("balrog-hp-bar");
    if (!hpBar) return;
    
    // substage별 HP 설정
    if (this.substage === 1) {
      hpBar.style.width = "100%";
    } else if (this.substage === 2) {
      hpBar.style.width = "66%";
    } else if (this.substage === 3) {
      hpBar.style.width = "33%";
    } else {
      hpBar.style.width = "0%";
    }
  }

  bindEvents() {
    this.inputHandler = (e) => {
      this.userAnswer = e.target.value;
    };
    
    this.submitHandler = () => {
      if (this.checkAnswer()) {
        this.input.disabled = true;
        this.submitBtn.disabled = true;
        
        if (typeof FeedbackSystem !== "undefined") {
          if (this.substage === 1) {
            FeedbackSystem.showSuccess("성공! 발록의 1페이즈 평행 결계가 붕괴됩니다! 데미지 33%! (+5점)");
          } else if (this.substage === 2) {
            FeedbackSystem.showSuccess("성공! 발록의 2페이즈 삼각 장막마저 깨집니다! 데미지 66%! (+5점)");
          } else {
            FeedbackSystem.showSuccess("마왕 발록의 모든 결계를 격파했습니다! 성검의 광휘가 세상을 구원합니다! (+10점)");
          }
        }

        const hpBar = document.getElementById("balrog-hp-bar");
        if (hpBar) {
          if (this.substage === 1) hpBar.style.width = "66%";
          if (this.substage === 2) hpBar.style.width = "33%";
          if (this.substage === 3) hpBar.style.width = "0%";
        }

        const svg = document.getElementById("stage7-svg");
        if (typeof AnimationManager !== "undefined" && svg) {
          setTimeout(() => {
            AnimationManager.playSolved(svg.parentNode);
          }, 300);
        }

        setTimeout(() => {
          if (this.onClearCallback) {
            this.onClearCallback();
          }
        }, 1800);
      } else {
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showError("마왕 발록이 폭소를 터뜨립니다!\n\"크하하하! 그 정도 얕은 계산으로 나의 왜곡 마법을 풀 순 없다!\"");
        }
        
        if (typeof PuzzleState !== "undefined") {
          PuzzleState.wrongCount += 1;
          EventBus.publish("stateChange:puzzle", PuzzleState);
        }
      }
    };
    
    if (this.input) this.input.addEventListener("input", this.inputHandler);
    if (this.submitBtn) this.submitBtn.addEventListener("click", this.submitHandler);
  }

  checkAnswer() {
    return parseInt(this.userAnswer) === this.targetAnswer;
  }

  goNextSubstage() {
    if (this.substage === 1) {
      this.substage = 2;
      this.userAnswer = "";
      
      if (typeof SceneManager !== "undefined") {
        SceneManager.showScene("story", { stageId: "7_mid1" });
      } else {
        this.init();
        this.bindEvents();
      }
      return true;
    } else if (this.substage === 2) {
      this.substage = 3;
      this.userAnswer = "";
      
      if (typeof SceneManager !== "undefined") {
        SceneManager.showScene("story", { stageId: "7_mid2" });
      } else {
        this.init();
        this.bindEvents();
      }
      return true;
    }
    return false;
  }

  getHint(count) {
    if (this.substage === 1) {
      if (count === 1) return "교차하는 빗선에 의해 마주 보는 두 각은 맞꼭지각이므로 크기가 같습니다. 즉, y = 45° 입니다.";
      if (count === 2) return "L선과 M선이 평행하므로, y°와 구하려는 x°는 동위각 관계입니다. 따라서 x = y = 45°가 성립합니다.";
      return this.getSolution();
    } else if (this.substage === 2) {
      if (count === 1) return "평행선 사이의 엇각에 의해 삼각형 ABC의 왼쪽 내각 B의 크기는 45°가 됩니다.";
      if (count === 2) return "삼각형의 외각 공식에 의해, 외각 x는 이웃하지 않는 두 내각(A=60°, B=45°)의 합인 105°가 됩니다.";
      return this.getSolution();
    } else {
      if (count === 1) return "꺾인 점 P를 지나는 수평선 보조선을 그어 위아래 엇각을 유도합니다.";
      if (count === 2) return "윗부분 엇각은 L선 맞꼭지각 55°와 같고, 아랫부분 엇각은 M선 아래 삼각형의 나머지 한 각인 60°(180 - 50 - 70)와 같습니다. 이를 더하면 115°가 됩니다.";
      return this.getSolution();
    }
  }

  getSolution() {
    if (this.substage === 1) {
      return "맞꼭지각 성질에 의해 y = 45°가 성립합니다. 또한 평행선에서 동위각의 크기는 같으므로 x = y = 45°가 됩니다.";
    } else if (this.substage === 2) {
      return "평행선 L과 AB선 사이의 엇각에 의해 삼각형 내각 B = 45°입니다. 외각의 정리로 x = 60° + 45° = 105°가 됩니다.";
    } else {
      return "L선 위쪽 맞꼭지각이 55°이므로 꺾인 점 P의 윗부분 엇각은 55°입니다. 하단 삼각형 내각의 합은 180°이므로 꼭짓점의 남은 한 각은 180° - 50° - 70° = 60°입니다. 이 각과 꺾인 점 P의 아랫부분 엇각은 60°로 동일합니다. 따라서 x = 55° + 60° = 115°가 됩니다.";
    }
  }

  getConceptText() {
    return "맞꼭지각, 평행선(동위각·엇각), 삼각형(내각·외각)의 모든 성질을 유기적으로 연계하면 아무리 복합적인 기하 문제도 해결할 수 있습니다.";
  }

  reset() {
    if (this.input) {
      this.input.disabled = false;
      this.input.value = "";
    }
    if (this.submitBtn) this.submitBtn.disabled = false;
    this.userAnswer = "";
    this.init();
    this.bindEvents();
  }

  destroy() {
    if (this.input && this.inputHandler) this.input.removeEventListener("input", this.inputHandler);
    if (this.submitBtn && this.submitHandler) this.submitBtn.removeEventListener("click", this.submitHandler);
    this.container.innerHTML = "";
  }
}

// 퍼즐 등록
PuzzleManager.register(7, Stage7Puzzle);
</script>

    <script>
/**
 * 학생 학번/이름 입력 화면 씬 객체.
 */
const InputScene = {
  enter: function(data) {
    console.log("[InputScene] 진입");
    const submitBtn = document.getElementById("input-submit-btn");
    if (submitBtn) {
      this.submitHandler = (e) => {
        e.preventDefault();
        
        const studentNoInput = document.getElementById("student-no");
        const nameInput = document.getElementById("student-name");
        
        const studentNo = studentNoInput ? studentNoInput.value.trim() : "";
        const name = nameInput ? nameInput.value.trim() : "";
        
        // 정규식: 학번 4~5자리 숫자 (예: 1011 또는 10101)
        if (!/^\d{4,5}$/.test(studentNo)) {
          if (typeof FeedbackSystem !== "undefined") {
            FeedbackSystem.showWarning("학번은 4~5자리 숫자로 입력해 주세요. (예: 1011 또는 10101)");
          } else {
            alert("학번은 4~5자리 숫자로 입력해 주세요. (예: 1011 또는 10101)");
          }
          return;
        }
        if (!name) {
          if (typeof FeedbackSystem !== "undefined") {
            FeedbackSystem.showWarning("이름을 입력해 주세요.");
          } else {
            alert("이름을 입력해 주세요.");
          }
          return;
        }
        
        // UserState에 반영
        UserState.studentNo = studentNo;
        UserState.name = name;
        UserState.browser = navigator.userAgent;
        UserState.device = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? "Mobile/Tablet" : "PC";
        
        EventBus.publish("stateChange:user", UserState);
        
        // 타이머 시작 및 스토리 시작
        GameState.startTime = new Date().toISOString();
        GameState.currentStage = 1;
        EventBus.publish("stateChange:game", GameState);
        
        // 새로고침 복구용 로컬 스토리지 기입
        if (typeof StateStore !== "undefined") {
          StateStore.saveToLocalStorage();
        }
        
        // 튜토리얼 완료 여부에 따라 다음 씬 결정
        if (GameState.tutorialCompleted) {
          SceneManager.showScene("story", { stageId: GameState.currentStage });
        } else {
          SceneManager.showScene("tutorial");
        }
      };
      
      const form = document.getElementById("input-form");
      if (form) {
        form.addEventListener("submit", this.submitHandler);
      }
    }
  },
  exit: function() {
    console.log("[InputScene] 이탈");
    const form = document.getElementById("input-form");
    if (form && this.submitHandler) {
      form.removeEventListener("submit", this.submitHandler);
    }
  }
};

// 씬 등록
SceneManager.register("input", InputScene);
</script>

  enter: function(data) {

    // 건너뛰기 버튼이나 튜토리얼 레이아웃 초기화
    const boardContainer = document.getElementById("tutorial-board-container");
    if (boardContainer) {
      // 튜토리얼 엔진 시작
      TutorialEngine.start("tutorial-board-container", () => {
        this.completeTutorial();
      });
    }

    const skipBtn = document.getElementById("tutorial-skip-btn");
    if (skipBtn) {
      this.skipHandler = () => {
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showInfo("훈련을 건너뛰고 성에 진입합니다.");
        }
        this.completeTutorial();
      };
      skipBtn.addEventListener("click", this.skipHandler);
    }
  },

  completeTutorial: function() {
    // 튜토리얼 완료 플래그 활성화
    GameState.tutorialCompleted = true;
    EventBus.publish("stateChange:game", GameState);

    if (typeof StateStore !== "undefined") {
      StateStore.saveToLocalStorage();
    }

    // 첫 스테이지 스토리로 전환
    SceneManager.showScene("story", { stageId: GameState.currentStage });
  },

  exit: function() {
    console.log("[TutorialScene] 이탈");
    const skipBtn = document.getElementById("tutorial-skip-btn");
    if (skipBtn && this.skipHandler) {
      skipBtn.removeEventListener("click", this.skipHandler);
    }
    const boardContainer = document.getElementById("tutorial-board-container");
    if (boardContainer) {
      boardContainer.innerHTML = "";
    }
  }
};

// 씬 등록
SceneManager.register("tutorial", TutorialScene);
</script>

const StoryScene = {
  enter: function(data) {
    const stageId = data ? data.stageId : 1;
    console.log(`[StoryScene] 진입 - 스테이지 ${stageId}`);
    
    let bgStageId = stageId;
    if (typeof stageId === "string" && stageId.includes("_mid")) {
      bgStageId = parseInt(stageId.split("_mid")[0]);
    }

    // 0. 스테이지별 배경 레이어 적용
    if (typeof AnimationManager !== "undefined") {
      AnimationManager.playStoryBg(bgStageId);

    const clickArea = document.getElementById("story-click-area");
    if (clickArea) {
      this.clickHandler = () => {
        StoryManager.next();

      clickArea.addEventListener("click", this.clickHandler);

    StoryManager.startStory(stageId, function() {

      SceneManager.showScene("puzzle", { stageId: targetStageId });
    });
  },
  
  exit: function() {

    if (clickArea && this.clickHandler) {
      clickArea.removeEventListener("click", this.clickHandler);

    const choices = document.getElementById("story-choices-container");
    if (choices) choices.remove();

};

// 씬 등록
SceneManager.register("story", StoryScene);

    <script>
/**
 * 퍼즐 풀이 화면 씬 객체.
 */
const PuzzleScene = {
  enter: function(data) {
    const stageId = data ? data.stageId : 1;
    console.log(`[PuzzleScene] 진입 - 스테이지 ${stageId}`);
    
    // 스테이지 전환 시 힌트/오답 카운트 초기화 (잠재적 UI 전이 버그 차단)
    if (typeof PuzzleState !== "undefined") {
      PuzzleState.wrongCount = 0;
      PuzzleState.hintCount = 0;
      EventBus.publish("stateChange:puzzle", PuzzleState);
    }

    const stageTitleEl = document.getElementById("puzzle-stage-title");
    if (stageTitleEl) {
      stageTitleEl.textContent = `스테이지 ${stageId} - 방 탈출 퍼즐`;
    }
    
    // 0. 마법 수정 인벤토리 상태 갱신
    this.updateCrystalInventory();
    
    // 1. PuzzleManager를 통해 퍼즐 인스턴스 기동 및 클리어 핸들러 연결
    const currentPuzzle = PuzzleManager.loadPuzzle(stageId, "puzzle-board-container");
    if (currentPuzzle) {
      currentPuzzle.onClearCallback = () => {
        // 하위 스테이지 완료 또는 최종 스테이지 완료 판단
        let hasNextSub = false;
        if (currentPuzzle && typeof currentPuzzle.goNextSubstage === "function") {
          hasNextSub = currentPuzzle.goNextSubstage();
        }
        
        if (hasNextSub) {
          // 크리스탈 조각을 획득했다는 연출
          PuzzleState.currentSubstage += 1;
          EventBus.publish("stateChange:puzzle", PuzzleState);
          
          if (typeof StateStore !== "undefined") {
            StateStore.saveToLocalStorage(); // 하위 단계 저장 보강
          }
          
          this.updateCrystalInventory();
          if (typeof FeedbackSystem !== "undefined") {
            FeedbackSystem.showSuccess("1단계 주문 분석 성공! 다음 심화 퍼즐이 활성화되었습니다. 크리스탈 조각을 획득했습니다!");
          }
          return;
        }

        // 최종 정답 연출
        const puzzleArea = document.getElementById("puzzle-board-container");

        }
        
        // 정답 수 갱신 (스테이지 클리어 완료)
        PuzzleState.correctCount = stageId;
        PuzzleState.currentSubstage = 1; // 다음 스테이지를 위해 초기화
        EventBus.publish("stateChange:puzzle", PuzzleState);
        
        // 인벤토리 상태 한 번 더 갱신
        this.updateCrystalInventory();
        
        const DELAY_AFTER_SOLVE = 1000;
        setTimeout(() => {
          // 마법 수정 획득 연출 모달 기동 (개념 정리 모달 기능 포함)
          this.showCrystalModal(stageId, () => {
            if (stageId < 7) {
              // 다음 스테이지 이동
              GameState.currentStage = stageId + 1;
              EventBus.publish("stateChange:game", GameState);
              
              if (typeof StateStore !== "undefined") {
                StateStore.saveToLocalStorage();
              }
              
              SceneManager.showScene("story", { stageId: GameState.currentStage });
            } else {
              // 마왕 발록 격퇴 -> 엔딩으로
              GameState.endTime = new Date().toISOString();
              GameState.cleared = true;
              EventBus.publish("stateChange:game", GameState);
              
              if (typeof StateStore !== "undefined") {
                StateStore.saveToLocalStorage();
              }
              
              SceneManager.showScene("story", { stageId: "7_end" });
            }
          });
        }, DELAY_AFTER_SOLVE);
      };
      
      // SVG Ripple: 퍼즐 캔버스 클릭 시
      const puzzleBoard = document.getElementById("puzzle-board-container");
      if (puzzleBoard) {
        this.rippleHandler = (e) => {
          if (typeof AnimationManager !== "undefined") {
            const rect = puzzleBoard.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0) - rect.top;
            AnimationManager.playRipple(x, y, puzzleBoard);
          }
        };
        puzzleBoard.addEventListener("click",      this.rippleHandler);
        puzzleBoard.addEventListener("touchstart", this.rippleHandler, { passive: true });
      }
    }
    
    // 2. 3단계 힌트 버튼 리스너 바인딩
    const hintBtn = document.getElementById("puzzle-hint-btn");
    if (hintBtn) {
      this.hintHandler = () => {
        let npcName = "성검의 정령";
        if (stageId === 7) npcName = "마왕 발록"; // 7스테이지 보스는 조롱 메시지

        PuzzleState.hintCount += 1;
        
        // 페널티 누적
        const PENALTIES = [3, 5, 10]; // 힌트 1, 2, 3회차 페널티
        const currentPenalty = PENALTIES[Math.min(PuzzleState.hintCount, 3) - 1] || 10;
        PuzzleState.hintPenalty += currentPenalty;
        EventBus.publish("stateChange:puzzle", PuzzleState);
        
        let hintMsg = "";
        const activePuzzle = PuzzleManager.getActivePuzzle();
        if (activePuzzle && typeof activePuzzle.getHint === "function") {
          hintMsg = activePuzzle.getHint(PuzzleState.hintCount);
        } else {
          // Fallback (레거시/기본값)
          if (stageId === 1) hintMsg = "맞꼭지각은 서로 교차하는 두 직선에 의해 마주 보는 두 각입니다. 크기가 항상 같지요!";
          else hintMsg = "도형의 성질을 천천히 짚어보며 차분히 다시 풀어보세요.";
        }
        
        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showHint(npcName, hintMsg);
        } else {
          alert(`[${npcName}의 조언]\n${hintMsg}`);
        }
      };
      hintBtn.addEventListener("click", this.hintHandler);
    }

    // 3. 오답 누적에 따른 "풀이 보기" 버튼 활성화 및 동작 연동 (힌트 3회 사용 시에도 노출)
    const solutionBtn = document.getElementById("puzzle-solution-btn");
    if (solutionBtn) {
      solutionBtn.style.display = "none"; // 기본 감춤
      
      this.solutionHandler = () => {
        let solutionText = "";
        const activePuzzle = PuzzleManager.getActivePuzzle();
        if (activePuzzle && typeof activePuzzle.getSolution === "function") {
          solutionText = activePuzzle.getSolution();
        } else {
          // Fallback
          solutionText = "차분히 문제를 해결해보세요.";
        }

        if (typeof FeedbackSystem !== "undefined") {
          FeedbackSystem.showHint("빛의 수호자 엘리안", `[상세 풀이 비책]\n${solutionText}`);
        } else {
          alert(`[엘리안의 풀이 비책]\n${solutionText}`);
        }
      };
      solutionBtn.addEventListener("click", this.solutionHandler);

      this.puzzleStateSub = (state) => {
        if (state && (state.wrongCount >= 3 || state.hintCount >= 3)) {
          solutionBtn.style.display = "inline-block";
        } else {
          solutionBtn.style.display = "none";
        }
      };
      EventBus.subscribe("stateChange:puzzle", this.puzzleStateSub);

      if (typeof PuzzleState !== "undefined" && (PuzzleState.wrongCount >= 3 || PuzzleState.hintCount >= 3)) {
        solutionBtn.style.display = "inline-block";
      }
    }
  },

  updateCrystalInventory: function() {
    if (typeof PuzzleState === "undefined" || typeof GameState === "undefined") return;
    for (let i = 1; i <= 7; i++) {
      const crystalEl = document.getElementById(`crystal-${i}`);
      if (crystalEl) {
        if (i < GameState.currentStage || (i === GameState.currentStage && GameState.cleared)) {
          // 완전히 클리어하여 획득한 크리스탈
          crystalEl.style.opacity = "1";
          crystalEl.style.filter = "none";
          let glowColor = this.getCrystalColor(i);
          crystalEl.style.filter = `drop-shadow(0 0 8px ${glowColor})`;
          crystalEl.classList.remove("crystal-fragment");
        } else if (i === GameState.currentStage && PuzzleState.currentSubstage > 1) {
          // 현재 스테이지 진행 중이며 1단계를 클리어하여 조각을 얻은 상태
          crystalEl.style.opacity = "0.5";
          crystalEl.style.filter = "grayscale(30%)";
          let glowColor = this.getCrystalColor(i);
          crystalEl.style.filter = `drop-shadow(0 0 3px ${glowColor})`;
          crystalEl.classList.add("crystal-fragment"); // Styles.html에 선언된 펄스 연출 적용
        } else {
          // 아직 획득하지 못한 크리스탈
          crystalEl.style.opacity = "0.15";
          crystalEl.style.filter = "grayscale(100%)";
          crystalEl.classList.remove("crystal-fragment");
        }
      }
    }
  },

  getCrystalColor: function(i) {
    if (i === 1) return "#54a0ff"; // 푸른색
    if (i === 2) return "#2ecc71"; // 초록색
    if (i === 3) return "#f1c40f"; // 노란색
    if (i === 4) return "#9b59b6"; // 보라색
    if (i === 5) return "#ff7675"; // 붉은색
    if (i === 6) return "#dfe6e9"; // 은빛
    return "#fdcb6e"; // 금빛/최종
  },

  showCrystalModal: function(stageId, onProceed) {
    const modal = document.getElementById("crystal-modal");
    const icon = document.getElementById("crystal-modal-icon");
    const title = document.getElementById("crystal-modal-title");
    const desc = document.getElementById("crystal-modal-desc");
    const btn = document.getElementById("crystal-modal-btn");
    const conceptCard = document.getElementById("crystal-concept-card");
    const conceptTextEl = document.getElementById("crystal-concept-text");

    if (!modal || !icon || !title || !desc || !btn) {
      if (onProceed) onProceed();
      return;
    }

    let emoji = "💎";
    let color = "#54a0ff";
    let titleText = "수정 획득!";
    let descText = "";
    let conceptText = "";

    // 3초 요약용 개념 텍스트 매핑
    const conceptDict = {
      1: "맞꼭지각은 항상 크기가 같습니다.",
      2: "평행선이 다른 한 직선과 만날 때, 동위각과 엇각의 크기는 서로 같습니다.",
      3: "평행선 사이의 꺾인 선 문제는 꺾인 점을 지나고 평행한 보조선을 그어 동위각/엇각으로 해결합니다.",
      4: "n각형의 한 꼭짓점에서 그을 수 있는 대각선의 수는 (n - 3)개이고, 총 대각선 수는 n(n - 3) / 2 개입니다.",
      5: "삼각형의 세 내각의 합은 항상 180°이며, 한 외각의 크기는 이웃하지 않는 두 내각의 크기의 합과 같습니다.",

    const activePuzzle = PuzzleManager.getActivePuzzle();
    if (activePuzzle && typeof activePuzzle.getConceptText === "function") {
      conceptText = activePuzzle.getConceptText();
    } else {
      conceptText = conceptDict[stageId] || "";
    }

    if (stageId === 1) {
      emoji = "🔷"; color = "#54a0ff"; titleText = "푸른 수정 획득!";
      descText = "맞꼭지각의 대칭성을 성공적으로 증명하여 거울의 숲에 빛의 질서를 되돌리고 푸른 수정을 일깨웠습니다!";
    } else if (stageId === 2) {
      emoji = "🟢"; color = "#2ecc71"; titleText = "초록 수정 획득!";
      descText = "평행선 사이의 동위각과 엇각 위치 및 수식 방정식을 해결하여 초록 수정을 되찾고 평행의 회랑을 돌파했습니다!";
    } else if (stageId === 3) {
      emoji = "🟡"; color = "#f1c40f"; titleText = "노란 수정 획득!";
      descText = "꺾임점에 평행 보조선 가이드라인을 이끌어내어 W자 레이저 장막을 굴절시키고 노란 수정을 회수했습니다!";
    } else if (stageId === 4) {
      emoji = "🟣"; color = "#9b59b6"; titleText = "보라 수정 획득!";
      descText = "육각형의 대각선 9개를 모두 잇고 팔각형의 대각선 총수를 연산하여 보라 수정을 손에 넣고 대각선 감옥을 파괴했습니다!";
    } else if (stageId === 5) {
      emoji = "🔴"; color = "#ff7675"; titleText = "붉은 수정 획득!";
      descText = "삼각형 내각의 합 180°와 외각 성질의 수식을 정렬하여 붉은 수정을 획득하고 삼각의 제단을 정화했습니다!";
    } else if (stageId === 6) {
      emoji = "⚪"; color = "#dfe6e9"; titleText = "은빛 수정 획득!";
      descText = "정다각형의 한 내각과 외각 총합 360°의 아름다운 대칭 비율을 연역하여 은빛 수정을 얻고 성소를 밝혔습니다!";
    } else if (stageId === 7) {
      emoji = "🌈"; color = "#fdcb6e"; titleText = "7개의 기하 수정 완벽 복원!";
      descText = "마왕 발록의 모든 결계를 깨부수고 마지막 수정의 조화를 되찾아, 뒤틀렸던 기하 세계를 아름답게 복원해 냈습니다!";
    }

    icon.textContent = emoji;
    icon.style.color = color;
    title.textContent = titleText;
    desc.textContent = descText;

    // 개념 카드 노출
    if (conceptCard && conceptTextEl && conceptText) {
      conceptTextEl.textContent = conceptText;
      conceptCard.style.display = "block";
    } else if (conceptCard) {
      conceptCard.style.display = "none";
    }

    modal.classList.add("show");

    // 3초 카운트다운 타이머 시작 (버튼 비활성화)
    let countdown = 3;
    btn.disabled = true;
    btn.textContent = `주문 분석 중 (${countdown}초)...`;
    btn.style.opacity = "0.6";
    btn.style.cursor = "not-allowed";

    const countdownInterval = setInterval(() => {
      countdown--;
      if (countdown > 0) {
        btn.textContent = `주문 분석 중 (${countdown}초)...`;
      } else {
        clearInterval(countdownInterval);
        btn.disabled = false;
        btn.textContent = "계속하기";
        btn.style.opacity = "1";
        btn.style.cursor = "pointer";
      }
    }, 1000);

    const handler = () => {
      if (btn.disabled) return;
      modal.classList.remove("show");
      btn.removeEventListener("click", handler);
      if (typeof onProceed === "function") {
        onProceed();
      }
    };
    btn.addEventListener("click", handler);
  },
  
  exit: function() {
    console.log("[PuzzleScene] 이탈");
    
    PuzzleManager.clearActivePuzzle();
    
    const hintBtn = document.getElementById("puzzle-hint-btn");
    if (hintBtn && this.hintHandler) {
      hintBtn.removeEventListener("click", this.hintHandler);
    }

    const solutionBtn = document.getElementById("puzzle-solution-btn");
    if (solutionBtn && this.solutionHandler) {
      solutionBtn.removeEventListener("click", this.solutionHandler);
    }

    if (this.puzzleStateSub) {
      EventBus.unsubscribe("stateChange:puzzle", this.puzzleStateSub);
    }
    
    const puzzleBoard = document.getElementById("puzzle-board-container");
    if (puzzleBoard && this.rippleHandler) {
      puzzleBoard.removeEventListener("click",      this.rippleHandler);
      puzzleBoard.removeEventListener("touchstart", this.rippleHandler);
    }
  }
};

// 씬 등록
SceneManager.register("puzzle", PuzzleScene);
</script>

/**
 * 최종 결과 출력 화면 씬 객체.
 */
const EndingScene = {
  enter: function(data) {
    console.log("[EndingScene] 진입");
    
    // 소요시간 및 최종 점수 연산
    const playTimeSec = Math.round((new Date(GameState.endTime) - new Date(GameState.startTime)) / 1000);
    const penalty = (PuzzleState.hintPenalty || 0);
    const score = Math.max(0, 100 - (PuzzleState.wrongCount * 5) - penalty);
    PuzzleState.score = score;
    EventBus.publish("stateChange:puzzle", PuzzleState);
    
    // 성문 개방 + 컨페티 + 랭크 연출
    if (typeof AnimationManager !== "undefined") {
      AnimationManager.playGateOpen(score);
    }
    
    // 점수 레코드 바인딩
    const recordEl = document.getElementById("ending-record");
    if (recordEl) {
      recordEl.textContent = `소요 시간: ${playTimeSec}초 | 오답 횟수: ${PuzzleState.wrongCount}회 | 최종 점수: ${score}점`;
    }
    
    // 기록 전송 버튼 리스너 바인딩
    const submitBtn = document.getElementById("ending-submit-btn");
    if (submitBtn) {
      submitBtn.textContent = "기록 및 랭킹 등록";
      submitBtn.disabled = false;
      
      this.submitHandler = () => {
        submitBtn.disabled = true;
        submitBtn.textContent = "제출 중...";
        
        const payload = {
          studentNo: UserState.studentNo,
          name: UserState.name,
          startTime: GameState.startTime,
          endTime: GameState.endTime,
          playTime: playTimeSec,
          score: PuzzleState.score,
          correctCount: PuzzleState.correctCount,
          wrongCount: PuzzleState.wrongCount,
          hintCount: PuzzleState.hintCount,
          cleared: GameState.cleared,
          gameVersion: GameState.gameVersion,
          browser: UserState.browser,
          device: UserState.device,
          stageReached: GameState.currentStage
        };
        
        // ResultRepository 저장 호출
        ResultRepository.saveResult(
          payload,
          function(response) {
            if (typeof FeedbackSystem !== "undefined") {
              FeedbackSystem.showSuccess(response.message || "성공적으로 저장되었습니다.");
            } else {
              alert(response.message || "성공적으로 저장되었습니다.");
            }
            
            if (typeof StateStore !== "undefined") {
              StateStore.clearStorage();
            }
            
            setTimeout(function() {
              SceneManager.showScene("ranking");
            }, 2000);
          },
          function(err) {
            if (typeof FeedbackSystem !== "undefined") {
              FeedbackSystem.showError("저장 실패: " + err.message + "\n다시 시도해 주세요.");
            } else {
              alert("저장 실패: " + err.message);
            }
            submitBtn.disabled = false;
            submitBtn.textContent = "다시 기록 제출하기";
          }
        );
      };
      submitBtn.addEventListener("click", this.submitHandler);
    }
  },
  
  exit: function() {
    console.log("[EndingScene] 이탈");
    const submitBtn = document.getElementById("ending-submit-btn");
    if (submitBtn && this.submitHandler) {
      submitBtn.removeEventListener("click", this.submitHandler);
    }
  }
};

// 씬 등록
SceneManager.register("ending", EndingScene);
</script>

    <script>
/**
 * 랭킹/순위표 화면 씬 객체.
 */
const RankingScene = {
  enter: function(data) {
    console.log("[RankingScene] 진입");
    
    const tbody = document.getElementById("ranking-list-body");
    if (tbody) {
      tbody.innerHTML = `<tr><td colspan="5">순위 데이터를 불러오는 중...</td></tr>`;
    }
    
    // RankingService를 통해 가공된 정렬 데이터를 수신받아 출력
    RankingService.getLeaderboard(
      function(topList) {
        RankingScene.renderList(topList);
      },
      function(err) {
        if (tbody) {
          tbody.innerHTML = `<tr><td colspan="5" style="color:#ff4757; font-weight:bold;">랭킹 데이터를 로드하지 못했습니다.</td></tr>`;
        }
      }
    );
    
    // 처음부터 다시 하기 버튼 바인딩
    const restartBtn = document.getElementById("ranking-restart-btn");
    if (restartBtn) {
      this.restartHandler = () => {
        // 모든 상태 롤백 초기화
        UserState.studentNo = "";
        UserState.name = "";
        EventBus.publish("stateChange:user", UserState);
        
        GameState.startTime = null;
        GameState.endTime = null;
        GameState.cleared = false;
        GameState.currentStage = 1;
        EventBus.publish("stateChange:game", GameState);
        
        PuzzleState.correctCount = 0;
        PuzzleState.wrongCount = 0;
        PuzzleState.hintCount = 0;
        PuzzleState.score = 0;
        EventBus.publish("stateChange:puzzle", PuzzleState);
        
        if (typeof StateStore !== "undefined") {
          StateStore.clearStorage();
        }
        
        SceneManager.showScene("intro");
      };
      restartBtn.addEventListener("click", this.restartHandler);
    }
  },
  
  /**
   * 상위 랭킹 리스트 테이블을 동적으로 그립니다.
   */
  renderList: function(list) {
    const tbody = document.getElementById("ranking-list-body");
    if (!tbody) return;
    
    if (!list || list.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5">기록된 순위가 없습니다. 첫 랭커가 되어보세요!</td></tr>`;
      return;
    }
    
    tbody.innerHTML = list.map((item) => `
      <tr>
        <td style="color:#d4af37; font-weight:bold;">${item.rank}위</td>
        <td>${item.studentNo}</td>
        <td>${item.name}</td>
        <td style="color:#d4af37; font-weight:bold;">${item.score}점</td>
        <td>${item.playTime}초</td>
      </tr>
    `).join("");
  },
  
  exit: function() {
    console.log("[RankingScene] 이탈");
    const restartBtn = document.getElementById("ranking-restart-btn");
    if (restartBtn && this.restartHandler) {
      restartBtn.removeEventListener("click", this.restartHandler);
    }
  }
};

// 씬 등록
SceneManager.register("ranking", RankingScene);
</script>

    
    <!-- Client Core App Initialize -->
    <script>
/**
 * 클라이언트 메인 애플리케이션 라이프사이클 엔트리 포인트.
 */
document.addEventListener("DOMContentLoaded", function() {
  console.log("Geometry Escape 클라이언트 코어 초기화 시작.");

  // 1. 전역 상태 변화 디버깅 구독
  if (typeof EventBus !== "undefined") {
    EventBus.subscribe("stateChange:user", function(user) {
      console.log("[State Update] UserState:", user);
    });
    EventBus.subscribe("stateChange:game", function(game) {
      console.log("[State Update] GameState:", game);
    });
    EventBus.subscribe("stateChange:puzzle", function(puzzle) {
      console.log("[State Update] PuzzleState:", puzzle);
    });
    EventBus.subscribe("stateChange:ui", function(ui) {
      console.log("[State Update] UiState:", ui);
    });
  }

  // 2. 새로고침 상태 복구 시도
  let restored = false;
  if (typeof StateStore !== "undefined") {
    restored = StateStore.loadFromLocalStorage();
  }

  // 3. 최초 라우팅 제어
  if (restored && GameState.startTime && !GameState.cleared) {
    console.log(`이전 세션이 존재하여 스테이지 ${GameState.currentStage}로 복구합니다.`);
    SceneManager.showScene("puzzle", { stageId: GameState.currentStage });
  } else {
    SceneManager.showScene("intro");
  }

  // 4. 비정상 이탈 방지 경고 리스너
  window.addEventListener("beforeunload", function(e) {
    if (GameState.startTime && !GameState.cleared) {
      const msg = "진행 중인 탈출 기록이 사라집니다. 정말 페이지를 나가시겠습니까?";
      (e || window.event).returnValue = msg;
      return msg;
    }
  });
});
</script>
